name: CI & Deploy

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    name: Headless tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Economy + world + save/load + audio tests
        run: node tools/sim3dtest.js
      - name: World preview renders from real terrain
        run: node tools/worldpreview.js 42

  deploy:
    name: Deploy to GitHub Pages
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Upload game/ as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: game
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
