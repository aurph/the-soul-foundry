<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>THE SOUL FOUNDRY</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=Grenze+Gotisch:wght@500;700&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     THE SOUL FOUNDRY — true-3D desolate colony sim
     Art-directed UI: aged iron + ash parchment, carved serif,
     warm ember accents on a dead grey world.
     ============================================================ */
  :root{
    --bg:#070809; --ink:#cabfa6; --ink-dim:#7d7866; --ink-bright:#ece2c8;
    --iron:#16171c; --iron2:#1d1f26; --iron3:#262834; --line:#33353f;
    --ember:#d98a3a; --ember-soft:#b8884e; --rot:#6f7a55; --blood:#9e3b2c;
    --cold:#5f7f86;
    --panel:rgba(18,19,24,0.92);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);color:var(--ink);
    font-family:'Iowan Old Style','Palatino Linotype','Georgia',serif;user-select:none;touch-action:none}
  #c{position:fixed;inset:0;display:block}
  .mono{font-family:ui-monospace,Menlo,Consolas,monospace}

  /* boot / fail screens */
  #boot{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;align-items:center;
    justify-content:center;background:radial-gradient(circle at 50% 40%,#14151a,#070809);gap:14px;text-align:center;padding:24px}
  #boot h1{font-size:34px;letter-spacing:5px;margin:0;color:var(--ink-bright);text-shadow:0 0 30px #d98a3a33}
  #boot .sub{color:var(--ember-soft);letter-spacing:3px;text-transform:uppercase;font-size:12px}
  #boot .bar{width:220px;height:3px;background:#222;border-radius:2px;overflow:hidden;margin-top:6px}
  #boot .bar>i{display:block;height:100%;width:30%;background:var(--ember);animation:load 1.1s ease-in-out infinite}
  @keyframes load{0%{margin-left:-30%}100%{margin-left:100%}}
  #boot .msg{color:var(--ink-dim);font-size:12px;min-height:16px}

  /* HUD frame pieces share this carved look */
  .frame{background:var(--panel);border:1px solid var(--line);
    box-shadow:0 6px 30px #000a, inset 0 1px 0 #ffffff0a;backdrop-filter:blur(3px)}
  .frame::before{content:"";position:absolute;inset:0;pointer-events:none;
    border:1px solid #000;opacity:.4;margin:2px}
  /* WOODEN TWIG SKIN: gothic display face + dead-branch art framing the HUD */
  h1,.modal h1,#boot h1{font-family:'Pirata One','Iowan Old Style',serif;font-weight:normal;letter-spacing:3px}
  .modal h2,#quota b,#alert,.gh,.optrow b,#goals .gh,#inspect .hd h3{font-family:'Grenze Gotisch','Iowan Old Style',serif}
  #inspect .hd h3{font-size:18px;letter-spacing:1px}
  .twig,.modal{position:relative}
  #ledger{position:fixed}
  #ledger::after{content:"";position:absolute;left:0;right:0;bottom:-20px;height:30px;
    background:url('assets/ui/stick-bar.png') no-repeat center/100% 100%;opacity:1;pointer-events:none;
    filter:drop-shadow(0 2px 4px #000c)}
  #boot .wordmark{font-family:'Pirata One','Iowan Old Style',serif;font-weight:normal;
    font-size:clamp(36px,7vw,62px);letter-spacing:4px;line-height:1.05;margin:8px 0 2px;
    color:#c4b89e;opacity:.9;text-shadow:0 1px 1px #000a;text-transform:none}

  /* top ledger */
  #ledger{position:fixed;top:0;left:0;right:0;height:46px;z-index:30;display:flex;align-items:center;
    gap:0;padding:0 130px 0 6px;overflow-x:auto;scrollbar-width:none;
    background:linear-gradient(#14151bf2,#0d0e12e0);border-bottom:1px solid var(--line)}
  #ledger::-webkit-scrollbar{display:none}
  .stat{display:inline-flex;align-items:center;gap:6px;padding:4px 11px;border-right:1px solid var(--line);flex:0 0 auto}
  .shopbtn{cursor:pointer} .shopbtn:hover{background:#1c1f27}
  .stat .ic{width:18px;height:18px;flex:0 0 auto}
  .stat .v{color:var(--ink-bright);font-variant-numeric:tabular-nums;font-size:14px}
  .stat .lbl{color:var(--ink-dim);font-size:10px;text-transform:uppercase;letter-spacing:.5px}
  .stat .rate{font-size:10px;color:var(--ink-dim);font-variant-numeric:tabular-nums}
  .rate.pos{color:var(--rot)} .rate.neg{color:var(--blood)}

  /* clock / quota banner */
  #quota{position:fixed;top:54px;left:50%;transform:translateX(-50%);z-index:28;padding:6px 16px;border-radius:4px;
    font-size:12px;letter-spacing:.5px;text-align:center;min-width:240px}
  #quota b{color:var(--ember)}
  .sep{width:1px;align-self:center;height:22px;background:var(--line);margin:0 6px;flex:0 0 auto}
  #alert{position:fixed;top:86px;left:50%;transform:translateX(-50%);z-index:27;max-width:600px;padding:5px 14px;border-radius:4px;
    font-size:12px;line-height:1.4;text-align:center;color:#f0c4ba;background:#2a1614ee;border:1px solid var(--blood);
    box-shadow:0 4px 18px #0008;display:none}
  #alert.show{display:block}

  /* speed cluster — pulled out of the rail, pinned top-right, kept separate from the economy readout */
  #speedbar{position:fixed;top:7px;right:10px;z-index:32;display:flex;gap:5px;padding:3px;border-radius:7px;
    background:linear-gradient(#1c150df2,#100b06f6);border:1px solid #2c2418;box-shadow:0 3px 12px #0008}
  .sbtn{width:32px;height:32px;border:1px solid var(--line);border-radius:5px;background:var(--iron2);
    display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden}
  .sbtn img{width:17px;height:17px;object-fit:contain;filter:saturate(.85) brightness(.9)}
  .sbtn:hover{border-color:var(--ember-soft)} .sbtn:hover img{filter:brightness(1.06)}
  .sbtn.on{border-color:var(--ember);background:#241a0f} .sbtn.on img{filter:brightness(1.2) saturate(1.1)}

  /* right control rail */
  #rail{position:fixed;right:8px;top:56px;z-index:28;display:flex;flex-direction:column;gap:9px}
  .rbtn{width:40px;height:40px;border:1px solid var(--line);border-radius:6px;background:var(--iron2);
    color:var(--ink);font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer}
  .rbtn.on{border-color:var(--ember);color:var(--ember)}
  .rbtn:hover{border-color:var(--ember-soft)}

  /* bottom build dock */
  #dock{position:fixed;left:0;right:0;bottom:0;z-index:30;border-top:1px solid var(--line);
    background:linear-gradient(#15110bf0,#0c0a07f8)}
  #docktabs{display:flex;border-bottom:1px solid var(--line);overflow-x:auto;scrollbar-width:none}
  #docktabs::-webkit-scrollbar{display:none}
  .tab{flex:0 0 auto;padding:7px 16px;font-size:12px;letter-spacing:.5px;color:var(--ink-dim);cursor:pointer;border-right:1px solid var(--line)}
  .tab.on{color:var(--ember);background:#191b22;box-shadow:inset 0 -2px 0 var(--ember)}
  #dockrow{display:flex;gap:8px;padding:9px 8px;overflow-x:auto;min-height:104px;align-items:stretch;scrollbar-width:thin}
  #dockrow::-webkit-scrollbar{height:6px}#dockrow::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}
  .card{flex:0 0 auto;width:104px;border:1px solid #2c2418;border-radius:6px;background:linear-gradient(#221b12,#191309);
    padding:6px;cursor:pointer;display:flex;flex-direction:column;gap:4px;position:relative;overflow:hidden}
  .card:hover{border-color:var(--ember-soft)} .card.sel{border-color:var(--ember);box-shadow:0 0 0 1px var(--ember)}
  .card.locked{opacity:.45;filter:grayscale(.7)}
  .card .cat{position:absolute;top:0;left:0;right:0;height:3px}
  .card .th{width:100%;height:54px;border-radius:4px;background:radial-gradient(circle at 50% 38%,#231a10,#120c06);border:1px solid #000;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .card .th img{width:48px;height:48px;object-fit:contain;filter:saturate(.92) brightness(.97)}
  .card .nm{font-size:11px;line-height:1.15;color:var(--ink-bright);height:26px;overflow:hidden}
  .card .ct{font-size:10px;color:var(--ink-dim);display:flex;align-items:center;gap:5px;flex-wrap:wrap}
  .card .ct img{width:12px;height:12px;vertical-align:middle}
  .card .ct .cn{color:var(--ink)}
  .card .lk{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;text-align:center;
    font-size:10px;color:#d8cbb0;background:#0a0b0ed8;border-radius:6px;padding:4px}
  .card .hk{position:absolute;top:3px;right:3px;z-index:3;min-width:16px;height:16px;padding:0 3px;border-radius:3px;
    background:#0b0c0fe6;border:1px solid var(--line);color:var(--ember-soft);font:bold 10px/16px ui-monospace,Menlo,monospace;text-align:center;letter-spacing:0}

  /* contextual inspector (left) */
  #inspect{position:fixed;left:8px;top:56px;width:266px;max-height:calc(100% - 230px);overflow:auto;z-index:27;
    border-radius:8px;display:none;scrollbar-width:thin}
  #inspect.show{display:block}
  #inspect .hd{padding:9px 12px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
  #inspect .hd h3{margin:0;font-size:15px;color:var(--ink-bright);letter-spacing:.5px}
  #inspect .bd{padding:10px 12px;font-size:12.5px;line-height:1.5}
  #inspect .row{display:flex;justify-content:space-between;gap:8px;padding:3px 0;border-bottom:1px dotted #23252d}
  #inspect .row b{color:var(--ink-bright);font-weight:normal;font-variant-numeric:tabular-nums}
  #inspect .barwrap{margin:5px 0}
  #inspect .barwrap .t{font-size:10px;color:var(--ink-dim);text-transform:uppercase;letter-spacing:.5px}
  #inspect .pbar{height:7px;background:#0c0d11;border:1px solid var(--line);border-radius:4px;overflow:hidden;margin-top:2px}
  #inspect .pbar>i{display:block;height:100%}
  .tag{display:inline-block;font-size:10px;padding:1px 6px;border-radius:3px;background:#262833;color:var(--ink-dim);margin:1px 2px 1px 0}
  .x{cursor:pointer;color:var(--ink-dim);font-size:16px}.x:hover{color:var(--ink-bright)}
  .btn{display:inline-block;padding:6px 11px;border:1px solid var(--line);border-radius:5px;background:var(--iron3);
    color:var(--ink-bright);font-size:12px;cursor:pointer;font-family:inherit}
  .btn:hover{border-color:var(--ember-soft)} .btn.bad:hover{border-color:var(--blood);color:#f0c4ba}

  /* toasts */
  #toasts{position:fixed;left:50%;top:92px;transform:translateX(-50%);z-index:40;display:flex;flex-direction:column;
    gap:6px;align-items:center;pointer-events:none}
  .toast{padding:7px 14px;border-radius:5px;font-size:13px;color:var(--ink-bright);max-width:84vw;
    background:#15161bf4;border:1px solid var(--line);border-left:3px solid var(--ember);box-shadow:0 4px 20px #000a;
    animation:ti .25s ease}
  .toast.bad{border-left-color:var(--blood)} .toast.good{border-left-color:var(--rot)}
  @keyframes ti{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}

  /* big overlay */
  #ov{position:fixed;inset:0;z-index:60;display:none;align-items:center;justify-content:center;
    background:#060709dd;backdrop-filter:blur(5px)}
  #ov.show{display:flex}
  .modal{width:min(600px,93vw);max-height:88vh;overflow:auto;border-radius:12px;padding:24px 26px;
    background:linear-gradient(#16171d,#101116);border:1px solid var(--line);box-shadow:0 16px 70px #000d}
  .modal h1{margin:0 0 2px;font-size:32px;letter-spacing:4px;color:var(--ink-bright);text-shadow:0 0 24px #d98a3a33}
  .modal h2{margin:0 0 16px;font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--ember-soft);font-weight:normal}
  .modal p{font-size:14px;line-height:1.65;color:var(--ink)}
  .kbd{display:inline-block;border:1px solid var(--line);border-bottom-width:2px;border-radius:4px;padding:0 5px;
    font:11px monospace;color:var(--ink-bright);background:#1c1e25}
  .optrow{display:flex;justify-content:space-between;align-items:center;gap:14px;padding:8px 0;border-bottom:1px dotted #23252d;font-size:14px;color:var(--ink)}
  .optrow input[type=range]{flex:1;max-width:230px;accent-color:var(--ember)}
  .optrow input[type=checkbox]{width:16px;height:16px;accent-color:var(--ember)}
  .obj-list{display:flex;flex-wrap:wrap;gap:7px;margin-top:6px}
  #goals{position:fixed;right:8px;top:404px;z-index:26;width:300px;max-width:42vw;max-height:calc(100vh - 580px);overflow:auto;padding:11px 14px;border-radius:8px;display:none;border-left:3px solid var(--ember)}
  #goals .gh{font-size:10px;letter-spacing:1.5px;color:var(--ember);text-transform:uppercase}
  #goals .gt{font-size:13.5px;color:var(--ink-bright);line-height:1.45;margin-top:5px}
  #goals .gw{font-size:11px;color:var(--ink-dim);line-height:1.4;margin-top:6px;font-style:italic}
  #goals .gbar{height:4px;background:#0c0d11;border:1px solid var(--line);border-radius:3px;overflow:hidden;margin-top:9px}
  #goals .gbar>i{display:block;height:100%;background:linear-gradient(90deg,#6f7a55,#d98a3a)}
  #goals .gp{margin-top:6px;text-align:right}
  #goals .gskip{font-size:10px;color:var(--ink-dim);cursor:pointer;text-decoration:underline}
  #goals .gskip:hover{color:var(--ink-bright)}
  #hint{position:fixed;left:50%;top:128px;transform:translateX(-50%);z-index:45;padding:5px 13px;border-radius:5px;
    font-size:12px;color:var(--ember-soft);background:#0d0e12cc;border:1px solid var(--line);pointer-events:none;display:none;white-space:nowrap}
  #dev{position:fixed;left:6px;bottom:116px;color:#6c8;font:11px monospace;z-index:60;display:none}
  #pausebar{position:fixed;left:50%;top:46%;transform:translate(-50%,-50%);z-index:46;padding:10px 20px;border-radius:6px;cursor:pointer;
    font-size:14px;letter-spacing:.5px;color:var(--ink-bright);background:#0d0e12ee;border:1px solid var(--ember);box-shadow:0 8px 34px #000b;display:none}
  #pausebar .k{font:11px monospace;border:1px solid var(--line);border-bottom-width:2px;border-radius:4px;padding:0 5px;color:var(--ink-bright)}
  /* Desolation: VHS grain + scanlines + heavy vignette */
  #grain{position:fixed;inset:0;z-index:15;pointer-events:none;width:100%;height:100%;
    image-rendering:pixelated;opacity:.035;mix-blend-mode:overlay}
  #vhs{position:fixed;inset:0;z-index:16;pointer-events:none;
    background:repeating-linear-gradient(0deg,rgba(0,0,0,.035) 0px,rgba(0,0,0,.035) 1px,transparent 2px,transparent 5px);
    box-shadow:inset 0 0 120px 22px rgba(0,0,0,.26);
    opacity:.4;mix-blend-mode:multiply}
  /* ============================================================
     LASHED-BRANCH FRAME — 9-sliced from Jack's low-poly stick,
     graded cold + grimy (built by tools/makeframe.js). border-image
     wraps the content panels in real wood instead of a faint corner.
     ============================================================ */
  #inspect,#goals,.modal,#dock{
    border:var(--wood,30px) solid transparent;
    border-image:url('assets/ui/frame-branch.png') 160 stretch;
    border-radius:0; backdrop-filter:none;
  }
  #inspect,#goals{--wood:30px; background:#0a0b0ff5}
  .modal{--wood:44px; background:#0b0c10f8; box-shadow:0 18px 80px #000e}
  #dock{--wood:26px; border-top:none}
  #inspect.frame::before,#goals.frame::before{display:none}
  /* ===== custom icon system (replaces all emoji) ===== */
  .ic{object-fit:contain;vertical-align:middle;flex:0 0 auto}
  .stat .ic{margin-right:5px}
  .resstat{cursor:pointer;border-radius:4px} .resstat:hover{background:#1c1f27}
  .gbtn{cursor:pointer}
  .rbtn{overflow:hidden;padding:0}
  .rbtn img{width:100%;height:100%;object-fit:cover;display:block;filter:saturate(.85) brightness(.9)}
  .rbtn:hover img{filter:saturate(1) brightness(1.06)}
  .rbtn.on{border-color:var(--ember)} .rbtn.on img{filter:brightness(1.14) saturate(1.1)}
  .tab .tic{width:15px;height:15px;object-fit:contain;vertical-align:middle;margin-right:6px;opacity:.7}
  .tab.on .tic{opacity:1}
  .alert-ic{width:15px;height:15px;object-fit:contain;vertical-align:-2px;margin-right:5px}
  #tip{position:fixed;z-index:48;max-width:252px;padding:5px 9px;border-radius:5px;font-size:12px;line-height:1.35;
    color:var(--ink-bright);background:#0d0e12f2;border:1px solid var(--line);box-shadow:0 4px 16px #000b;pointer-events:none;display:none}
  #tip b{color:var(--ember-soft);font-weight:normal}
  /* supply-chain blueprint */
  .chain{display:flex;flex-direction:column;gap:0;margin:10px 0}
  .cstep{display:flex;gap:10px;align-items:flex-start;padding:9px 11px;border:1px solid var(--line);border-radius:7px;background:#0e0f13;cursor:pointer}
  .cstep:hover{border-color:var(--ember-soft);background:#13151a}
  .cstep .dot{width:11px;height:11px;border-radius:50%;flex:0 0 auto;margin-top:4px;box-shadow:0 0 7px currentColor}
  .cstep .cgly{width:22px;height:22px;flex:0 0 auto;margin-top:1px;object-fit:contain}
  .cstep .cn{font-family:'Grenze Gotisch','Iowan Old Style',serif;font-size:15px;color:var(--ink-bright)}
  .cstep .cstat{font-size:10.5px;color:var(--ink-dim);margin-left:7px}
  .cstep .cflow{display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin-top:4px;font-size:11px;color:var(--ink-dim)}
  .cstep .cflow img{width:18px;height:18px;vertical-align:middle}
  .carrow{width:2px;height:13px;background:linear-gradient(var(--line),var(--ember-soft));margin-left:17px}
  /* tutorial green spotlight */
  #spot{position:fixed;z-index:44;border:2px solid #80df68;border-radius:8px;pointer-events:none;display:none;
    animation:spotpulse 1.3s ease-in-out infinite}
  @keyframes spotpulse{0%,100%{box-shadow:0 0 0 3px #80df6840,0 0 16px 4px #80df6844,inset 0 0 12px #80df6822}
    50%{box-shadow:0 0 0 4px #80df6866,0 0 28px 8px #80df6877,inset 0 0 16px #80df6844}}
  #wspot{position:fixed;z-index:44;width:34px;height:34px;margin:-17px 0 0 -17px;border:2px solid #80df68;border-radius:50%;
    box-shadow:0 0 14px 4px #80df6866;pointer-events:none;display:none;animation:spotpulse 1.3s ease-in-out infinite}
  #wspot::after{content:'';position:absolute;inset:6px;border-radius:50%;background:#80df6833}
</style>
</head>
<body>
<canvas id="c"></canvas>
<canvas id="grain"></canvas>
<div id="vhs"></div>

<div id="ledger"></div>
<div id="quota" class="frame"></div>
<div id="alert"></div>
<div id="speedbar"></div>
<div id="rail"></div>
<div id="inspect" class="frame twig"></div>
<div id="goals" class="frame twig"></div>
<div id="toasts"></div>
<div id="hint"></div>
<div id="tip"></div>
<div id="spot"></div><div id="wspot"></div>
<div id="pausebar" onclick="beginPlay()"><img src="assets/ui/glyph/pause.png" style="width:15px;height:15px;vertical-align:-3px;opacity:.8;margin-right:5px">Paused &middot; press <span class="k">Space</span> or click here to begin</div>
<div id="dev"></div>
<div id="dock">
  <div id="docktabs"></div>
  <div id="dockrow"></div>
</div>
<div id="ov"><div class="modal" id="modal"></div></div>

<div id="boot">
  <div class="sub">a desolate foundry of the dead</div>
  <h1 class="wordmark">The Soul Foundry</h1>
  <div class="bar"><i></i></div>
  <div class="msg" id="bootmsg">waking the engine…</div>
</div>

<!-- Three.js r128 + addons, vendored locally as CLASSIC scripts (work over file://, unlike ES modules).
     Each is followed by a document.write CDN fallback in case a local file is missing. -->
<script src="vendor/three.min.js"></script>
<script>typeof THREE!=="undefined"||document.write('<scr'+'ipt src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"><\/scr'+'ipt>');</script>
<script src="vendor/GLTFLoader.js"></script>
<script>(typeof THREE!=="undefined"&&THREE.GLTFLoader)||document.write('<scr'+'ipt src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"><\/scr'+'ipt>');</script>
<script src="vendor/SkeletonUtils.js"></script>
<script>(typeof THREE!=="undefined"&&THREE.SkeletonUtils)||document.write('<scr'+'ipt src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/utils/SkeletonUtils.js"><\/scr'+'ipt>');</script>

<script>
/* =====================================================================
   THE SOUL FOUNDRY — single self-contained classic script.
   Sections: BOOTCHECK · CONFIG · RNG · NOISE · WORLD(scene/terrain/atmos)
   · CAMERA · (later) BUILDINGS · VILLAGERS · ECONOMY · UI · INPUT · MAIN
   ===================================================================== */
"use strict";
const bootmsg = (t)=>{ const e=document.getElementById('bootmsg'); if(e) e.textContent=t; };

if(typeof THREE === "undefined"){
  document.getElementById('boot').innerHTML =
    '<div class="sub">the engine could not wake</div>'+
    '<h1 style="font-size:24px">no connection</h1>'+
    '<p style="color:#cabfa6;max-width:420px;text-align:center">This game streams its 3D engine from the web on first load. '+
    'You appear to be offline, or a network block stopped it. Connect to the internet and reload.</p>';
  throw new Error("THREE failed to load");
}

/* =====================================================================
   === RNG + NOISE ===
   ===================================================================== */
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);
  t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
let RNG=mulberry32(1337);
const rnd=()=>RNG(),rint=n=>(RNG()*n)|0,rr=(a,b)=>a+RNG()*(b-a),pick=a=>a[(RNG()*a.length)|0];
const clamp=(v,a,b)=>v<a?a:v>b?b:v, lerp=(a,b,t)=>a+(b-a)*t;
// cheap deterministic value-noise fbm for terrain
function vnoise(x,y){ const xi=Math.floor(x),yi=Math.floor(y),xf=x-xi,yf=y-yi;
  const h=(a,b)=>{let n=a*374761393+b*668265263;n=(n^(n>>13))*1274126177;return ((n^(n>>16))>>>0)/4294967296;};
  const u=xf*xf*(3-2*xf),v=yf*yf*(3-2*yf);
  return lerp(lerp(h(xi,yi),h(xi+1,yi),u),lerp(h(xi,yi+1),h(xi+1,yi+1),u),v);
}
function fbm(x,y){ let s=0,a=0.5,f=1; for(let i=0;i<4;i++){ s+=a*vnoise(x*f,y*f); f*=2; a*=0.5; } return s; }

/* =====================================================================
   === SOUND: a WebAudio synth bed + SFX that need ZERO downloads
   (so audio works over file:// and fully offline), with AI-generated
   music & sound effects layered on top whenever their files load.
   ===================================================================== */
const SND={
  ctx:null, master:null, sfxGain:null, droneGain:null,
  started:false, muted:false, musicVol:0.55, sfxVol:0.8,
  pool:{}, music:null, dread:null, droneNodes:[],
  vol:{place:0.22, rise:0.55, crumble:0.6, haunt:0.55, bell:0.7},   // per-sound trims; place is the soft 'assembling' cue
  // asset urls — null means "synth only"; the build fills these with vendored paths
  src:{ music:"assets/audio/music.m4a", dread:"assets/audio/dread.m4a", place:"assets/audio/place.mp3",
        bell:"assets/audio/bell.mp3", crumble:"assets/audio/crumble.mp3", haunt:"assets/audio/haunt.mp3", rise:"assets/audio/rise.mp3" },
  load(){ try{ const s=localStorage.getItem('sf_audio'); if(s){ const o=JSON.parse(s);
    if(typeof o.m==='number')this.musicVol=o.m; if(typeof o.s==='number')this.sfxVol=o.s; this.muted=!!o.x; } }catch(e){} },
  save(){ try{ localStorage.setItem('sf_audio',JSON.stringify({m:this.musicVol,s:this.sfxVol,x:this.muted})); }catch(e){} },
  // called on the first user gesture (browsers block audio until then)
  resume(){ if(this.started){ if(this.ctx&&this.ctx.state==="suspended")this.ctx.resume(); return; }
    this.started=true; this.load();
    try{ const AC=window.AudioContext||window.webkitAudioContext; if(AC){ this.ctx=new AC();
      this.master=this.ctx.createGain(); this.master.gain.value=this.muted?0:1; this.master.connect(this.ctx.destination);
      this.sfxGain=this.ctx.createGain(); this.sfxGain.gain.value=this.sfxVol; this.sfxGain.connect(this.master);
      this.startDrone(); } }catch(e){}
    this.startMusic();
  },
  mkEl(url,loop,vol){ try{ const a=document.createElement('audio'); a.src=url; a.loop=!!loop; a.preload="auto";
    a.volume=(this.muted?0:1)*(vol==null?1:vol); return a; }catch(e){ return null; } },
  startMusic(){ try{ if(this.src.music){ this.music=this.mkEl(this.src.music,true,this.musicVol); if(this.music){ const p=this.music.play(); if(p&&p.catch)p.catch(()=>{}); } }
    if(this.src.dread){ this.dread=this.mkEl(this.src.dread,true,0); if(this.dread){ const p=this.dread.play(); if(p&&p.catch)p.catch(()=>{}); } } }catch(e){} },
  // crossfade an optional 'dread' music layer up as Dread rises
  setTension(t){ try{ if(this.dread)this.dread.volume=(this.muted?0:1)*this.musicVol*clamp(t,0,1)*0.9;
    if(this.music)this.music.volume=(this.muted?0:1)*this.musicVol*(1-clamp(t,0,1)*0.5); }catch(e){} },
  sfx(name){ if(!this.started||this.muted) return; const url=this.src[name];
    if(url){ this.playEl(name,url); } else { this.synth(name); } },
  playEl(name,url){ try{ let pool=this.pool[name]; if(!pool){ pool=this.pool[name]=[this.mkEl(url,false,this.sfxVol),this.mkEl(url,false,this.sfxVol),this.mkEl(url,false,this.sfxVol)]; }
    const a=pool.find(e=>e&&(e.paused||e.ended))||pool[0]; if(a){ a.volume=this.muted?0:this.sfxVol*(this.vol[name]!=null?this.vol[name]:1); a.currentTime=0; const p=a.play(); if(p&&p.catch)p.catch(()=>this.synth(name)); } }catch(e){ this.synth(name); } },
  /* ---- pure-synth SFX + ambient (no assets needed) ---- */
  envOsc(o,g,a,d,glideTo){ const now=this.ctx.currentTime; if(glideTo)o.frequency.exponentialRampToValueAtTime(glideTo,now+a+d);
    const gn=this.ctx.createGain(); gn.gain.setValueAtTime(0.0001,now); gn.gain.exponentialRampToValueAtTime(g,now+a); gn.gain.exponentialRampToValueAtTime(0.0001,now+a+d);
    o.connect(gn); gn.connect(this.sfxGain); o.start(now); o.stop(now+a+d+0.05); },
  tone(freq,type,g,a,d,glideTo){ if(!this.ctx)return; const o=this.ctx.createOscillator(); o.type=type||"sine"; o.frequency.setValueAtTime(freq,this.ctx.currentTime); this.envOsc(o,g,a,d,glideTo); },
  noise(g,a,d,lp){ if(!this.ctx)return; const len=Math.floor(this.ctx.sampleRate*(a+d+0.1)); const buf=this.ctx.createBuffer(1,len,this.ctx.sampleRate); const ch=buf.getChannelData(0); for(let i=0;i<len;i++)ch[i]=Math.random()*2-1;
    const n=this.ctx.createBufferSource(); n.buffer=buf; const f=this.ctx.createBiquadFilter(); f.type="lowpass"; f.frequency.value=lp||1200;
    const now=this.ctx.currentTime; const gn=this.ctx.createGain(); gn.gain.setValueAtTime(0.0001,now); gn.gain.exponentialRampToValueAtTime(g,now+a); gn.gain.exponentialRampToValueAtTime(0.0001,now+a+d);
    n.connect(f); f.connect(gn); gn.connect(this.sfxGain); n.start(now); n.stop(now+a+d+0.12); },
  synth(name){ if(!this.ctx)return; switch(name){
    case "place":   this.tone(72,"sine",0.5,0.004,0.2,42); this.noise(0.28,0.004,0.16,700); break;
    case "bell":    this.tone(180,"sine",0.35,0.005,1.7); this.tone(271,"sine",0.16,0.005,1.4); this.tone(417,"sine",0.08,0.005,1.0); break;
    case "crumble": this.noise(0.4,0.005,0.5,2600); this.tone(120,"sawtooth",0.12,0.01,0.4,48); break;
    case "haunt":   this.tone(330,"sine",0.12,0.4,1.3,292); this.tone(495,"triangle",0.06,0.5,1.0,470); break;
    case "rise":    this.tone(88,"sine",0.26,0.5,0.8,165); break;
    case "click":   this.tone(840,"square",0.04,0.002,0.04); break;
    case "deny":    this.tone(150,"square",0.12,0.005,0.16,90); break;
    case "win":     [262,330,392,523].forEach((f,i)=>setTimeout(()=>this.tone(f,"sine",0.25,0.01,0.8),i*150)); break;
    case "lose":    [220,175,131,98].forEach((f,i)=>setTimeout(()=>this.tone(f,"sawtooth",0.2,0.02,0.9,f*0.6),i*210)); break;
  } },
  startDrone(){ if(!this.ctx)return; const base=this.ctx.createGain(); base.gain.value=0.10; base.connect(this.master); this.droneGain=base;
    [55,55.35,82.5].forEach((fr,i)=>{ const o=this.ctx.createOscillator(); o.type=i<2?"sine":"triangle"; o.frequency.value=fr;
      const g=this.ctx.createGain(); g.gain.value=i<2?0.5:0.16; o.connect(g); g.connect(base); o.start(); this.droneNodes.push(o);
      const lfo=this.ctx.createOscillator(); lfo.frequency.value=0.05+i*0.027; const lg=this.ctx.createGain(); lg.gain.value=1.4; lfo.connect(lg); lg.connect(o.frequency); lfo.start(); });
    const len=Math.floor(this.ctx.sampleRate*4); const buf=this.ctx.createBuffer(1,len,this.ctx.sampleRate); const ch=buf.getChannelData(0); for(let i=0;i<len;i++)ch[i]=Math.random()*2-1;
    const n=this.ctx.createBufferSource(); n.buffer=buf; n.loop=true; const f=this.ctx.createBiquadFilter(); f.type="lowpass"; f.frequency.value=360; const g=this.ctx.createGain(); g.gain.value=0.05; n.connect(f); f.connect(g); g.connect(base); n.start(); },
  setMusicVol(v){ this.musicVol=clamp(v,0,1); if(this.music)this.music.volume=this.muted?0:this.musicVol; this.save(); },
  setSfxVol(v){ this.sfxVol=clamp(v,0,1); if(this.sfxGain)this.sfxGain.gain.value=this.sfxVol; this.save(); },
  toggleMute(){ this.muted=!this.muted; if(this.master)this.master.gain.value=this.muted?0:1; if(this.music)this.music.volume=this.muted?0:this.musicVol; this.save(); return this.muted; },
};
SND.load();

/* =====================================================================
   === WORLD: renderer, scene, lighting, fog, terrain, atmosphere ===
   ===================================================================== */
const WORLD_SIZE=240, TSEG=180, HALF=WORLD_SIZE/2;  // a bigger valley; the far reaches stay under the shroud
const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true,powerPreference:"high-performance"});
const HORIZON=0x232830;
renderer.setClearColor(HORIZON,1);
renderer.outputEncoding = THREE.sRGBEncoding;
const scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(HORIZON,0.0072);
scene.background=new THREE.Color(HORIZON);

const camera=new THREE.PerspectiveCamera(46, innerWidth/innerHeight, 0.1, 1700);

// --- lighting: cold overcast dusk ---
const hemi=new THREE.HemisphereLight(0x3a4250,0x0b0c0e,0.95); scene.add(hemi);
const sun=new THREE.DirectionalLight(0xaab2bf,0.75); sun.position.set(-60,110,40); scene.add(sun);
const fill=new THREE.DirectionalLight(0x4a4338,0.3); fill.position.set(80,40,-60); scene.add(fill);

// --- terrain heightfield ---
let TERRAIN=null, HMAP=null, REGIONS=[], WORLD_SEED=1;
const REGION_TYPES=['forest','silica','ash','ruins','graves','bog'];
function genRegions(seed){
  const r=mulberry32(seed*7+13); const regs=[];
  // dead-givers (forest/graves) land in the NEAR band; waste/ruin fields fill mid+far
  const forced=['forest','silica','ash','graves','ruins','bog','forest','graves'];
  const n=16+((r()*4)|0);                  // 16-19 fields across the bigger valley
  const a0=r()*6.28;                        // random world rotation
  for(let i=0;i<n;i++){
    const ang=a0 + i*(6.283/n) + r()*0.4;   // EVEN angular slots -> no empty wedges in any direction
    const band=i%3;                         // near / mid / far cycle -> every direction gets a near field too
    const dist=(band===0? 16+r()*16 : band===1? 40+r()*22 : 70+r()*30);
    regs.push({type:i<forced.length?forced[i]:REGION_TYPES[(r()*REGION_TYPES.length)|0],
      x:Math.cos(ang)*dist, z:Math.sin(ang)*dist, rad:12+r()*10, seed:(r()*1e6)|0});
  }
  REGIONS=regs; return regs;
}
function regionAt(x,z){ let best=null; for(const g of REGIONS){ const d=Math.hypot(x-g.x,z-g.z);
  if(d<g.rad){ const t=1-d/g.rad; if(!best||t>best.t) best={reg:g,t}; } } return best; }
// rolling hills + central settlement basin + a winding ash-river channel (procedural per seed)
function terrainHeight(x,z){
  const d=Math.hypot(x,z)/HALF;
  const hills=(fbm(x*0.028+10,z*0.028+20)-0.5)*13;
  const ridge=(fbm(x*0.075-5,z*0.075+5)-0.5)*5;
  let h=hills+ridge+4.2;                 // lift the whole valley above the ash line so it is DRY LAND, not a sunken sea
  const rv=Math.abs(fbm(x*0.018-7,z*0.018+3)-0.5);
  if(rv<0.06) h-=8*(1-rv/0.06);          // ash rivers carve back below the waterline (the only standing water now)
  const shelf=Math.exp(-Math.pow(d*1.5,2));
  h=h*(1-shelf*0.8)+1.2*(shelf*0.8);     // settlement shelf: a level dry plateau the spawn sits on
  return h;
}
const BIOME_HSL={ forest:[0.26,0.24,0.27], silica:[0.10,0.07,0.5], ash:[0.03,0.12,0.15],
  ruins:[0.58,0.09,0.33], graves:[0.31,0.13,0.31], bog:[0.22,0.22,0.23] };
function biomeColor(x,z,h,slope){
  const c=new THREE.Color();
  if(h<-4) c.setHSL(0.08,0.08,0.17); else if(h<-1) c.setHSL(0.09,0.13,0.25);
  else if(h<6) c.setHSL(0.10,0.14,0.33); else c.setHSL(0.08,0.08,0.45);
  const rg=regionAt(x,z);
  if(rg){ const b=BIOME_HSL[rg.reg.type]; const bc=new THREE.Color().setHSL(b[0],b[1],b[2]);
    const t=Math.pow(rg.t,0.5)*0.95; c.lerp(bc,t); }
  // mottled ground: fine high-freq grain only, so the floor reads as textured dirt (NOT big smooth blobs)
  const patch=(fbm(x*0.13+3,z*0.13-2)-0.5)*0.17 + (fbm(x*0.55,z*0.55)-0.5)*0.08;
  c.offsetHSL((fbm(x*0.09,z*0.09)-0.5)*0.04, (fbm(x*0.21-5,z*0.21)-0.5)*0.12, patch - clamp(slope*0.7,0,0.45)*0.4);
  return c;
}
function buildTerrain(){
  const geo=new THREE.PlaneGeometry(WORLD_SIZE,WORLD_SIZE,TSEG,TSEG);
  geo.rotateX(-Math.PI/2);
  const pos=geo.attributes.position; HMAP={};
  for(let i=0;i<pos.count;i++){
    const x=pos.getX(i), z=pos.getZ(i);
    const h=terrainHeight(x,z); pos.setY(i,h);
  }
  geo.computeVertexNormals();
  // vertex colors from height + slope
  const colors=[];
  const up=new THREE.Vector3(0,1,0), nrm=geo.attributes.normal;
  for(let i=0;i<pos.count;i++){
    const x=pos.getX(i), z=pos.getZ(i), h=pos.getY(i);
    const n=new THREE.Vector3(nrm.getX(i),nrm.getY(i),nrm.getZ(i));
    const slope=1-clamp(n.dot(up),0,1);
    const c=biomeColor(x,z,h,slope); colors.push(c.r,c.g,c.b);
  }
  geo.setAttribute('color',new THREE.Float32BufferAttribute(colors,3));
  const mat=new THREE.MeshStandardMaterial({vertexColors:true,flatShading:true,roughness:1,metalness:0});
  TERRAIN=new THREE.Mesh(geo,mat); TERRAIN.receiveShadow=false; scene.add(TERRAIN);

  // ash/water pools: a dark translucent plane at the sink level
  const wgeo=new THREE.PlaneGeometry(WORLD_SIZE,WORLD_SIZE,1,1); wgeo.rotateX(-Math.PI/2);
  const wmat=new THREE.MeshStandardMaterial({color:0x0c0f12,transparent:true,opacity:0.6,roughness:0.4,metalness:0.2});
  const water=new THREE.Mesh(wgeo,wmat); water.position.y=-2.7; scene.add(water);
}

// --- scattered desolation: dead trees, rocks, broken futurist monoliths ---
const decoGroup=new THREE.Group(); scene.add(decoGroup);
function makeDeadTree(){
  const g=new THREE.Group();
  const th=rr(2.2,4.2);
  const trunk=new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.22,th,5),
    new THREE.MeshStandardMaterial({color:0x16140f,flatShading:true,roughness:1}));
  trunk.position.y=th/2; g.add(trunk);
  const nB=2+rint(4);
  for(let i=0;i<nB;i++){
    const bl=rr(0.6,1.5);
    const b=new THREE.Mesh(new THREE.CylinderGeometry(0.04,0.09,bl,4),trunk.material);
    b.position.y=th*rr(0.55,0.95);
    b.rotation.z=rr(-1,1); b.rotation.x=rr(-1,1);
    b.position.x=Math.sin(i)*0.1; g.add(b);
  }
  return g;
}
function makeRock(){
  const s=rr(0.45,1.2);
  const m=new THREE.Mesh(new THREE.DodecahedronGeometry(s,0),
    new THREE.MeshStandardMaterial({color:0x202227,flatShading:true,roughness:1}));
  m.rotation.set(rr(0,6),rr(0,6),rr(0,6)); m.position.y=s*0.4; return m;
}
function makeMonolith(){
  // broken futurist pylon: tall dark slab with a faint cyan emissive seam (the only tech in the world)
  const g=new THREE.Group();
  const h=rr(5,11), w=rr(0.8,1.6);
  const slab=new THREE.Mesh(new THREE.BoxGeometry(w,h,w*0.5),
    new THREE.MeshStandardMaterial({color:0x121318,flatShading:true,roughness:0.9,metalness:0.3}));
  slab.position.y=h/2; slab.rotation.y=rr(0,6); slab.rotation.z=rr(-0.12,0.12); g.add(slab);
  const seam=new THREE.Mesh(new THREE.BoxGeometry(w*0.12,h*rr(0.3,0.7),w*0.52),
    new THREE.MeshBasicMaterial({color:0x2c6f78}));
  seam.position.y=h*rr(0.3,0.55); g.add(seam);
  return g;
}
function scatterDecor(){
  for(let i=0;i<150;i++){
    const x=rr(-HALF+2,HALF-2), z=rr(-HALF+2,HALF-2);
    const d=Math.sqrt(x*x+z*z)/HALF; if(d<0.28) continue; // keep settlement shelf clear
    const h=terrainHeight(x,z); if(h<-2.5) continue;
    let o; const r=rnd();
    if(r<0.62) o=makeDeadTree(); else if(r<0.86) o=makeRock(); else o=makeMonolith();
    o.position.x=x; o.position.z=z; o.position.y+=h;
    o.scale.multiplyScalar(rr(0.8,1.3));
    decoGroup.add(o);
  }
}

// --- drifting ash / ember particles ---
let ash=null;
function buildAsh(){
  const N=420, g=new THREE.BufferGeometry(), p=new Float32Array(N*3);
  for(let i=0;i<N;i++){ p[i*3]=rr(-HALF,HALF); p[i*3+1]=rr(0,22); p[i*3+2]=rr(-HALF,HALF); }
  g.setAttribute('position',new THREE.Float32BufferAttribute(p,3));
  const m=new THREE.PointsMaterial({color:0x6a6256,size:0.12,transparent:true,opacity:0.5,depthWrite:false,fog:true});
  ash=new THREE.Points(g,m); scene.add(ash);
}
function stepAsh(dt){
  if(!ash)return; const p=ash.geometry.attributes.position;
  for(let i=0;i<p.count;i++){ let y=p.getY(i)-dt*0.6; let x=p.getX(i)+Math.sin((y+i)*0.3)*dt*0.3;
    if(y<0){y=22;} p.setY(i,y); p.setX(i,x); } p.needsUpdate=true;
}

// --- a few tiny carrion birds drifting at the inner edge of the fog (render-only, Math.random) ---
let birds=null, birdList=[];
function buildBirds(){
  if(birds) scene.remove(birds); birdList=[];
  birds=new THREE.Group(); birds.frustumCulled=false; scene.add(birds);
  const N=5;   // extremely few, extremely small — just a flicker of life out in the murk
  const mat=new THREE.MeshBasicMaterial({color:0x0e1016,transparent:true,opacity:0.82,fog:true,side:THREE.DoubleSide});
  const wingGeo=new THREE.PlaneGeometry(0.5,0.13);
  for(let i=0;i<N;i++){
    const g=new THREE.Group();
    const wl=new THREE.Mesh(wingGeo,mat), wr=new THREE.Mesh(wingGeo,mat);
    wl.position.x=-0.27; wr.position.x=0.27; g.add(wl); g.add(wr);
    const sc=0.6+Math.random()*0.5; g.scale.setScalar(sc);   // all small; faint size variation
    const b={ g, wl, wr, theta:Math.random()*Math.PI*2, radius:50+Math.random()*26,   // out at the fog's inner edge
      y:5+Math.random()*6, dir:Math.random()<0.5?1:-1, speed:0.05+Math.random()*0.05,
      flap:6+Math.random()*3, phase:Math.random()*Math.PI*2, bobAmp:0.6+Math.random()*0.5 };
    birds.add(g); birdList.push(b);
  }
}
function stepBirds(dt){
  if(!birds)return;
  for(const b of birdList){ b.theta+=b.dir*b.speed*dt; b.phase+=b.flap*dt;
    const x=Math.cos(b.theta)*b.radius, z=Math.sin(b.theta)*b.radius;
    const y=b.y+Math.sin(b.phase*0.4)*b.bobAmp;   // gentle altitude drift
    b.g.position.set(x,y,z);
    b.g.rotation.y=-b.theta+(b.dir>0?Math.PI:0);   // face the direction of travel
    const f=0.2+Math.abs(Math.sin(b.phase))*0.5;   // wing flap
    b.wl.rotation.z=f; b.wr.rotation.z=-f;
  }
}

// --- environment: sky, endless flats, and a vast DEAD-MEGACITY horizon (no boring cones) ---
function buildEnvironment(){
  // big sky dome whose BOTTOM matches the fog horizon exactly -> seamless, no visible edge, no black
  const skyGeo=new THREE.SphereGeometry(1000,32,20);
  const skyMat=new THREE.ShaderMaterial({ side:THREE.BackSide, depthWrite:false, depthTest:false, fog:false,
    uniforms:{ topc:{value:new THREE.Color(0x0f141b)}, botc:{value:new THREE.Color(HORIZON)} },
    vertexShader:"varying vec3 vp; void main(){ vp=position; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}",
    fragmentShader:"varying vec3 vp; uniform vec3 topc; uniform vec3 botc;"+
      "void main(){ float h=clamp(normalize(vp).y*0.62+0.38,0.0,1.0); gl_FragColor=vec4(mix(botc,topc,pow(h,0.7)),1.0);} " });
  const sky=new THREE.Mesh(skyGeo,skyMat); sky.renderOrder=-1; sky.frustumCulled=false; scene.add(sky);

  // endless outer flats (gentle far dunes) so the play area never shows a hard edge
  const og=new THREE.Mesh(new THREE.PlaneGeometry(1600,1600,60,60),
    new THREE.MeshStandardMaterial({color:0x33352f,flatShading:true,roughness:1}));
  og.rotateX(-Math.PI/2);
  const op=og.geometry.attributes.position;
  for(let i=0;i<op.count;i++){ const x=op.getX(i),z=op.getZ(i); const r=Math.hypot(x,z);

// the ruin of a colossal arcology on the horizon: layered shattered megatowers, a fallen ring,
// tilted slabs and smokestacks — silhouetted, fading into fog, threaded with dim cyan rifts.
function buildMegacityHorizon(){
  const dark=new THREE.MeshStandardMaterial({color:0x10131a,flatShading:true,roughness:1,metalness:0.2});
  const darker=new THREE.MeshStandardMaterial({color:0x0c0e14,flatShading:true,roughness:1,metalness:0.2});
  const riftMat=new THREE.MeshBasicMaterial({color:0x2f6f78});
  const grp=new THREE.Group(); scene.add(grp);
  // three concentric belts of broken towers (parallax depth). Towers are INSTANCED — ~150 of them
  // collapse to 2 draw calls instead of 150 meshes.
  const belts=[{rad:150,n:60,hmin:24,hmax:70,mat:dark},{rad:200,n:50,hmin:40,hmax:120,mat:dark},{rad:270,n:42,hmin:60,hmax:180,mat:darker}];
  const total=belts.reduce((s,b)=>s+b.n,0), box=new THREE.BoxGeometry(1,1,1);
  const towersDark=new THREE.InstancedMesh(box,dark,total), towersDk=new THREE.InstancedMesh(box,darker,total);
  let nd=0,nk=0; const M=new THREE.Matrix4(),Q=new THREE.Quaternion(),E=new THREE.Euler(),P=new THREE.Vector3(),S=new THREE.Vector3();
  for(const b of belts){
    for(let i=0;i<b.n;i++){
      const a=(i/b.n)*6.283+rr(-0.05,0.05), rad=b.rad+rr(-25,25);
      const h=rr(b.hmin,b.hmax), w=rr(8,22), d=rr(8,22);
      const px=Math.cos(a)*rad, py=h/2-10, pz=Math.sin(a)*rad, ry=rr(0,6), rz=rr(-0.16,0.16);
      E.set(0,ry,rz); Q.setFromEuler(E); P.set(px,py,pz); S.set(w,h,d); M.compose(P,Q,S);
      if(b.mat===darker) towersDk.setMatrixAt(nk++,M); else towersDark.setMatrixAt(nd++,M);
      if(rnd()<0.4){ const cap=new THREE.Mesh(new THREE.CylinderGeometry(0,w*0.4,rr(10,30),4),b.mat);
        cap.position.set(px,py+h/2,pz); cap.rotation.set(0,ry,rz); grp.add(cap); }
      if(b.rad<210 && rnd()<0.5){ const seam=new THREE.Mesh(new THREE.BoxGeometry(0.6,h*rr(0.3,0.7),0.6),riftMat);
        seam.position.set(px,py+rr(-h*0.2,h*0.2),pz+d*0.5); grp.add(seam); }
    }
  }
  towersDark.count=nd; towersDk.count=nk; towersDark.instanceMatrix.needsUpdate=true; towersDk.instanceMatrix.needsUpdate=true;
  towersDark.frustumCulled=false; towersDk.frustumCulled=false; grp.add(towersDark); grp.add(towersDk);
  // a colossal fallen ring-structure half-sunk on the far horizon (the dead arcology's halo)
  const ring=new THREE.Mesh(new THREE.TorusGeometry(120,9,8,40),darker);
  ring.position.set(-120,40,-230); ring.rotation.set(1.15,0.5,0.3); grp.add(ring);
  const ring2=new THREE.Mesh(new THREE.TorusGeometry(80,6,6,32),darker);
  ring2.position.set(250,20,-120); ring2.rotation.set(1.4,-0.4,0.2); grp.add(ring2);
}

const Cam={ target:new THREE.Vector3(0,1,0), az:Math.PI*0.25, el:0.72, dist:46, minD:16, maxD:86 };  // bounded zoom — you can't pull back to see the whole atlas
function updateCamera(){
  const ce=clamp(Cam.el,0.5,1.4);
  const cx=Cam.target.x+Cam.dist*Math.cos(ce)*Math.sin(Cam.az);
  let cy=Cam.target.y+Cam.dist*Math.sin(ce);
  const cz=Cam.target.z+Cam.dist*Math.cos(ce)*Math.cos(Cam.az);

const SHROUD=[]; const FOG_TILE=18, FOG_REVEAL_BLD=30, FOG_REVEAL_HOME=46, FOG_OP=0.6; let shroudGroup=null, _shroudGeo=null;
function buildShroud(){
  if(shroudGroup) scene.remove(shroudGroup); SHROUD.length=0;
  shroudGroup=new THREE.Group(); scene.add(shroudGroup);
  // low, wide, overlapping slabs (not tall cubes) — jittered into ragged banks of murk. Visual-only Math.random.
  if(!_shroudGeo) _shroudGeo=new THREE.BoxGeometry(FOG_TILE*1.5,6,FOG_TILE*1.5);
  for(let x=-HALF+FOG_TILE/2; x<HALF; x+=FOG_TILE) for(let z=-HALF+FOG_TILE/2; z<HALF; z+=FOG_TILE){
    const op=FOG_OP*(0.86+Math.random()*0.28);
    const mat=new THREE.MeshBasicMaterial({color:0x15171c,transparent:true,opacity:op,depthWrite:false,fog:true});
    const m=new THREE.Mesh(_shroudGeo,mat);
    const jx=x+(Math.random()-0.5)*FOG_TILE*0.4, jz=z+(Math.random()-0.5)*FOG_TILE*0.4;
    m.position.set(jx,1.6+Math.random()*1.6,jz); m.rotation.y=Math.random()*Math.PI;
    m.scale.set(0.9+Math.random()*0.5,0.8+Math.random()*0.7,0.9+Math.random()*0.5); m.renderOrder=4;

  }
}
function updateShroud(){ if(!SHROUD.length) return;
  for(const t of SHROUD){
    if(!t.revealed){ let near=false; for(const b of buildings){ if(Math.hypot(b.x-t.x,b.z-t.z)<FOG_REVEAL_BLD){ near=true; break; } } if(near)t.revealed=true; }

function payloadSpec(res){ const C=(RES[res]&&RES[res].col)||0x6b5a40;

    case 'ichor':   return {g:()=>new THREE.CylinderGeometry(0.1,0.12,0.36,7), col:C, emis:true};       // a vial of coolant
    case 'ingot':   return {g:()=>new THREE.BoxGeometry(0.44,0.16,0.18), col:C, metal:true};            // a silicon bar
    case 'wafer':   return {g:()=>new THREE.CylinderGeometry(0.23,0.23,0.05,12), col:C, rx:0.18};       // a stack of wafer discs

const PROLOGUE=[

let tutIdx=0, tutDone=false, _tutShown=-1;
function loadTut(){ try{ tutDone=localStorage.getItem('sf_tut')==='done'; }catch(e){} }
function skipTut(){ tutDone=true; try{localStorage.setItem('sf_tut','done');}catch(e){} const g=$('goals'); if(g)g.style.display='none'; }
function updateTutorial(){ const g=$('goals'); if(!g) return;
  if(tutDone){ g.style.display='none'; return; }
  while(tutIdx<TUT.length && TUT[tutIdx].d()) tutIdx++;
  if(tutIdx>=TUT.length){ skipTut(); if(typeof toast==="function")toast("Tutorial complete. The foundry stands on its own now.","good"); return; }
  const step=TUT[tutIdx];
  g.style.display='block';
  if(tutIdx!==_tutShown){ _tutShown=tutIdx;
    g.innerHTML=`<div class="gh">Tutorial &middot; step ${tutIdx+1} of ${TUT.length}</div>
    <div class="gt">${step.t}</div>
    ${step.why?`<div class="gw">${step.why}</div>`:''}
    <div class="gbar"><i style="width:${Math.round(tutIdx/TUT.length*100)}%"></i></div>
    <div class="gp"><span class="gskip" onclick="skipTut()">skip tutorial</span></div>`; }
}
// green spotlight: highlight the UI element (or cemetery) the current tutorial step points at
function positionSpotlight(){ const s=document.getElementById('spot'), w=document.getElementById('wspot'); if(!s||!w) return;
  const step=(!tutDone && tutIdx<TUT.length)?TUT[tutIdx]:null;
  if(!step){ s.style.display='none'; w.style.display='none'; return; }
  let shown=false;
  if(step.sel){ const q=step.sel(); const el=q&&document.querySelector(q);
    if(el && el.getClientRects().length){ const r=el.getBoundingClientRect(); s.style.left=(r.left-5)+'px'; s.style.top=(r.top-5)+'px'; s.style.width=(r.width+10)+'px'; s.style.height=(r.height+10)+'px'; s.style.display='block'; shown=true; } }
  if(!shown) s.style.display='none';
  if(step.at){ const p=step.at();
    if(p){ const v=new THREE.Vector3(p.x,terrainHeight(p.x,p.z)+1.4,p.z); v.project(camera);
      if(v.z<1){ w.style.left=((v.x*0.5+0.5)*innerWidth)+'px'; w.style.top=((-v.y*0.5+0.5)*innerHeight)+'px'; w.style.display='block'; } else w.style.display='none'; }
    else w.style.display='none'; }

/* =====================================================================
   === SIM STEP (early): villagers + hearth flicker ===
   ===================================================================== */
let _ledgerT=0;
function simStep(dt){
  stepEconomy(dt); stepHusks(dt);
  G.autosaveT=(G.autosaveT==null?25:G.autosaveT)-dt; if(G.autosaveT<=0){ G.autosaveT=25; if(shouldAutosave()) saveGame(); }
  // weather: a slow drift between clear air and ashfall — atmosphere, and a little tension
  G.wx=(G.wx||0)+dt*0.015; const af=clamp((Math.sin(G.wx)+Math.sin(G.wx*0.37)-0.55)/1.1,0,1);
  if(scene.fog) scene.fog.density=0.0072+af*0.0075;
  if(ash&&ash.material) ash.material.opacity=0.42+af*0.46;
  const heavy=af>0.62; if(heavy&&!G._ashOn){ G._ashOn=true; if(typeof toast==="function")toast("Ashfall sweeps down over the valley.","bad"); } else if(!heavy){ G._ashOn=false; }
  if(selected&&!selected.dead&&selected.obj){ Cam.target.lerp(new THREE.Vector3(selected.obj.position.x,selected.obj.position.y+0.6,selected.obj.position.z),0.05); }
  for(const b of buildings){ const ud=b.mesh.userData;
    if(b.built===false){ b.buildT-=dt; const p=clamp(1-b.buildT/b.buildTotal,0,1);
      b.mesh.scale.y=0.08+p*0.92;
      if(b._scaffold){ for(const c of b._scaffold.children){ if(c.material) c.material.opacity=0.72*(0.5+0.5*Math.sin(performance.now()/180+b.x)); } }
      if(b.buildT<=0){ b.built=true; b.mesh.scale.y=1;
        if(b._scaffold){ scene.remove(b._scaffold); b._scaffold=null; }
        if(typeof SND!=="undefined")SND.sfx('place'); if(typeof toast==="function")toast(b.def.name+" stands.","good"); }
      continue;   // no animation/production while under construction
    }
    if(b.kind==="pyre"&&ud.light){ const t=performance.now();
      ud.light.intensity=(b.active?2.8:0.5)+Math.sin(t/110)*0.5+Math.sin(t/53)*0.3;
      if(ud.flame){ ud.flame.scale.set(1+Math.sin(t/120)*0.08,1+Math.sin(t/80)*0.18,1+Math.cos(t/100)*0.08); ud.flame.rotation.y=Math.sin(t/200)*0.25; }
      if(ud.tongues){ ud.tongues[0].scale.y=1+Math.sin(t/70)*0.2; ud.tongues[2].scale.y=1+Math.sin(t/45)*0.35; } }
    if(ud.glow){ ud.glow.material.emissiveIntensity=(b.active?0.9:0.35)+Math.sin(performance.now()/200+b.x)*0.2; }
    if(ud.spin){ const m=b.active?1:0.12; for(const s of ud.spin) s.m.rotation[s.ax]+=s.sp*dt*m; }   // moving parts on procedural buildings
    if(ud.bob){ const t=performance.now()/1000; for(const o of ud.bob) o.m.position.y=o.y0+Math.sin(t*o.sp+o.ph)*o.amp*(b.active?1:0.2); }
    if(SMOKERS[b.kind]){ ensureSmoke(b); animateSmoke(b,dt); } }
  if(typeof updateShroud==="function") updateShroud();
  _ledgerT-=dt; if(_ledgerT<=0){ _ledgerT=0.35; renderLedger(); renderQuota(); renderAlert(); SND.setTension(G.dread/100); if(typeof updateTutorial==="function")updateTutorial(); if((selected&&!selected.dead)||selBld||selNode) refreshInspect(); }
}

function placeBuildingFree(k,x,z){ const def=BLD[k]; ensureBuildingGLB(k); const mesh=makeBuildingMesh(k,def); mesh.position.set(x,terrainHeight(x,z),z);
  scene.add(mesh); const b={kind:k,def,x,z,mesh,workers:[],prog:0,active:false,cyc:0}; buildings.push(b); groundBuilding(b); return b; }
function seedSettlement(){
  resetRunScore();
  G.stock.dead=70; G.stock.soulash=16; G.stock.bonesil=8; G.stock.ichor=6; G.stock.compute=10;
  placeBuildingFree("pyre",0,0);
  placeBuildingFree("den",7,4); placeBuildingFree("den",-7,4);
  placeBuildingFree("stockpile",0,-7);   // the hub — visible from the first moment
  // husks start idle and bound; the tutorial walks the player through raising the line themselves
  for(let i=0;i<9;i++){ const a=rr(0,6.28), r=rr(3,8); spawnVillager(Math.cos(a)*r, Math.sin(a)*r, pick(["worker","worker","stump","reaper"])); }
  renderLedger(); buildRail(); buildDock(); renderQuota();
}

/* =====================================================================
   === SAVE / LOAD: the foundry persists itself to localStorage ===
   ===================================================================== */
function serializeState(){
  return { v:1, seed:WORLD_SEED,
    G:{ stock:Object.assign({},G.stock), writ:G.writ, dread:G.dread, popCap:G.popCap, grow:G.grow, time:G.time||0,
        quota:{need:G.quota.need,period:G.quota.period,t:G.quota.t,level:G.quota.level}, tech:Object.assign({},G.tech||{}) },
    paths:[...PATHS],
    buildings: buildings.map(b=>({k:b.kind,x:b.x,z:b.z,prog:b.prog||0,cyc:b.cyc||0})),
    nodes: nodes.map(n=>({t:n.type,x:n.x,z:n.z,a:n.amount,max:n.max})),
    villagers: villagers.filter(v=>!v.dead).map(v=>({c:v.caste,x:v.obj.position.x,z:v.obj.position.z,r:v.resolve,
        b:v.assigned?buildings.indexOf(v.assigned):-1, cr:v.carryRes||null, ca:v.carryAmt||0, job:v.job||"idle"})) };
}
function restorePath(rx,rz){ const k=pathKey(rx,rz); if(PATHS.has(k))return; PATHS.add(k);
  if(!pathGroup){ pathGroup=new THREE.Group(); scene.add(pathGroup); }
  const q=new THREE.Mesh(new THREE.BoxGeometry(1.15,0.14,1.15),MAT(0x3a342a)); q.position.set(rx,terrainHeight(rx,rz)+0.07,rz); pathGroup.add(q); }
function clearDynamic(){
  for(const b of buildings){ if(typeof removeSmoke==="function")removeSmoke(b); if(b._scaffold){ scene.remove(b._scaffold); b._scaffold=null; } scene.remove(b.mesh); } buildings.length=0;
  for(const v of villagers) scene.remove(v.obj); villagers.length=0;
  for(const n of nodes) scene.remove(n.mesh); nodes.length=0;
  PATHS.clear(); if(pathGroup){ scene.remove(pathGroup); pathGroup=null; }
}
function applySave(s){
  if(!s||!s.G) return false;
  clearDynamic();
  Object.assign(G.stock,s.G.stock); G.writ=s.G.writ; G.dread=s.G.dread; G.popCap=s.G.popCap; G.grow=s.G.grow; G.time=s.G.time||0; G.over=null; G.breach=0;
  G.quota={need:s.G.quota.need,period:s.G.quota.period,t:s.G.quota.t,level:s.G.quota.level}; G.tech=Object.assign({},s.G.tech||{});
  for(const n of (s.nodes||[])){ const nn=placeNode(n.t,n.x,n.z); nn.amount=n.a; nn.max=n.max; if(nn.amount<=0) depleteNode(nn); }
  for(const b of (s.buildings||[])){ const bb=placeBuildingFree(b.k,b.x,b.z); bb.prog=b.prog||0; bb.cyc=b.cyc||0; }
  for(const k of (s.paths||[])){ const rz=(k%4096)-1024, rx=Math.floor(k/4096)-1024; restorePath(rx,rz); }
  for(const vd of (s.villagers||[])){ const v=spawnVillager(vd.x,vd.z,vd.c); v.resolve=vd.r; v.carryRes=vd.cr||null; v.carryAmt=vd.ca||0; v.job=vd.job||"idle";
    if(vd.b>=0 && buildings[vd.b]) assignHusk(v,buildings[vd.b]); }
  if(typeof renderLedger==="function"){ renderLedger(); renderQuota(); buildRail(); buildDock(); }
  return true;
}
function shouldAutosave(){ return (G.mode||'campaign')==='campaign'; }   // challenge runs never clobber the campaign save
function saveGame(){ try{ localStorage.setItem('sf_save',JSON.stringify(serializeState())); return true; }catch(e){ return false; } }
function readSave(){ try{ const s=localStorage.getItem('sf_save'); return s?JSON.parse(s):null; }catch(e){ return null; } }
function loadGame(){ const s=readSave(); if(!s||!s.buildings||!s.buildings.length) return false;
  try{ applySave(s); if(typeof toast==="function") toast("The foundry stirs from where you left it."); return true; }
  catch(e){ if(console&&console.warn)console.warn("load failed",e); return false; } }

// parse a challenge/share URL: ?mode=challenge&seed=42&dur=1200 (dur must be a known preset)
function parseParams(search){ const p=new URLSearchParams(search||''); const out={mode:null,seed:null,dur:null};
  const m=p.get('mode'); if(m==='challenge'||m==='campaign') out.mode=m;
  const s=p.get('seed'); if(s!=null && s!=='' && isFinite(+s)) out.seed=(+s)|0;
  const d=p.get('dur'); if(d!=null && [600,1200,1800].includes(+d)) out.dur=+d;
  return out; }
function start(){
  setGrain(getGrain()); loadTut();
  const params=parseParams(location.search);
  const save=readSave();
  loadVillager(ok=>{
    if(params.mode==='challenge'){
      G.mode='challenge'; G.challengeDur=params.dur||600;
      bootWorld(params.seed!=null?params.seed:null); seedSettlement(); resetRunScore(); G.time=0; G.over=null; G.endedChallenge=false;
      paused=true; if(typeof buildRail==="function") buildRail();
      setTimeout(()=>{ try{ if(typeof showModePicker==="function") showModePicker(params); }catch(e){} }, 600);
      return;
    }
    bootWorld(save?save.seed:null);
    if(!(save&&loadGame())){ seedSettlement(); setTimeout(()=>{ try{ if(typeof showModePicker==="function") showModePicker(params);
      else { let seen=false; try{seen=localStorage.getItem('sf_prologue')==='seen';}catch(e){} if(seen)showHelp(); else showPrologue(); } }catch(e){} }, 700); }
    paused=true; if(typeof buildRail==="function") buildRail();   // start paused — let the player read in and look around first
  });
}
function beginPlay(){ paused=false; if(typeof buildRail==="function")buildRail(); }
addEventListener('beforeunload',()=>{ try{ if(!G.over && shouldAutosave()) saveGame(); }catch(e){} });
function toast(msg,type){ const t=document.createElement('div'); t.className='toast'+(type?' '+type:''); t.textContent=msg;
  $('toasts').appendChild(t); setTimeout(()=>{t.style.transition='opacity .5s';t.style.opacity=0;setTimeout(()=>t.remove(),500);},3200); }
start();

function scatterWorld(){
  // each region becomes a readable FIELD: clustered resource nodes + dense matching props
  for(const g of REGIONS){
    const rg=mulberry32(g.seed);
    const inReg=(spread)=>{ const a=rg()*6.28, d=rg()*g.rad*(spread||0.92);
      return [clamp(g.x+Math.cos(a)*d,-HALF+3,HALF-3), clamp(g.z+Math.sin(a)*d,-HALF+3,HALF-3)]; };
    const nNodes=2+(rg()*2|0);
    const addNodes=(type,n)=>{ for(let k=0;k<n;k++){ const [x,z]=inReg(0.7); if(terrainHeight(x,z)<-3.2)continue; tryPlaceNode(type,x,z,7); } };
    const addProps=(maker,n,rot)=>{ for(let k=0;k<n;k++){ const [x,z]=inReg(1.0); if(terrainHeight(x,z)<-3.2||Math.hypot(x,z)<13)continue; dropProp(maker(),x,z,rot); } };  // keep region decoration out of the spawn pad
    if(g.type==='forest'){ addNodes('grave',nNodes+1); addProps(()=>makeDeadTree2(rr(0.7,1.5)),20,true); addProps(()=>makeBonePile(),3); }
    else if(g.type==='silica'){ addNodes('waste',3); addProps(()=>makeShard(),16,true); addProps(()=>makeRock(),5); }
    else if(g.type==='ash'){ addNodes('waste',3); addProps(()=>makeAshMound(),16); addProps(()=>makeDeadTree2(rr(0.6,1.0)),4,true); }
    else if(g.type==='ruins'){ addNodes('waste',2); addProps(()=>makeWreck(),8,true); addProps(()=>makeMonolith(),3); addProps(()=>makeServerTower(),6,true); }
    else if(g.type==='graves'){ addNodes('grave',3); addProps(()=>makeBonePile(),16); addProps(()=>makeRock(),4); }
    else { addNodes('grave',2); addProps(()=>makeAshMound(),9); addProps(()=>makeDeadTree2(rr(0.6,1.1)),9,true); }
  }
  // SPAWN GRAVEYARD — a dense ring of harvestable deposits (real models) right around the
  // settlement, close and reachable, so the dead are at hand from the first minute
  for(let k=0;k<13;k++){ const a=rr(0,6.28), rad=rr(13,31); const x=Math.cos(a)*rad, z=Math.sin(a)*rad;
    if(terrainHeight(x,z)<-2.8) continue; tryPlaceNode(k%5===4?'waste':'grave', x, z, 7); }
  // MATERIAL FIELD — clickable, harvestable deposits spread across the dry valley, well spaced (no clumping/clipping)
  for(let k=0;k<56;k++){ const x=rr(-HALF+6,HALF-6), z=rr(-HALF+6,HALF-6);
    if(terrainHeight(x,z)<-2.6||Math.hypot(x,z)<13||regionAt(x,z)) continue; tryPlaceNode(rnd()<0.6?'grave':'waste', x, z, 8); }
  // dense trees, rocks and bone heaps hugging the spawn so the start never reads barren
  for(let k=0;k<35;k++){ const a=rr(0,6.28), rad=rr(7,32); const x=Math.cos(a)*rad, z=Math.sin(a)*rad;
    if(terrainHeight(x,z)<-3.0||Math.hypot(x,z)<13) continue; const r=rnd();
    dropProp(r<0.5?makeDeadTree2(rr(0.7,1.5)):r<0.74?makeRock():r<0.9?makeBonePile():makeShard(), x,z, r<0.5); }
  // ambient props across the open land (denser, closer to centre — leave only a small build clearing)
  for(let i=0;i<90;i++){ const x=rr(-HALF+3,HALF-3), z=rr(-HALF+3,HALF-3);
    if(Math.hypot(x,z)<13) continue; if(terrainHeight(x,z)<-3.2) continue; if(regionAt(x,z)) continue;
    const r=rnd(); dropProp(r<0.45?makeDeadTree2(rr(0.6,1.2)):r<0.7?makeRock():r<0.86?makeBonePile():makeAshMound(), x,z, r<0.45);
  }
  // stark white grave-markers staked across the dark land
  for(let i=0;i<18;i++){ const x=rr(-HALF+4,HALF-4), z=rr(-HALF+4,HALF-4);
    if(Math.hypot(x,z)<8) continue; if(terrainHeight(x,z)<-3.2) continue;
    dropProp(rnd()<0.74?makeGraveCross():makeBoneRing(), x,z, false);
  }
  // a stand of stark white grave-markers right around the settlement (highly readable)
  for(let i=0;i<15;i++){ const a=rr(0,6.28), rad=rr(10,42); const x=Math.cos(a)*rad, z=Math.sin(a)*rad;
    if(terrainHeight(x,z)<-3.0) continue; dropProp(rnd()<0.72?makeGraveCross():makeBoneRing(), x,z, false); }
  // dead server-towers carry the datacenter/machine motif across the desolation
  for(let i=0;i<20;i++){ const a=rr(0,6.28), r=rr(16,HALF-6); const x=Math.cos(a)*r, z=Math.sin(a)*r;
    if(terrainHeight(x,z)<-3.2||regionAt(x,z)) continue; dropProp(makeServerTower(),x,z,true); }
  // landmark silhouettes seeded through the mid-band so the walk out is never an empty grey gap
  for(let i=0;i<16;i++){ const a=rr(0,6.28), rad=rr(18,56); const x=Math.cos(a)*rad, z=Math.sin(a)*rad;
    if(terrainHeight(x,z)<-3.2||regionAt(x,z)) continue; const r=rnd();
    dropProp(r<0.42?makeMonolith():r<0.74?makeWreck():makeServerTower(), x,z, r>=0.42&&r<0.74); }
  // a denser desolate ring reaching from the buildable shelf out to the fields, so nothing sits on bare plain
  for(let i=0;i<55;i++){ const a=rr(0,6.28), rad=rr(11,52); const x=Math.cos(a)*rad, z=Math.sin(a)*rad;
    if(terrainHeight(x,z)<-3.0) continue; const r=rnd();
    dropProp(r<0.4?makeDeadTree2(rr(0.7,1.4)):r<0.62?makeBonePile():r<0.8?makeRock():r<0.92?makeAshMound():(rnd()<0.5?makeGraveCross():makeBoneRing()), x,z, r<0.4); }
  scatterGroundDetail();
}
// tens of thousands of instanced props (one draw call each) — a dense desolate floor that never reads blank
function scatterGroundDetail(){
  const M=new THREE.Matrix4();
  const mk=(geo,mat,count,yfn,sfn,minH,clear)=>{ const im=new THREE.InstancedMesh(geo,mat,count); let n=0;
    for(let i=0;i<count;i++){ const x=rr(-HALF,HALF), z=rr(-HALF,HALF); const h=terrainHeight(x,z); if(h<(minH||-3.4))continue; if(Math.hypot(x,z)<(clear||13))continue;
      const s=sfn(); M.makeScale(s.x,s.y,s.z); M.setPosition(x,h+yfn(s),z); im.setMatrixAt(n++,M); }
    im.count=n; im.instanceMatrix.needsUpdate=true; im.frustumCulled=false; scene.add(im); return im; };
  mk(new THREE.DodecahedronGeometry(0.6,0), MAT(0x53565d), 440, s=>0.12, ()=>{const a=rr(0.4,1.9);return{x:a,y:a*rr(0.5,1),z:a};});       // pale rubble & stones
  mk(new THREE.DodecahedronGeometry(0.7,0), MAT(0x6b6760), 55, s=>0.16, ()=>{const a=rr(0.6,1.4);return{x:a,y:a*rr(0.5,0.9),z:a};}, -3.4, 24);   // boulders: smaller + held well clear of spawn     // bigger boulders (read from afar)
  mk(new THREE.ConeGeometry(0.13,1.2,4), MAT(0x444a33), 700, s=>s.y*0.45, ()=>{const a=rr(0.6,2.5);return{x:1,y:a,z:1};});               // dead grass tufts
  mk(new THREE.IcosahedronGeometry(0.24,0), MAT(0x655f50), 330, s=>0.1, ()=>{const a=rr(0.4,1.5);return{x:a,y:a*0.6,z:a};});             // bone-grey debris
  mk(new THREE.BoxGeometry(0.5,0.18,0.5), MAT(0x564c3e), 160, s=>0.06, ()=>{const a=rr(0.6,2.2);return{x:a,y:1,z:a*rr(0.6,1)};});       // broken slabs / dirt
  mk(new THREE.IcosahedronGeometry(0.17,0), MAT(0xbab296), 220, s=>0.08, ()=>{const a=rr(0.35,1.15);return{x:a,y:a*0.5,z:a};}, -3.0, 7);  // pale scattered BONES (high contrast)
  // DEAD FOREST — a blanket of leaning bare snags, the main readable texture from above
  const snagGeo=new THREE.CylinderGeometry(0.03,0.33,4.8,5);
  const snags=new THREE.InstancedMesh(snagGeo, MAT(0x171309), 120); let tn=0;
  const TM=new THREE.Matrix4(),TQ=new THREE.Quaternion(),TE=new THREE.Euler(),TP=new THREE.Vector3(),TS=new THREE.Vector3();
  for(let i=0;i<120;i++){ const x=rr(-HALF,HALF), z=rr(-HALF,HALF), h=terrainHeight(x,z); if(h<-3.0||Math.hypot(x,z)<13) continue;
    const sc=rr(0.5,1.4); TE.set(rr(-0.18,0.18),rr(0,6),rr(-0.18,0.18)); TQ.setFromEuler(TE); TP.set(x,h+2.4*sc,z); TS.set(sc,sc,sc);
    TM.compose(TP,TQ,TS); snags.setMatrixAt(tn++,TM); }
  snags.count=tn; snags.instanceMatrix.needsUpdate=true; snags.frustumCulled=false; scene.add(snags);
  // shorter forked stumps
  const stubGeo=new THREE.CylinderGeometry(0.18,0.36,1.2,5);
  const stubs=new THREE.InstancedMesh(stubGeo, MAT(0x221a12), 70); let sn=0;
  for(let i=0;i<70;i++){ const x=rr(-HALF,HALF), z=rr(-HALF,HALF), h=terrainHeight(x,z); if(h<-3.0||Math.hypot(x,z)<5) continue;
    const sc=rr(0.6,1.7); TE.set(rr(-0.2,0.2),rr(0,6),rr(-0.2,0.2)); TQ.setFromEuler(TE); TP.set(x,h+0.6*sc,z); TS.set(sc,sc,sc);
    TM.compose(TP,TQ,TS); stubs.setMatrixAt(sn++,TM); }
  stubs.count=sn; stubs.instanceMatrix.needsUpdate=true; stubs.frustumCulled=false; scene.add(stubs);
  // dead bramble — low dark forked clumps for ground chaos between the snags
  const bramGeo=new THREE.ConeGeometry(0.5,0.7,5);
  const bram=new THREE.InstancedMesh(bramGeo, MAT(0x14110b), 190); let bn=0;
  for(let i=0;i<190;i++){ const x=rr(-HALF,HALF), z=rr(-HALF,HALF), h=terrainHeight(x,z); if(h<-3.0) continue;
    const sc=rr(0.5,1.7); TE.set(rr(-0.3,0.3),rr(0,6),rr(-0.3,0.3)); TQ.setFromEuler(TE); TP.set(x,h+0.25*sc,z); TS.set(sc*rr(0.8,1.5),sc*rr(0.5,1),sc*rr(0.8,1.5));
    TM.compose(TP,TQ,TS); bram.setMatrixAt(bn++,TM); }
  bram.count=bn; bram.instanceMatrix.needsUpdate=true; bram.frustumCulled=false; scene.add(bram);
}
function nearestNode(type,x,z){ let best=null,bd=1e9; for(const n of nodes){ if(n.type!==type||n.amount<=0)continue;
  const d=(n.x-x)*(n.x-x)+(n.z-z)*(n.z-z); if(d<bd){bd=d;best=n;} } return best?{node:best,dist:Math.sqrt(bd)}:null; }
// the stockpile is the physical hub: gatherers deliver raw matter here, refiners fetch from here
function nearestStockpile(x,z){ let best=null,bd=1e9; for(const b of buildings){ if(b.kind!=="stockpile")continue;
  const d=(b.x-x)*(b.x-x)+(b.z-z)*(b.z-z); if(d<bd){bd=d;best=b;} } return best; }
function hubAt(x,z){ return nearestStockpile(x,z) || buildings.find(b=>b.kind==="pyre") || {x:0,z:0,def:{foot:2.2}}; }

const DREAD_THROTTLE_MIN=0.35;
// challenge soft-loss: max Dread throttles output (never ends the run). Campaign uses the breach-loss instead.
function dreadThrottle(d){ const f=clamp(d/100,0,1); return 1-(1-DREAD_THROTTLE_MIN)*f; }
// blended challenge score — Compute rendered is the spine; bonuses for throughput, workforce, peak rate.
const SCORE_W_COMPUTE=100, SCORE_W_DEAD=3, SCORE_W_HUSK=30, SCORE_W_PEAK=20;
function computeScore(c,d,h,p){ return Math.round((c||0)*SCORE_W_COMPUTE + (d||0)*SCORE_W_DEAD + (h||0)*SCORE_W_HUSK + (p||0)*SCORE_W_PEAK); }

  reaper:{ exhumer:0.7,dredge:0.7, crematory:1.4, furnace:0.95,mill:0.95, litho:1.3, ossuary:1.35,substation:1.0, datacenter:1.35,market:1.0 },

function affinity(caste,kind){ const a=AFFINITY[caste]||AFFINITY.worker; return (a&&a[kind]!=null)?a[kind]:1.0; }
// the stage a caste is built for (for tooltips/codex)
function casteRole(c){ return c==='stump'?'Extractor — best at the Exhumer, Dredge and hauling; crude at fine work.'
  : c==='reaper'?'Renderer — best at the Crematory, Litho, Ossuary and Datacenter; resists Dread; poor at extraction.'
  : 'Generalist — steady at any post, master of none.'; }
const PATHS=new Set(); let pathGroup=null;
function pathKey(x,z){ return (Math.round(x)+1024)*4096+(Math.round(z)+1024); }
function onPath(x,z){ return PATHS.has(pathKey(x,z)); }
function addPath(x,z){ const rx=Math.round(x),rz=Math.round(z),k=pathKey(rx,rz);
  if(PATHS.has(k)||Math.hypot(rx,rz)>HALF-1||terrainHeight(rx,rz)<-3.4) return false;
  if((G.stock.dead||0)<(BLD.path.cost.dead||0)) return false; G.stock.dead-=(BLD.path.cost.dead||0); PATHS.add(k);
  if(!pathGroup){ pathGroup=new THREE.Group(); scene.add(pathGroup); }
  const q=new THREE.Mesh(new THREE.BoxGeometry(1.15,0.14,1.15),MAT(0x3a342a)); q.position.set(rx,terrainHeight(rx,rz)+0.07,rz); pathGroup.add(q); return true; }

function canAfford(cost){ for(const r in cost) if((G.stock[r]||0)<cost[r]) return false; return true; }
function payCost(cost){ for(const r in cost) G.stock[r]-=cost[r]; }
// storage capacity is dynamic: a base, plus every Reliquary Yard (stockpile) you raise
function storageCap(r){ let cap=STORE; for(const b of buildings){ if(b.kind==="stockpile") cap+=b.def.store||0; } return cap; }
function addStock(r,n){ G.stock[r]=clamp((G.stock[r]||0)+n,0,storageCap(r)); }
function storeRoom(r){ return (G.stock[r]||0)<storageCap(r); }
function pileFill(r){ return clamp((G.stock[r]||0)/storageCap(r),0,1); }   // 0..1 of a resource's bin — drives the visible material piles
// research "Rites": permanent multipliers bought with Writ
function techMul(kind){ const t=G.tech||{};
  if(kind==='gather') return t.tools?1.25:1;
  if(kind==='carry')  return t.callous?1.3:1;
  if(kind==='path')   return t.roads?1.18:1;
  if(kind==='warmth') return t.embers?1.4:1;
  if(kind==='ward')   return t.warding?1.3:1;
  return 1; }

const BLD_GLB={};   // every building is procedural now — no GLB models
const BLD_GLB_CDN={};
const bldBank={}, bldLoading={};
// lazy: a building's AI model streams in the first time you raise that type — keeps first load light,
// and the procedural mesh stands in until the GLB arrives and swaps itself in.
function ensureBuildingGLB(kind){ if(!BLD_GLB[kind]||bldBank[kind]||bldLoading[kind]) return; bldLoading[kind]=true;
  loadGLB(BLD_GLB[kind], BLD_GLB_CDN[kind], g=>{ bldBank[kind]=g.scene; swapBuildingMeshes(kind); }, ()=>{}); }
function makeBuildingGLB(kind,def){
  const src=bldBank[kind]; let obj; try{ obj=THREE.SkeletonUtils?THREE.SkeletonUtils.clone(src):src.clone(true); }catch(e){ obj=src.clone(true); }
  obj.traverse(o=>{ if(o.isMesh){ o.frustumCulled=false; } });
  let wd=1; try{ const b=new THREE.Box3().setFromObject(obj); wd=Math.max(b.max.x-b.min.x,b.max.z-b.min.z); }catch(e){}
  let s=(wd>0.1&&wd<80)?(def.foot*1.8/wd):1; s=clamp(s,0.1,8); obj.scale.setScalar(s);
  try{ const b2=new THREE.Box3().setFromObject(obj); obj.position.y=-b2.min.y; }catch(e){}
  const wrap=new THREE.Group(); wrap.add(obj); return wrap;
}
function swapBuildingMeshes(kind){ for(const b of buildings){ if(b.kind!==kind) continue;
  const np=makeBuildingGLB(kind,b.def); np.position.copy(b.mesh.position); scene.remove(b.mesh); b.mesh=np; scene.add(np); } }
/* ---- material stockpiles: a yard whose piles physically rise & fall with your stores (the #1 'sauce') ---- */
const PILE_RES=["dead","bonesil","soulash","ichor","ingot","wafer","die","core"];
function pileGeo(res){ switch(res){
  case "dead":    return {g:new THREE.SphereGeometry(0.46,6,5), h:0.9};         // a heap of corpses
  case "bonesil": return {g:new THREE.ConeGeometry(0.46,1.0,5), h:1.0};         // pale bone-silica sand
  case "soulash": return {g:new THREE.ConeGeometry(0.52,0.8,6), h:0.8};         // soul-ash mound
  case "ichor":   return {g:new THREE.CylinderGeometry(0.4,0.42,1.0,8), h:1.0}; // ichor cistern (coolant)
  case "ingot":   return {g:new THREE.BoxGeometry(0.8,1.0,0.5), h:1.0};         // silicon ingots
  case "wafer":   return {g:new THREE.BoxGeometry(0.7,1.0,0.7), h:1.0};         // wafer cassettes
  case "die":     return {g:new THREE.IcosahedronGeometry(0.46,0), h:0.92};     // etched dies
  default:        return {g:new THREE.IcosahedronGeometry(0.4,0), h:0.8};       // reliquary cores
}}
function makeStockpile(def){
  // the Reliquary Yard: a haunted foundry yard — dark timber + bone uprights, an ossuary backboard
  // with hung relics and a faint ember soul-lantern. (Just one subtle dark panel nods to the machine.)
  const g=new THREE.Group();
  const timber=MAT(0x2b251c), dark=MAT(0x1b1712), plank=MAT(0x352d22);
  const bone=MAT(0xb3a98f); const ember=emis(0xc9772a);
  const W=3.8, D=2.2;
  const plat=new THREE.Mesh(new THREE.BoxGeometry(W,0.2,D),timber); plat.position.y=0.1; g.add(plat);
  // bone corner uprights, each capped with a tiny skull
  for(const sx of [-1,1]) for(const sz of [-1,1]){ const post=new THREE.Mesh(new THREE.CylinderGeometry(0.08,0.1,1.55,6),bone);
    post.position.set(sx*(W/2-0.14),0.88,sz*(D/2-0.14)); g.add(post);
    const sk=new THREE.Mesh(new THREE.IcosahedronGeometry(0.12,0),bone); sk.position.set(sx*(W/2-0.14),1.7,sz*(D/2-0.14)); g.add(sk); }
  // an ossuary backboard of dark planks, with hung bone relics
  const back=new THREE.Mesh(new THREE.BoxGeometry(W*0.92,1.15,0.16),plank); back.position.set(0,0.92,-(D/2-0.18)); g.add(back);
  for(let i=0;i<3;i++){ const rx=-(W*0.3)+i*(W*0.3); const rib=new THREE.Mesh(new THREE.TorusGeometry(0.16,0.03,5,10,3.4),bone); rib.position.set(rx,0.95,-(D/2-0.26)); rib.rotation.z=0.2; g.add(rib);
    const hang=new THREE.Mesh(new THREE.CylinderGeometry(0.012,0.012,0.34,4),bone); hang.position.set(rx,1.28,-(D/2-0.26)); g.add(hang); }
  // one subtle dark machine panel with a single faint ember line (the only nod to the foundry/compute)
  const panel=new THREE.Mesh(new THREE.BoxGeometry(0.6,0.5,0.06),dark); panel.position.set(W*0.3,0.78,-(D/2-0.27)); g.add(panel);
  const seam=new THREE.Mesh(new THREE.BoxGeometry(0.5,0.03,0.02),ember); seam.material.emissiveIntensity=0.5; seam.position.set(W*0.3,0.78,-(D/2-0.31)); g.add(seam);
  // a reliquary soul-lantern: a bone urn with a faint ember glow inside
  const urn=new THREE.Mesh(new THREE.CylinderGeometry(0.16,0.2,0.42,7),bone); urn.position.set(-W*0.3,0.74,-(D/2-0.28)); g.add(urn);
  const soul=new THREE.Mesh(new THREE.IcosahedronGeometry(0.1,0),ember); soul.material.emissiveIntensity=0.7; soul.position.set(-W*0.3,0.82,-(D/2-0.28)); g.add(soul);
  g.userData.glow=soul;
  const piles=[]; const cols=4, cellX=W/cols, cellZ=D/2, top=0.22;
  PILE_RES.forEach((res,i)=>{ const cx=-(W/2)+cellX*((i%cols)+0.5), cz=-(D/2)+cellZ*(((i/cols)|0)+0.5)+0.18;
    const bin=new THREE.Mesh(new THREE.BoxGeometry(cellX*0.82,0.13,cellZ*0.74),dark); bin.position.set(cx,top,cz); g.add(bin);
    const rim=new THREE.Mesh(new THREE.BoxGeometry(cellX*0.84,0.04,cellZ*0.76),bone); rim.position.set(cx,top+0.06,cz); g.add(rim);
    const pg=pileGeo(res); try{ pg.g.translate(0,pg.h/2,0); }catch(e){}   // anchor at base so it grows upward
    const opt=(res==="ichor")?{metalness:0.3,roughness:0.35}:null;
    const pile=new THREE.Mesh(pg.g, MAT(RES[res].col,opt)); pile.position.set(cx,top+0.08,cz); pile.scale.y=0.02; pile.visible=false;
    g.add(pile); piles.push({res,node:pile}); });
  g.userData.piles=piles; g.userData.isStockpile=true;
  return g;
}
// scale each pile to its bin's fill every frame — the economy made physical
function updateStockpiles(){ for(const b of buildings){ if(b.kind!=="stockpile"||!b.mesh||!b.mesh.userData.piles) continue;
  for(const p of b.mesh.userData.piles){ const f=pileFill(p.res); p.node.visible=f>0.012; p.node.scale.y=Math.max(0.02,f); } } }
// ---- chimney smoke for the rendering buildings (render-only; uses Math.random so it never desyncs the sim) ----
const SMOKERS={crematory:3.2, furnace:3.0, ossuary:2.8};   // emit height ~ the roofline, so smoke rises off the top, not the middle
function ensureSmoke(b){ if(b._smoke||!SMOKERS[b.kind]) return; const puffs=[];
  for(let i=0;i<5;i++){ const m=new THREE.Mesh(new THREE.IcosahedronGeometry(0.26,0),
    new THREE.MeshStandardMaterial({color:0x6b665d,transparent:true,opacity:0,flatShading:true,roughness:1,depthWrite:false}));
    m.renderOrder=5; m._life=Math.random(); scene.add(m); puffs.push(m); }
  b._smoke=puffs; b._smokeBase=terrainHeight(b.x,b.z)+SMOKERS[b.kind]; }
function removeSmoke(b){ if(b._smoke){ for(const m of b._smoke) scene.remove(m); b._smoke=null; } }
function animateSmoke(b,dt){ if(!b._smoke) return;
  for(const m of b._smoke){ if(!b.active){ m.visible=false; continue; } m.visible=true;
    m._life+=dt*0.42; if(m._life>1) m._life-=1; const l=m._life;
    m.position.set(b.x+Math.sin(l*8+b.x*3)*(0.12+l*0.3), b._smokeBase+l*1.9, b.z+Math.cos(l*7+b.z*3)*(0.12+l*0.3));   // narrow at the base, drifts out as it rises
    const sc=0.26+l*1.3; m.scale.set(sc,sc,sc); m.material.opacity=0.5*(1-l)*Math.min(1,l*7); } }

// the Substation: a soul-ash burner that reads as POWER — a dark transformer with bone

  // two transformer drums with glowing soul-ash cores
  for(const sx of [-0.5,0.5]){ const drum=new THREE.Mesh(new THREE.CylinderGeometry(0.34,0.36,0.78,9),iron); drum.position.set(sx,0.66,0); g.add(drum);
    for(let r=0;r<4;r++){ const fin=new THREE.Mesh(new THREE.TorusGeometry(0.38,0.03,5,12),iron); fin.rotation.x=Math.PI/2; fin.position.set(sx,0.42+r*0.16,0); g.add(fin); }
    const core=new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.12,0.84,6),ember); core.material.emissiveIntensity=0.7; core.position.set(sx,0.66,0); g.add(core);
    // bone insulator stack on top
    for(let k=0;k<3;k++){ const ins=new THREE.Mesh(new THREE.CylinderGeometry(0.1-k*0.02,0.13-k*0.02,0.12,7),bone); ins.position.set(sx,1.1+k*0.13,0); g.add(ins); } }

  g.userData.glow=grate;   // a mesh; the building tick pulses ud.glow.material.emissiveIntensity
  return g;
}

// Etch-Litho — a sigil press: a gantry over a spinning wafer bed, a glowing etch-beam, bone-capped columns.
function makeLitho(def){ const g=new THREE.Group();

/* settle a placed building into the world: face the Pyre, sink a foundation skirt, scatter matching debris */
function groundBuilding(b){
  const def=b.def, m=b.mesh; if(def.kind==="path") return;
  if(b.kind!=="pyre") m.rotation.y = Math.atan2(-b.x,-b.z) + rr(-0.28,0.28);   // turn to face the settlement centre
  const fr=(def.foot||1.6)*0.92;
  if(b.kind!=="pyre" && b.kind!=="stockpile"){   // these carry their own stone base
    const skirt=new THREE.Mesh(new THREE.CylinderGeometry(fr*0.96,fr*1.16,0.55,8),MAT(0x191712)); skirt.position.y=-0.18; m.add(skirt);
    for(let i=0;i<5;i++){ const a=rr(0,6.28); const st=new THREE.Mesh(new THREE.DodecahedronGeometry(rr(0.16,0.32),0),MAT(0x23252b));
      st.position.set(Math.cos(a)*fr,rr(-0.05,0.12),Math.sin(a)*fr); st.rotation.set(rr(0,3),rr(0,3),rr(0,3)); m.add(st); } }
  scatterAround(b,fr);
}
function scatterAround(b,fr){
  // a FEW small bits of debris hugging a new building — kept small (never bigger than the building) and sparse
  const def=b.def; const R=fr+1.0, n=rint(3);               // 0-2 props, often none
  for(let i=0;i<n;i++){ const a=rr(0,6.28), d=R+rr(0.2,1.0), x=b.x+Math.cos(a)*d, z=b.z+Math.sin(a)*d; if(terrainHeight(x,z)<-3.2) continue;
    const r=rnd(); let o;
    if(def.kind==="gather") o=(r<0.6)?makeBonePile():makeShard();
    else if(def.kind==="refine"||def.kind==="datacenter") o=(r<0.6)?makeBonePile():makeServerTower();
    else o=makeBonePile();
    o.scale.multiplyScalar(rr(0.35,0.6));                   // small — debris, not boulders
    dropProp(o,x,z,true); }
  if(rnd()<0.4){ const a=rr(0,6.28), d=R+0.3; const cr=makeGraveCross(); cr.scale.multiplyScalar(0.7); dropProp(cr, b.x+Math.cos(a)*d, b.z+Math.sin(a)*d, false); }
}
function buildingFits(x,z,foot){
  if(Math.hypot(x,z)>HALF-foot) return false;
  if(terrainHeight(x,z)<-15) return false;          // only the very deepest ash-river channels are unbuildable
  for(const b of buildings){ if(Math.hypot(b.x-x,b.z-z) < (b.def.foot+foot)*0.5) return false; }
  for(const n of nodes){ if(Math.hypot(n.x-x,n.z-z) < 2.0+foot*0.4) return false; }
  return true;
}
