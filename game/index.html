  const m=new THREE.MeshStandardMaterial({color:0x9c9079,flatShading:true,roughness:1,transparent:true,opacity:0.72});
  for(const sx of [-1,1])for(const sz of [-1,1]){ const p=new THREE.Mesh(new THREE.CylinderGeometry(0.05,0.06,h,5),m); p.position.set(sx*r,h/2,sz*r); g.add(p); }
  for(const yy of [0.55,1.45]){ for(const sz of [-1,1]){ const bar=new THREE.Mesh(new THREE.BoxGeometry(2*r,0.05,0.05),m); bar.position.set(0,yy,sz*r); g.add(bar); }
    for(const sx of [-1,1]){ const bar=new THREE.Mesh(new THREE.BoxGeometry(0.05,0.05,2*r),m); bar.position.set(sx*r,yy,0); g.add(bar); } }
  for(let i=0;i<2;i++){ const pk=new THREE.Mesh(new THREE.BoxGeometry(0.06,h*1.15,0.06),m); pk.position.set((i?r:-r)*0.55,h*0.5,(i?-r:r)*0.55); pk.rotation.z=i?0.28:-0.28; g.add(pk); }
  return g; }
function placeBuilding(kind,x,z){
  const def=BLD[kind]; if(!buildingFits(x,z,def.foot)) return null; if(!canAfford(def.cost)) return null;
  payCost(def.cost); ensureBuildingGLB(kind);
  const mesh=makeBuildingMesh(kind,def); mesh.position.set(x,terrainHeight(x,z),z); scene.add(mesh);
  const b={kind,def,x,z,mesh,workers:[],prog:0,active:false,cyc:0};
  buildings.push(b); groundBuilding(b);
  // raise it over time: the mesh rises out of the ground inside a scaffold cage
  b.built=false; b.buildTotal=b.buildT=buildTime(def); mesh.scale.y=0.08;
  b._scaffold=makeScaffold(def); b._scaffold.position.set(x,terrainHeight(x,z),z); scene.add(b._scaffold);
  return b;
}
function buildingWorkSpot(b,i){ const ang=(i/Math.max(1,b.def.workers))*6.28; const r=b.def.foot*0.8+0.6;
  return {x:b.x+Math.cos(ang)*r, z:b.z+Math.sin(ang)*r}; }
function assignHusk(v,b){ if(v.assigned){ const a=v.assigned.workers; const k=a.indexOf(v); if(k>=0)a.splice(k,1); }
  v.assigned=b; v.job="toJob"; v.carryRes=null; v.carryAmt=0; if(b){ b.workers.push(v); } }
function buildingNeedsWorkers(b){ return b.workers.length<b.def.workers && (b.def.kind==="gather"||b.def.kind==="refine"||b.def.kind==="datacenter"||b.def.kind==="market"); }

/* ---- collision: circular obstacles (buildings) + husk movement/animation ---- */
let OBS=[];
function rebuildObstacles(){ OBS=buildings.map(b=>({x:b.x,z:b.z,r:b.def.foot*0.6+0.45})); }
const HUSK_R=0.5;
function moveHusk(v,tx,tz,dt,stop){
  stop=stop||0.6; const o=v.obj;
  const dx=tx-o.position.x, dz=tz-o.position.z, d=Math.hypot(dx,dz);
  if(d<stop){ if(v.act)v.act.timeScale=0; return true; }
  const sp=v.speed*(onPath(o.position.x,o.position.z)?1.35*techMul('path'):1)*dt;
  // steer AROUND buildings in the way (instead of grinding into them), but never around the one we're heading to
  let dirx=dx/d, dirz=dz/d;
  for(const ob of OBS){ if(Math.hypot(ob.x-tx,ob.z-tz)<ob.r+1.2) continue;        // that's our destination — approach it
    const ox=ob.x-o.position.x, oz=ob.z-o.position.z, od=Math.hypot(ox,oz), R=ob.r+HUSK_R+0.7;
    if(od<R && od>0.001 && (ox*dirx+oz*dirz)/od>0.15){ let tnx=-oz/od, tnz=ox/od; if(tnx*dirx+tnz*dirz<0){ tnx=-tnx; tnz=-tnz; }
      const w=clamp((R-od)/R,0,1)*1.5; dirx+=tnx*w; dirz+=tnz*w; } }
  // local avoidance: veer around nearby husks — radial push away + a consistent tangential swirl so
  // approaching husks slide past instead of shoving through each other (position-only, deterministic)
  for(const v2 of villagers){ if(v2===v||v2.dead) continue; const p2=v2.obj.position;
    const ox=p2.x-o.position.x, oz=p2.z-o.position.z, od2=ox*ox+oz*oz, AR=1.35;
    if(od2<AR*AR && od2>1e-4){ const od=Math.sqrt(od2), w=(AR-od)/AR, ux=ox/od, uz=oz/od;
      dirx+=(-ux)*w*1.2 + (-uz)*w*0.45; dirz+=(-uz)*w*1.2 + (ux)*w*0.45; } }
  { const dl=Math.hypot(dirx,dirz)||1; dirx/=dl; dirz/=dl; }
  let nx=o.position.x+dirx*sp, nz=o.position.z+dirz*sp;
  for(const ob of OBS){ const ex=nx-ob.x, ez=nz-ob.z, ed=Math.hypot(ex,ez), R=ob.r+HUSK_R;
    if(ed<R){ if(ed<0.001){ nx=ob.x+R; } else { nx=ob.x+ex/ed*R; nz=ob.z+ez/ed*R; } } }
  o.position.x=nx; o.position.z=nz; o.position.y=terrainHeight(nx,nz);
  o.rotation.y=lerpAngle(o.rotation.y,Math.atan2(dx,dz),0.22);
  if(v.act)v.act.timeScale=1.1;
  if(v.proc){ const ud=o.userData;
    if(v.caste==="stump"){ // a big stump dragging itself: both arms reach forward then pull, body lurches, slow
      v.phase+=dt*2.4; const reach=Math.sin(v.phase);
      if(ud.arms[0])ud.arms[0].rotation.x=-0.5-reach*0.85; if(ud.arms[1])ud.arms[1].rotation.x=-0.5-reach*0.85;
      o.position.y+=Math.max(0,reach)*0.07; o.rotation.z=Math.sin(v.phase*0.5)*0.04;
    } else { v.phase+=dt*9; const sw=Math.sin(v.phase)*0.5;
      if(ud.legs[0])ud.legs[0].rotation.x=sw; if(ud.legs[1])ud.legs[1].rotation.x=-sw;
      if(ud.arms[0])ud.arms[0].rotation.x=-sw*0.6; if(ud.arms[1])ud.arms[1].rotation.x=sw*0.6;
      o.position.y+=Math.abs(Math.sin(v.phase))*0.05; } }
  if(v.staticGLB){ v.phase+=dt*4; o.rotation.z=Math.sin(v.phase*0.5)*0.04; o.position.y+=Math.abs(Math.sin(v.phase))*0.025; } // hunched reaper shuffle
  return false;
}
function separateHusks(){
  const A=villagers; for(let i=0;i<A.length;i++){ const a=A[i]; if(a.dead)continue; const ap=a.obj.position;
    for(let j=i+1;j<A.length;j++){ const b=A[j]; if(b.dead)continue; const bp=b.obj.position;
      let dx=bp.x-ap.x, dz=bp.z-ap.z, d=dx*dx+dz*dz;
      if(d<1.0 && d>0.0001){ d=Math.sqrt(d); const push=(1.0-d)*0.5, ux=dx/d, uz=dz/d;
        ap.x-=ux*push; ap.z-=uz*push; bp.x+=ux*push; bp.z+=uz*push; } } }
}

/* ---- husk job state machine (replaces idle wander) ---- */
function stepHusks(dt){
  rebuildObstacles();
  for(const v of villagers){
    if(v.dead) continue;
    if(v.carryMesh){ const carrying=v.carryAmt>0.1; v.carryMesh.visible=carrying;
      if(carrying){ if(v.carryRes!==v._payRes){ v._payRes=v.carryRes; applyPayload(v); }
        const s=0.62+Math.min(1,v.carryAmt/12)*0.55; v.carryMesh.scale.set(s,s,s);
        if(v._payBaseY!=null) v.carryMesh.position.y=v._payBaseY; } }
    const b=v.assigned;
    if(!b){ // idle until assigned: stand still, only the rare slow shuffle near the Pyre
      v.restock-=dt;
      if(v.restock<=0){ v.restock=rr(16,34);
        if(rnd()<0.12){ const hb=buildings.find(x=>x.kind==="pyre"); const cx=hb?hb.x:0,cz=hb?hb.z:0; v.tx=cx+rr(-5,5); v.tz=cz+rr(-5,5); }
        else { v.tx=v.obj.position.x; v.tz=v.obj.position.z; } }
      moveHusk(v,v.tx,v.tz,dt,0.9); continue;
    }
    if(b.def.kind==="gather"){
      if(v.job==="toJob"||v.job==="toNode"){
        const nn=nearestNode(b.def.nodeType,b.x,b.z);
        if(!nn){ const ws=buildingWorkSpot(b,b.workers.indexOf(v)); moveHusk(v,ws.x,ws.z,dt,0.7); v.job="toNode"; continue; }
        v.tnode=nn.node;
        if(moveHusk(v,nn.node.x,nn.node.z,dt,2.0)) v.job="harvest";
      } else if(v.job==="harvest"){
        const n=v.tnode;
        if(b.built===false){ workAnim(v,dt); continue; }   // wait while the post is still being raised
        if(!n||n.amount<=0){ v.job="toNode"; continue; }
        const cap=(CARRY[v.caste]||7)*techMul('carry'), rate=(GRATE[v.caste]||5)*techMul('gather');
        const take=Math.min(rate*dt, n.amount, cap-v.carryAmt);
        n.amount-=take; v.carryAmt+=take; v.carryRes=b.def.res;
        if(n.amount<=0) depleteNode(n);
        if(v.carryAmt>=cap-0.01 || (n.amount<=0)) v.job="toDrop";
        workAnim(v,dt);   // clawing at the node
      } else if(v.job==="toDrop"){   // haul the raw matter to the stockpile hub
        const hub=hubAt(b.x,b.z), hf=(hub.def?hub.def.foot:2.2)*0.6+1.3;
        if(moveHusk(v,hub.x,hub.z,dt,hf)){ addStock(v.carryRes,v.carryAmt); v.carryAmt=0; v.carryRes=null; v.job="toNode"; if(typeof onDeposit==="function")onDeposit(b); }
      }
    } else if(b.def.kind==="market"){ // market: tend the stall in place
      const ws=buildingWorkSpot(b,Math.max(0,b.workers.indexOf(v)));
      v.atWork=moveHusk(v,ws.x,ws.z,dt,0.7);
      if(v.atWork){ v.obj.rotation.y=lerpAngle(v.obj.rotation.y,Math.atan2(b.x-v.obj.position.x,b.z-v.obj.position.z),0.1); workAnim(v,dt); }
    } else { // refine / datacenter: fetch inputs from the stockpile, carry them to the machine, then tend it
      if(v.job!=="toSource"&&v.job!=="toRefiner"&&v.job!=="tend") v.job="toSource";
      if(v.job==="toSource"){ v.atWork=false; const hub=hubAt(b.x,b.z), hf=(hub.def?hub.def.foot:2.2)*0.6+1.2;
        if(moveHusk(v,hub.x,hub.z,dt,hf)){ const inps=b.def.recipe?Object.keys(b.def.recipe.in):[]; v.carryRes=inps.length?inps[rint(inps.length)]:null; v.carryAmt=v.carryRes?4:0; v.job="toRefiner"; } }
      else if(v.job==="toRefiner"){ v.atWork=false; const ws=buildingWorkSpot(b,Math.max(0,b.workers.indexOf(v)));
        if(moveHusk(v,ws.x,ws.z,dt,0.8)){ v.carryAmt=0; v.carryRes=null; v.job="tend"; v.tendT=rr(2.2,3.6); } }
      else { v.atWork=true; v.obj.rotation.y=lerpAngle(v.obj.rotation.y,Math.atan2(b.x-v.obj.position.x,b.z-v.obj.position.z),0.1); workAnim(v,dt);
        v.tendT=(v.tendT||0)-dt; if(v.tendT<=0) v.job="toSource"; }
    }
  }
  separateHusks();
}
/* a working motion at a post (so staffed husks labour in place instead of standing or grinding into the wall) */
function workAnim(v,dt){ const o=v.obj; v.wphase=(v.wphase||0)+dt*5; const s=Math.sin(v.wphase);
  if(v.act) v.act.timeScale=0;
  if(v.proc){ const ud=o.userData;
    if(ud.arms&&ud.arms[0])ud.arms[0].rotation.x=-0.7-Math.max(0,s)*1.0;
    if(ud.arms&&ud.arms[1])ud.arms[1].rotation.x=-0.7-Math.max(0,-s)*1.0;
    o.position.y=terrainHeight(o.position.x,o.position.z)+Math.abs(s)*0.04;
    if(v.caste==="stump") o.rotation.z=Math.sin(v.wphase*0.5)*0.05;
  } else { o.position.y=terrainHeight(o.position.x,o.position.z)+Math.abs(Math.sin(v.wphase*0.8))*0.045; o.rotation.z=Math.sin(v.wphase*0.45)*0.05; }
}
function huskStateLabel(v){ if(!v||!v.assigned) return "idle"; const k=v.assigned.def.kind;
  if(k==="gather") return v.job==="harvest"?"harvesting":v.job==="toDrop"?"hauling":"fetching";
  return v.atWork?"working":"walking over"; }
function depleteNode(n){ if(n.def.renew) return; n.amount=0; if(!n.mesh.userData.depleted){ n.mesh.userData.depleted=true;
  n.mesh.traverse(o=>{ if(o.isMesh&&o.material){ o.material=o.material.clone(); o.material.color&&o.material.color.multiplyScalar(0.5); o.material.emissiveIntensity&&(o.material.emissiveIntensity=0);} });
  n.mesh.scale.y*=0.6; } }

/* ---- random events: the dead world intrudes ---- */
const EVENTS=[
  {n:"A mass grave is uncovered — a windfall of the dead.", bad:false, f:()=>addStock('dead',rr(22,42))},
  {n:"A buried cache of soul-ash is found beneath the ruins.", bad:false, f:()=>addStock('soulash',rr(16,30))},
  {n:"Ichor wells up cold through the cracks.", bad:false, f:()=>addStock('ichor',rr(14,26))},
  {n:"A seam of bone-silica is unearthed.", bad:false, f:()=>addStock('bonesil',rr(18,34))},
  {n:"The backlog of the unprocessed dead presses in. Dread rises.", bad:true, f:()=>{ G.dread=clamp(G.dread+11,0,100); }},
  {n:"A power surge guts the grid.", bad:true, f:()=>{ G.stock.power=Math.max(0,(G.stock.power||0)-rr(6,14)); }},
];
function fireEvent(){ const e=pick(EVENTS); e.f(); if(typeof toast==="function")toast(e.n, e.bad?"bad":"good"); if(e.bad)SND.sfx('haunt'); }

/* ---- the economy tick ---- */
function stepEconomy(dt){
  if(G.over) return;
  const pop=villagers.filter(v=>!v.dead).length;
  // renewable nodes (groves/wells) slowly regrow so food + water are sustainable; finite ones push expansion
  for(const n of nodes){ if(n.def.renew && n.amount<n.max){ n.amount=Math.min(n.max,n.amount+n.def.renew*dt);
    if(n.mesh.userData.depleted && n.amount>n.max*0.2){ n.mesh.userData.depleted=false; n.mesh.scale.y/=0.6; } } }
  // husk upkeep (opex): soul-ash sustains the husks. Reapers are already past death and need none;
  // Stumps cost a touch more. Drain scales with who's actually bound. Forgiving, so you don't lose fast.
  let upDemand=0; for(const v of villagers){ if(!v.dead) upDemand+=(UPKEEP[v.caste]!=null?UPKEEP[v.caste]:0.015); }
  const upkeepOk=(G.stock.soulash||0)>0.01;
  if(upkeepOk) G.stock.soulash=Math.max(0,G.stock.soulash-upDemand*dt);
  // production (refine/datacenter); track crematories rendering the dead — that's what holds the backlog down
  let renderers=0;
  for(const b of buildings){
    if(b.def.kind!=="refine"&&b.def.kind!=="datacenter") continue;
    const presentW=b.workers.filter(w=>w.atWork&&!w.dead), present=presentW.length;
    const aff=present?presentW.reduce((s,w)=>s+affinity(w.caste,b.kind),0)/present:1;   // avg caste fit for this building
    const rec=b.def.recipe; const inOk=Object.keys(rec.in).every(r=>(G.stock[r]||0)>=rec.in[r]);
    const outOk=Object.keys(rec.out).every(r=>storeRoom(r));
    if(b.built!==false&&present>0&&inOk&&outOk){ b.active=true; b.prog+=dt*aff*(modeCfg().softLoss?dreadThrottle(G.dread):1); if(b.def.render)renderers++;
      if(b.prog>=rec.time){ b.prog-=rec.time;
        for(const r in rec.in){ G.stock[r]-=rec.in[r]; if(r==='dead'&&b.def.kind==='refine') G.deadRendered=(G.deadRendered||0)+rec.in[r]; }
        for(const r in rec.out){ addStock(r,rec.out[r]); if(r==='compute'){ G.computeRendered=(G.computeRendered||0)+rec.out[r]; G.rateWinAccum=(G.rateWinAccum||0)+rec.out[r]; } }
        b.cyc++; } }
    else b.active=false;
  }
  // Dread = the backlog of the unprocessed dead. It climbs as bodies pile up; rendering them (Crematories) + Wards hold it back.
  // No pressure during the opening grace, so a new player can find their feet.
  const grace=(G.time||0) < (G.graceT==null?150:G.graceT);
  let wards=0; for(const b of buildings) if(b.kind==="ward") wards+=1;
  const basePressure=(grace||!modeCfg().quota)?0:(G.basePressure||0.6);
  G.dread=clamp(G.dread + (basePressure - renderers*1.0 - wards*0.6*techMul('ward'))*dt, 0,100);
  // hauntings
  if(G.dread>55 && rnd()<0.03*dt*(G.dread/100)){ const cand=villagers.filter(v=>!v.dead&&v.assigned); if(cand.length){ const v=pick(cand); v.resolve=Math.max(0,v.resolve-0.25); SND.sfx('haunt'); if(typeof toast==="function")toast(v.name+" is gripped by a haunting.","bad"); } }
  // husk resolve: Reapers need no soul-ash and hold steady; others recover with it and decay without.
  for(const v of villagers){ if(v.dead) continue;
    const needsUpkeep=(UPKEEP[v.caste]!=null?UPKEEP[v.caste]:0.015)>0;
    const dr=needsUpkeep?(upkeepOk?0.02:-0.012):0.01;   // reapers slowly hold/recover regardless
    v.resolve=clamp(v.resolve+dr*dt,0,1);
    if(v.resolve<=0){ crumble(v); }
  }
  // population cap from dens — husks are BOUND at the Pyre, never spawned for free
  G.popCap=6+buildings.filter(b=>b.kind==="den").reduce((a,b)=>a+b.def.houses,0);
  // quota — frozen during the opening grace
  if(modeCfg().quota && !grace){ G.quota.t-=dt;
  if(G.quota.t<=0){ const need=G.quota.need;
    if((G.stock.compute||0)>=need){ G.stock.compute-=need; G.writ+=need*8; G.dread=Math.max(0,G.dread-12); G.quota.level++;
      G.quota.need=Math.ceil(need*1.4); SND.sfx('bell'); toast("Quota met. The engine endures. (Tithe paid: "+(need*8)+" Bones)","good");
      if(G.quota.level>WIN_LEVEL) endGame(true); }
    else { G.dread=clamp(G.dread+26,0,100); SND.sfx('deny'); toast("Quota missed — the backlog of the dead swells. Dread surges.","bad"); }
    G.quota.t=G.quota.period;
  } }
  // random events
  G.eventT=(G.eventT==null?60:G.eventT)-dt; if(G.eventT<=0 && G.time>15){ G.eventT=rr(55,95); fireEvent(); }
  // lose conditions
  if(!modeCfg().softLoss && villagers.filter(v=>!v.dead).length===0 && G.time>20) endGame(false,"extinct");
  if(!modeCfg().softLoss){ if(G.dread>=100){ G.breach=(G.breach||0)+dt; if(G.breach>=15) endGame(false,"breach"); } else G.breach=0; }
  else G.breach=0;
  // peak Compute-per-minute over a rolling PEAK_WIN window (deterministic; reads tallies only)
  G.rateWinT=(G.rateWinT==null?PEAK_WIN:G.rateWinT)-dt;
  if(G.rateWinT<=0){ const r=((G.rateWinAccum||0)/PEAK_WIN)*60; if(r>(G.peakRate||0)) G.peakRate=r; G.rateWinAccum=0; G.rateWinT=PEAK_WIN; }
  G.time=(G.time||0)+dt;
  if(modeCfg().timeLimit && (G.time||0)>=(G.challengeDur||0)) endChallenge();
  // sample total resources held over time for the economy line chart
  G.histT=(G.histT==null?0:G.histT)-dt;
  if(G.histT<=0){ G.histT=2.0; if(!G.resHist)G.resHist=[];
    let tot=0; for(const r of RES_ORDER) tot+=(G.stock[r]||0);
    G.resHist.push(tot); if(G.resHist.length>90)G.resHist.shift(); }
}
function crumble(v){ v.dead=true; SND.sfx('crumble'); scene.remove(v.obj); if(v.assigned){ const a=v.assigned.workers,k=a.indexOf(v); if(k>=0)a.splice(k,1);}
  const idx=villagers.indexOf(v); if(idx>=0)villagers.splice(idx,1); if(selected===v)clearInspect();
  toast("A husk crumbles back to ash.","bad"); }
// husks are BOUND at the Pyre from a corpse + Compute — never spawned for free
// capex tradeoff: a Stump is cheap on Compute but takes two corpses and is slow; a Reaper is
// dear on Compute but needs no upkeep and does the fine, high-value work; a Husk is the baseline.
const BIND_COST={ worker:{dead:1,compute:2}, stump:{dead:2,compute:1}, reaper:{dead:1,compute:4} };
function casteName(c){ return c==='stump'?'Stump':c==='reaper'?'Reaper':'Husk'; }
function bindHusk(caste){ caste=(caste==='stump'||caste==='reaper')?caste:'worker'; const cost=BIND_COST[caste];
  const cap=6+buildings.filter(b=>b.kind==="den").reduce((a,b)=>a+b.def.houses,0);
  if(villagers.filter(v=>!v.dead).length>=cap){ SND.sfx('deny'); toast("No room for another husk — raise a Bone Den.","bad"); return false; }
  if((G.stock.dead||0)<cost.dead || (G.stock.compute||0)<cost.compute){ SND.sfx('deny'); toast("Binding a "+casteName(caste)+" needs "+cost.dead+" corpse"+(cost.dead>1?"s":"")+" and "+cost.compute+" Compute.","bad"); return false; }
  G.stock.dead-=cost.dead; G.stock.compute-=cost.compute;
  const p=buildings.find(b=>b.kind==="pyre")||{x:0,z:0};
  spawnVillager(p.x+rr(-4,4),p.z+rr(-4,4),caste); SND.sfx('rise'); G.husksBoundRun=(G.husksBoundRun||0)+1;
  if(typeof renderLedger==="function")renderLedger(); if(typeof refreshInspect==="function")refreshInspect();
  toast("A "+casteName(caste)+" is bound to the foundry.","good"); return true; }
function endChallenge(){ if(G.over) return; G.over='time'; G.endedChallenge=true; paused=true;
  if(typeof SND!=="undefined") SND.sfx('bell');
  // NB: do NOT remove sf_save here — a challenge run must never clobber the campaign save
  if(typeof showChallengeEnd==="function") showChallengeEnd(); }
function endGame(win,why){ if(G.over)return; G.over=win?"win":"lose"; paused=true; SND.sfx(win?'win':'lose'); try{ localStorage.removeItem('sf_save'); }catch(e){}   // clear the autosave so Again/reload starts a fresh valley, not the moment before defeat
  if(typeof showEnd==="function") showEnd(win,why); }

/* === SECTION:CORE_END === */
</script>
