<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>THE SOUL FOUNDRY</title>
<style>
  /* ============================================================
     THE SOUL FOUNDRY — true-3D desolate colony sim
     Art-directed UI: aged iron + ash parchment, carved serif,
     warm ember accents on a dead grey world.
     ============================================================ */
  :root{
    --bg:#070809; --ink:#cabfa6; --ink-dim:#7d7866; --ink-bright:#ece2c8;
    --iron:#16171c; --iron2:#1d1f26; --iron3:#262834; --line:#33353f;
    --ember:#d98a3a; --ember-soft:#b8884e; --rot:#6f7a55; --blood:#9e3b2c;
    --cold:#5f7f86;
    --panel:rgba(18,19,24,0.92);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);color:var(--ink);
    font-family:'Iowan Old Style','Palatino Linotype','Georgia',serif;user-select:none;touch-action:none}
  #c{position:fixed;inset:0;display:block}
  .mono{font-family:ui-monospace,Menlo,Consolas,monospace}

  /* boot / fail screens */
  #boot{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;align-items:center;
    justify-content:center;background:radial-gradient(circle at 50% 40%,#14151a,#070809);gap:14px;text-align:center;padding:24px}
  #boot h1{font-size:34px;letter-spacing:5px;margin:0;color:var(--ink-bright);text-shadow:0 0 30px #d98a3a33}
  #boot .sub{color:var(--ember-soft);letter-spacing:3px;text-transform:uppercase;font-size:12px}
  #boot .bar{width:220px;height:3px;background:#222;border-radius:2px;overflow:hidden;margin-top:6px}
  #boot .bar>i{display:block;height:100%;width:30%;background:var(--ember);animation:load 1.1s ease-in-out infinite}
  @keyframes load{0%{margin-left:-30%}100%{margin-left:100%}}
  #boot .msg{color:var(--ink-dim);font-size:12px;min-height:16px}

  /* HUD frame pieces share this carved look */
  .frame{background:var(--panel);border:1px solid var(--line);
    box-shadow:0 6px 30px #000a, inset 0 1px 0 #ffffff0a;backdrop-filter:blur(3px)}
  .frame::before{content:"";position:absolute;inset:0;pointer-events:none;
    border:1px solid #000;opacity:.4;margin:2px}

  /* top ledger */
  #ledger{position:fixed;top:0;left:0;right:0;height:46px;z-index:30;display:flex;align-items:center;
    gap:0;padding:0 6px;overflow-x:auto;scrollbar-width:none;
    background:linear-gradient(#14151bf2,#0d0e12e0);border-bottom:1px solid var(--line)}
  #ledger::-webkit-scrollbar{display:none}
  .stat{display:inline-flex;align-items:center;gap:6px;padding:4px 11px;border-right:1px solid var(--line);flex:0 0 auto}
  .stat .ic{width:18px;height:18px;flex:0 0 auto}
  .stat .v{color:var(--ink-bright);font-variant-numeric:tabular-nums;font-size:14px}
  .stat .lbl{color:var(--ink-dim);font-size:10px;text-transform:uppercase;letter-spacing:.5px}
  .stat .rate{font-size:10px;color:var(--ink-dim);font-variant-numeric:tabular-nums}
  .rate.pos{color:var(--rot)} .rate.neg{color:var(--blood)}

  /* clock / quota banner */
  #quota{position:fixed;top:54px;left:50%;transform:translateX(-50%);z-index:28;padding:6px 16px;border-radius:4px;
    font-size:12px;letter-spacing:.5px;text-align:center;min-width:240px}
  #quota b{color:var(--ember)}

  /* right control rail */
  #rail{position:fixed;right:8px;top:56px;z-index:28;display:flex;flex-direction:column;gap:6px}
  .rbtn{width:40px;height:40px;border:1px solid var(--line);border-radius:6px;background:var(--iron2);
    color:var(--ink);font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer}
  .rbtn.on{border-color:var(--ember);color:var(--ember)}
  .rbtn:hover{border-color:var(--ember-soft)}

  /* bottom build dock */
  #dock{position:fixed;left:0;right:0;bottom:0;z-index:30;border-top:1px solid var(--line);
    background:linear-gradient(#0d0e12e0,#14151bf6)}
  #docktabs{display:flex;border-bottom:1px solid var(--line);overflow-x:auto;scrollbar-width:none}
  #docktabs::-webkit-scrollbar{display:none}
  .tab{flex:0 0 auto;padding:7px 16px;font-size:12px;letter-spacing:.5px;color:var(--ink-dim);cursor:pointer;border-right:1px solid var(--line)}
  .tab.on{color:var(--ember);background:#191b22;box-shadow:inset 0 -2px 0 var(--ember)}
  #dockrow{display:flex;gap:8px;padding:9px 8px;overflow-x:auto;min-height:104px;align-items:stretch;scrollbar-width:thin}
  #dockrow::-webkit-scrollbar{height:6px}#dockrow::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}
  .card{flex:0 0 auto;width:108px;border:1px solid var(--line);border-radius:6px;background:var(--iron2);
    padding:6px;cursor:pointer;display:flex;flex-direction:column;gap:4px;position:relative}
  .card:hover{border-color:var(--ember-soft)} .card.sel{border-color:var(--ember);box-shadow:0 0 0 1px var(--ember)}
  .card.locked{opacity:.45;filter:grayscale(.7)}
  .card .th{width:100%;height:58px;border-radius:4px;background:#0c0d11 center/cover no-repeat;border:1px solid #000}
  .card .nm{font-size:11px;line-height:1.15;color:var(--ink-bright);height:26px;overflow:hidden}
  .card .ct{font-size:10px;color:var(--ember-soft)}
  .card .lk{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;text-align:center;
    font-size:10px;color:#d8cbb0;background:#0a0b0ed8;border-radius:6px;padding:4px}

  /* contextual inspector (left) */
  #inspect{position:fixed;left:8px;top:56px;width:266px;max-height:calc(100% - 230px);overflow:auto;z-index:27;
    border-radius:8px;display:none;scrollbar-width:thin}
  #inspect.show{display:block}
  #inspect .hd{padding:9px 12px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
  #inspect .hd h3{margin:0;font-size:15px;color:var(--ink-bright);letter-spacing:.5px}
  #inspect .bd{padding:10px 12px;font-size:12.5px;line-height:1.5}
  #inspect .row{display:flex;justify-content:space-between;gap:8px;padding:3px 0;border-bottom:1px dotted #23252d}
  #inspect .row b{color:var(--ink-bright);font-weight:normal;font-variant-numeric:tabular-nums}
  #inspect .barwrap{margin:5px 0}
  #inspect .barwrap .t{font-size:10px;color:var(--ink-dim);text-transform:uppercase;letter-spacing:.5px}
  #inspect .pbar{height:7px;background:#0c0d11;border:1px solid var(--line);border-radius:4px;overflow:hidden;margin-top:2px}
  #inspect .pbar>i{display:block;height:100%}
  .tag{display:inline-block;font-size:10px;padding:1px 6px;border-radius:3px;background:#262833;color:var(--ink-dim);margin:1px 2px 1px 0}
  .x{cursor:pointer;color:var(--ink-dim);font-size:16px}.x:hover{color:var(--ink-bright)}
  .btn{display:inline-block;padding:6px 11px;border:1px solid var(--line);border-radius:5px;background:var(--iron3);
    color:var(--ink-bright);font-size:12px;cursor:pointer;font-family:inherit}
  .btn:hover{border-color:var(--ember-soft)} .btn.bad:hover{border-color:var(--blood);color:#f0c4ba}

  /* toasts */
  #toasts{position:fixed;left:50%;top:92px;transform:translateX(-50%);z-index:40;display:flex;flex-direction:column;
    gap:6px;align-items:center;pointer-events:none}
  .toast{padding:7px 14px;border-radius:5px;font-size:13px;color:var(--ink-bright);max-width:84vw;
    background:#15161bf4;border:1px solid var(--line);border-left:3px solid var(--ember);box-shadow:0 4px 20px #000a;
    animation:ti .25s ease}
  .toast.bad{border-left-color:var(--blood)} .toast.good{border-left-color:var(--rot)}
  @keyframes ti{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}

  /* big overlay */
  #ov{position:fixed;inset:0;z-index:60;display:none;align-items:center;justify-content:center;
    background:#060709dd;backdrop-filter:blur(5px)}
  #ov.show{display:flex}
  .modal{width:min(600px,93vw);max-height:88vh;overflow:auto;border-radius:12px;padding:24px 26px;
    background:linear-gradient(#16171d,#101116);border:1px solid var(--line);box-shadow:0 16px 70px #000d}
  .modal h1{margin:0 0 2px;font-size:32px;letter-spacing:4px;color:var(--ink-bright);text-shadow:0 0 24px #d98a3a33}
  .modal h2{margin:0 0 16px;font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--ember-soft);font-weight:normal}
  .modal p{font-size:14px;line-height:1.65;color:var(--ink)}
  .kbd{display:inline-block;border:1px solid var(--line);border-bottom-width:2px;border-radius:4px;padding:0 5px;
    font:11px monospace;color:var(--ink-bright);background:#1c1e25}
  .optrow{display:flex;justify-content:space-between;align-items:center;gap:14px;padding:8px 0;border-bottom:1px dotted #23252d;font-size:14px;color:var(--ink)}
  .optrow input[type=range]{flex:1;max-width:230px;accent-color:var(--ember)}
  .optrow input[type=checkbox]{width:16px;height:16px;accent-color:var(--ember)}
  .obj-list{display:flex;flex-wrap:wrap;gap:7px;margin-top:6px}
  #goals{position:fixed;left:8px;bottom:122px;z-index:26;max-width:252px;padding:9px 12px;border-radius:8px;display:none}
  #goals .gh{font-size:10px;letter-spacing:1.5px;color:var(--ember-soft);text-transform:uppercase}
  #goals .gt{font-size:12.5px;color:var(--ink-bright);line-height:1.42;margin-top:4px}
  #goals .gp{font-size:10px;color:var(--ink-dim);margin-top:5px;letter-spacing:.5px}
  #hint{position:fixed;left:50%;top:128px;transform:translateX(-50%);z-index:45;padding:5px 13px;border-radius:5px;
    font-size:12px;color:var(--ember-soft);background:#0d0e12cc;border:1px solid var(--line);pointer-events:none;display:none;white-space:nowrap}
  #dev{position:fixed;left:6px;bottom:116px;color:#6c8;font:11px monospace;z-index:60;display:none}
  /* Haunted Mound: VHS grain + scanlines + heavy vignette */
  #grain{position:fixed;inset:0;z-index:15;pointer-events:none;width:100%;height:100%;
    image-rendering:pixelated;opacity:.035;mix-blend-mode:overlay}
  #vhs{position:fixed;inset:0;z-index:16;pointer-events:none;
    background:repeating-linear-gradient(0deg,rgba(0,0,0,.05) 0px,rgba(0,0,0,.05) 1px,transparent 2px,transparent 4px);
    box-shadow:inset 0 0 170px 36px rgba(0,0,0,.42);
    opacity:.5;mix-blend-mode:multiply}
</style>
</head>
<body>
<canvas id="c"></canvas>
<canvas id="grain"></canvas>
<div id="vhs"></div>

<div id="ledger"></div>
<div id="quota" class="frame"></div>
<div id="rail"></div>
<div id="inspect" class="frame"></div>
<div id="goals" class="frame"></div>
<div id="toasts"></div>
<div id="hint"></div>
<div id="dev"></div>
<div id="dock">
  <div id="docktabs"></div>
  <div id="dockrow"></div>
</div>
<div id="ov"><div class="modal" id="modal"></div></div>

<div id="boot">
  <div class="sub">a desolate foundry of the dead</div>
  <h1>THE SOUL FOUNDRY</h1>
  <div class="bar"><i></i></div>
  <div class="msg" id="bootmsg">waking the engine…</div>
</div>

<!-- Three.js r128 + addons, vendored locally as CLASSIC scripts (work over file://, unlike ES modules).
     Each is followed by a document.write CDN fallback in case a local file is missing. -->
<script src="vendor/three.min.js"></script>
<script>typeof THREE!=="undefined"||document.write('<scr'+'ipt src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"><\/scr'+'ipt>');</script>
<script src="vendor/GLTFLoader.js"></script>
<script>(typeof THREE!=="undefined"&&THREE.GLTFLoader)||document.write('<scr'+'ipt src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"><\/scr'+'ipt>');</script>
<script src="vendor/SkeletonUtils.js"></script>
<script>(typeof THREE!=="undefined"&&THREE.SkeletonUtils)||document.write('<scr'+'ipt src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/utils/SkeletonUtils.js"><\/scr'+'ipt>');</script>

<script>
/* =====================================================================
   THE SOUL FOUNDRY — single self-contained classic script.
   Sections: BOOTCHECK · CONFIG · RNG · NOISE · WORLD(scene/terrain/atmos)
   · CAMERA · (later) BUILDINGS · VILLAGERS · ECONOMY · UI · INPUT · MAIN
   ===================================================================== */
"use strict";
const bootmsg = (t)=>{ const e=document.getElementById('bootmsg'); if(e) e.textContent=t; };

if(typeof THREE === "undefined"){
  document.getElementById('boot').innerHTML =
    '<div class="sub">the engine could not wake</div>'+
    '<h1 style="font-size:24px">no connection</h1>'+
    '<p style="color:#cabfa6;max-width:420px;text-align:center">This game streams its 3D engine from the web on first load. '+
    'You appear to be offline, or a network block stopped it. Connect to the internet and reload.</p>';
  throw new Error("THREE failed to load");
}

/* =====================================================================
   === RNG + NOISE ===
   ===================================================================== */
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);
  t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
let RNG=mulberry32(1337);
const rnd=()=>RNG(),rint=n=>(RNG()*n)|0,rr=(a,b)=>a+RNG()*(b-a),pick=a=>a[(RNG()*a.length)|0];
const clamp=(v,a,b)=>v<a?a:v>b?b:v, lerp=(a,b,t)=>a+(b-a)*t;
// cheap deterministic value-noise fbm for terrain
function vnoise(x,y){ const xi=Math.floor(x),yi=Math.floor(y),xf=x-xi,yf=y-yi;
  const h=(a,b)=>{let n=a*374761393+b*668265263;n=(n^(n>>13))*1274126177;return ((n^(n>>16))>>>0)/4294967296;};
  const u=xf*xf*(3-2*xf),v=yf*yf*(3-2*yf);
  return lerp(lerp(h(xi,yi),h(xi+1,yi),u),lerp(h(xi,yi+1),h(xi+1,yi+1),u),v);
}
function fbm(x,y){ let s=0,a=0.5,f=1; for(let i=0;i<4;i++){ s+=a*vnoise(x*f,y*f); f*=2; a*=0.5; } return s; }

/* =====================================================================
   === SOUND: a WebAudio synth bed + SFX that need ZERO downloads
   (so audio works over file:// and fully offline), with AI-generated
   music & sound effects layered on top whenever their files load.
   ===================================================================== */
const SND={
  ctx:null, master:null, sfxGain:null, droneGain:null,
  started:false, muted:false, musicVol:0.55, sfxVol:0.8,
  pool:{}, music:null, dread:null, droneNodes:[],
  // asset urls — null means "synth only"; the build fills these with vendored paths
  src:{ music:"assets/audio/music.m4a", dread:"assets/audio/dread.m4a", place:"assets/audio/place.mp3",
        bell:"assets/audio/bell.mp3", crumble:"assets/audio/crumble.mp3", haunt:"assets/audio/haunt.mp3", rise:"assets/audio/rise.mp3" },
  load(){ try{ const s=localStorage.getItem('sf_audio'); if(s){ const o=JSON.parse(s);
    if(typeof o.m==='number')this.musicVol=o.m; if(typeof o.s==='number')this.sfxVol=o.s; this.muted=!!o.x; } }catch(e){} },
  save(){ try{ localStorage.setItem('sf_audio',JSON.stringify({m:this.musicVol,s:this.sfxVol,x:this.muted})); }catch(e){} },
  // called on the first user gesture (browsers block audio until then)
  resume(){ if(this.started){ if(this.ctx&&this.ctx.state==="suspended")this.ctx.resume(); return; }
    this.started=true; this.load();
    try{ const AC=window.AudioContext||window.webkitAudioContext; if(AC){ this.ctx=new AC();
      this.master=this.ctx.createGain(); this.master.gain.value=this.muted?0:1; this.master.connect(this.ctx.destination);
      this.sfxGain=this.ctx.createGain(); this.sfxGain.gain.value=this.sfxVol; this.sfxGain.connect(this.master);
      this.startDrone(); } }catch(e){}
    this.startMusic();
  },
  mkEl(url,loop,vol){ try{ const a=document.createElement('audio'); a.src=url; a.loop=!!loop; a.preload="auto";
    a.volume=(this.muted?0:1)*(vol==null?1:vol); return a; }catch(e){ return null; } },
  startMusic(){ try{ if(this.src.music){ this.music=this.mkEl(this.src.music,true,this.musicVol); if(this.music){ const p=this.music.play(); if(p&&p.catch)p.catch(()=>{}); } }
    if(this.src.dread){ this.dread=this.mkEl(this.src.dread,true,0); if(this.dread){ const p=this.dread.play(); if(p&&p.catch)p.catch(()=>{}); } } }catch(e){} },
  // crossfade an optional 'dread' music layer up as Dread rises
  setTension(t){ try{ if(this.dread)this.dread.volume=(this.muted?0:1)*this.musicVol*clamp(t,0,1)*0.9;
    if(this.music)this.music.volume=(this.muted?0:1)*this.musicVol*(1-clamp(t,0,1)*0.5); }catch(e){} },
  sfx(name){ if(!this.started||this.muted) return; const url=this.src[name];
    if(url){ this.playEl(name,url); } else { this.synth(name); } },
  playEl(name,url){ try{ let pool=this.pool[name]; if(!pool){ pool=this.pool[name]=[this.mkEl(url,false,this.sfxVol),this.mkEl(url,false,this.sfxVol),this.mkEl(url,false,this.sfxVol)]; }
    const a=pool.find(e=>e&&(e.paused||e.ended))||pool[0]; if(a){ a.volume=this.muted?0:this.sfxVol; a.currentTime=0; const p=a.play(); if(p&&p.catch)p.catch(()=>this.synth(name)); } }catch(e){ this.synth(name); } },
  /* ---- pure-synth SFX + ambient (no assets needed) ---- */
  envOsc(o,g,a,d,glideTo){ const now=this.ctx.currentTime; if(glideTo)o.frequency.exponentialRampToValueAtTime(glideTo,now+a+d);
    const gn=this.ctx.createGain(); gn.gain.setValueAtTime(0.0001,now); gn.gain.exponentialRampToValueAtTime(g,now+a); gn.gain.exponentialRampToValueAtTime(0.0001,now+a+d);
    o.connect(gn); gn.connect(this.sfxGain); o.start(now); o.stop(now+a+d+0.05); },
  tone(freq,type,g,a,d,glideTo){ if(!this.ctx)return; const o=this.ctx.createOscillator(); o.type=type||"sine"; o.frequency.setValueAtTime(freq,this.ctx.currentTime); this.envOsc(o,g,a,d,glideTo); },
  noise(g,a,d,lp){ if(!this.ctx)return; const len=Math.floor(this.ctx.sampleRate*(a+d+0.1)); const buf=this.ctx.createBuffer(1,len,this.ctx.sampleRate); const ch=buf.getChannelData(0); for(let i=0;i<len;i++)ch[i]=Math.random()*2-1;
    const n=this.ctx.createBufferSource(); n.buffer=buf; const f=this.ctx.createBiquadFilter(); f.type="lowpass"; f.frequency.value=lp||1200;
    const now=this.ctx.currentTime; const gn=this.ctx.createGain(); gn.gain.setValueAtTime(0.0001,now); gn.gain.exponentialRampToValueAtTime(g,now+a); gn.gain.exponentialRampToValueAtTime(0.0001,now+a+d);
    n.connect(f); f.connect(gn); gn.connect(this.sfxGain); n.start(now); n.stop(now+a+d+0.12); },
  synth(name){ if(!this.ctx)return; switch(name){
    case "place":   this.tone(72,"sine",0.5,0.004,0.2,42); this.noise(0.28,0.004,0.16,700); break;
    case "bell":    this.tone(180,"sine",0.35,0.005,1.7); this.tone(271,"sine",0.16,0.005,1.4); this.tone(417,"sine",0.08,0.005,1.0); break;
    case "crumble": this.noise(0.4,0.005,0.5,2600); this.tone(120,"sawtooth",0.12,0.01,0.4,48); break;
    case "haunt":   this.tone(330,"sine",0.12,0.4,1.3,292); this.tone(495,"triangle",0.06,0.5,1.0,470); break;
    case "rise":    this.tone(88,"sine",0.26,0.5,0.8,165); break;
    case "click":   this.tone(840,"square",0.04,0.002,0.04); break;
    case "deny":    this.tone(150,"square",0.12,0.005,0.16,90); break;
    case "win":     [262,330,392,523].forEach((f,i)=>setTimeout(()=>this.tone(f,"sine",0.25,0.01,0.8),i*150)); break;
    case "lose":    [220,175,131,98].forEach((f,i)=>setTimeout(()=>this.tone(f,"sawtooth",0.2,0.02,0.9,f*0.6),i*210)); break;
  } },
  startDrone(){ if(!this.ctx)return; const base=this.ctx.createGain(); base.gain.value=0.10; base.connect(this.master); this.droneGain=base;
    [55,55.35,82.5].forEach((fr,i)=>{ const o=this.ctx.createOscillator(); o.type=i<2?"sine":"triangle"; o.frequency.value=fr;
      const g=this.ctx.createGain(); g.gain.value=i<2?0.5:0.16; o.connect(g); g.connect(base); o.start(); this.droneNodes.push(o);
      const lfo=this.ctx.createOscillator(); lfo.frequency.value=0.05+i*0.027; const lg=this.ctx.createGain(); lg.gain.value=1.4; lfo.connect(lg); lg.connect(o.frequency); lfo.start(); });
    const len=Math.floor(this.ctx.sampleRate*4); const buf=this.ctx.createBuffer(1,len,this.ctx.sampleRate); const ch=buf.getChannelData(0); for(let i=0;i<len;i++)ch[i]=Math.random()*2-1;
    const n=this.ctx.createBufferSource(); n.buffer=buf; n.loop=true; const f=this.ctx.createBiquadFilter(); f.type="lowpass"; f.frequency.value=360; const g=this.ctx.createGain(); g.gain.value=0.05; n.connect(f); f.connect(g); g.connect(base); n.start(); },
  setMusicVol(v){ this.musicVol=clamp(v,0,1); if(this.music)this.music.volume=this.muted?0:this.musicVol; this.save(); },

let TERRAIN=null, HMAP=null, REGIONS=[], WORLD_SEED=1;
const REGION_TYPES=['forest','silica','ash','ruins','graves','bog'];
function genRegions(seed){
  const r=mulberry32(seed*7+13); const regs=[]; const n=8+((r()*4)|0);
  const forced=['forest','forest','silica','ash','graves','ruins','bog'];
  for(let i=0;i<n;i++){ const ang=r()*6.28, dist=20+r()*48;
    regs.push({type:i<forced.length?forced[i]:REGION_TYPES[(r()*REGION_TYPES.length)|0],
      x:Math.cos(ang)*dist, z:Math.sin(ang)*dist, rad:9+r()*11, seed:(r()*1e6)|0}); }
  REGIONS=regs; return regs;
}
function regionAt(x,z){ let best=null; for(const g of REGIONS){ const d=Math.hypot(x-g.x,z-g.z);
  if(d<g.rad){ const t=1-d/g.rad; if(!best||t>best.t) best={reg:g,t}; } } return best; }
// rolling hills + central settlement basin + a winding ash-river channel (procedural per seed)
function terrainHeight(x,z){
  const d=Math.hypot(x,z)/HALF;
  const hills=(fbm(x*0.028+10,z*0.028+20)-0.5)*13;
  const ridge=(fbm(x*0.075-5,z*0.075+5)-0.5)*5;
  const basin=-4.0*Math.exp(-Math.pow(d*2.3,2));
  let h=hills+ridge+basin;
  const rv=Math.abs(fbm(x*0.018-7,z*0.018+3)-0.5);
  if(rv<0.045) h-=5*(1-rv/0.045);
  return h;
}
const BIOME_HSL={ forest:[0.27,0.16,0.26], silica:[0.10,0.05,0.42], ash:[0.04,0.06,0.17],
  ruins:[0.60,0.05,0.30], graves:[0.33,0.08,0.28], bog:[0.22,0.16,0.22] };
function biomeColor(x,z,h,slope){
  const c=new THREE.Color();
  if(h<-4) c.setHSL(0.08,0.06,0.20); else if(h<-1) c.setHSL(0.09,0.10,0.27);
  else if(h<6) c.setHSL(0.11,0.10,0.34); else c.setHSL(0.07,0.05,0.42);
  const rg=regionAt(x,z);
  if(rg){ const b=BIOME_HSL[rg.reg.type]; const bc=new THREE.Color().setHSL(b[0],b[1],b[2]);
    const t=Math.pow(rg.t,0.6)*0.92; c.lerp(bc,t); }
  c.offsetHSL(0,0,-clamp(slope*0.7,0,0.45)*0.4 + (fbm(x*0.5,z*0.5)-0.5)*0.05);
  return c;
}
function buildTerrain(){
  const geo=new THREE.PlaneGeometry(WORLD_SIZE,WORLD_SIZE,TSEG,TSEG);

  for(let i=0;i<pos.count;i++){
    const x=pos.getX(i), z=pos.getZ(i);
    const h=terrainHeight(x,z); pos.setY(i,h);
  }
  geo.computeVertexNormals();

// the ruin of a colossal arcology on the horizon: layered shattered megatowers, a fallen ring,
// tilted slabs and smokestacks — silhouetted, fading into fog, threaded with dim cyan rifts.
function buildMegacityHorizon(){
  const dark=new THREE.MeshStandardMaterial({color:0x10131a,flatShading:true,roughness:1,metalness:0.2});
  const darker=new THREE.MeshStandardMaterial({color:0x0c0e14,flatShading:true,roughness:1,metalness:0.2});
  const riftMat=new THREE.MeshBasicMaterial({color:0x2f6f78});
  const grp=new THREE.Group(); scene.add(grp);
  // three concentric belts of broken towers (parallax depth). Towers are INSTANCED — ~150 of them
  // collapse to 2 draw calls instead of 150 meshes.
  const belts=[{rad:150,n:60,hmin:24,hmax:70,mat:dark},{rad:200,n:50,hmin:40,hmax:120,mat:dark},{rad:270,n:42,hmin:60,hmax:180,mat:darker}];
  const total=belts.reduce((s,b)=>s+b.n,0), box=new THREE.BoxGeometry(1,1,1);
  const towersDark=new THREE.InstancedMesh(box,dark,total), towersDk=new THREE.InstancedMesh(box,darker,total);
  let nd=0,nk=0; const M=new THREE.Matrix4(),Q=new THREE.Quaternion(),E=new THREE.Euler(),P=new THREE.Vector3(),S=new THREE.Vector3();
  for(const b of belts){
    for(let i=0;i<b.n;i++){
      const a=(i/b.n)*6.283+rr(-0.05,0.05), rad=b.rad+rr(-25,25);
      const h=rr(b.hmin,b.hmax), w=rr(8,22), d=rr(8,22);
      const px=Math.cos(a)*rad, py=h/2-10, pz=Math.sin(a)*rad, ry=rr(0,6), rz=rr(-0.16,0.16);
      E.set(0,ry,rz); Q.setFromEuler(E); P.set(px,py,pz); S.set(w,h,d); M.compose(P,Q,S);
      if(b.mat===darker) towersDk.setMatrixAt(nk++,M); else towersDark.setMatrixAt(nd++,M);
      if(rnd()<0.4){ const cap=new THREE.Mesh(new THREE.CylinderGeometry(0,w*0.4,rr(10,30),4),b.mat);
        cap.position.set(px,py+h/2,pz); cap.rotation.set(0,ry,rz); grp.add(cap); }
      if(b.rad<210 && rnd()<0.5){ const seam=new THREE.Mesh(new THREE.BoxGeometry(0.6,h*rr(0.3,0.7),0.6),riftMat);
        seam.position.set(px,py+rr(-h*0.2,h*0.2),pz+d*0.5); grp.add(seam); }
    }
  }
  towersDark.count=nd; towersDk.count=nk; towersDark.instanceMatrix.needsUpdate=true; towersDk.instanceMatrix.needsUpdate=true;
  towersDark.frustumCulled=false; towersDk.frustumCulled=false; grp.add(towersDark); grp.add(towersDk);
  // a colossal fallen ring-structure half-sunk on the far horizon (the dead arcology's halo)
  const ring=new THREE.Mesh(new THREE.TorusGeometry(120,9,8,40),darker);
  ring.position.set(-120,40,-230); ring.rotation.set(1.15,0.5,0.3); grp.add(ring);
  const ring2=new THREE.Mesh(new THREE.TorusGeometry(80,6,6,32),darker);
  ring2.position.set(250,20,-120); ring2.rotation.set(1.4,-0.4,0.2); grp.add(ring2);
}

const Cam={ target:new THREE.Vector3(0,-1,0), az:Math.PI*0.25, el:0.8, dist:78, minD:22, maxD:200 };
function updateCamera(){
  const ce=clamp(Cam.el,0.5,1.4);
  const cx=Cam.target.x+Cam.dist*Math.cos(ce)*Math.sin(Cam.az);
  let cy=Cam.target.y+Cam.dist*Math.sin(ce);
  const cz=Cam.target.z+Cam.dist*Math.cos(ce)*Math.cos(Cam.az);
  const floor=terrainHeight(cx,cz)+2.5; if(cy<floor) cy=floor;   // never clip under the ground
  camera.position.set(cx,cy,cz); camera.lookAt(Cam.target);
}

  if(proto){
    obj=THREE.SkeletonUtils.clone(proto);
    obj.traverse(o=>{ if(o.isMesh){ o.frustumCulled=false; if(o.material){o.material=o.material.clone(); o.material.side=THREE.DoubleSide;} } });
    let h=0; try{ const box=new THREE.Box3().setFromObject(obj); h=box.max.y-box.min.y; }catch(e){}
    // skinned-mesh bounding boxes are unreliable; only trust a sane height, else fixed scale. Clamp hard so it can NEVER be giant.
    let s=(h>0.3&&h<8)?((caste==="reaper"?1.7:1.5)/h):1.0; s=clamp(s,0.25,2.0);
    obj.scale.setScalar(s);
    if(clips&&clips.length){ mixer=new THREE.AnimationMixer(obj); mixers.push(mixer); act=mixer.clipAction(clips[0]); act.play(); act.timeScale=0; }
    else staticGLB=true;   // non-rigged AI mesh (the cloaked Reaper) — glide & sway it procedurally
  } else { obj=makeProcVillager(caste); proc=true; }
  obj.position.set(x,terrainHeight(x,z),z);
  // carried-load indicator: a small block shown while hauling, tinted to the resource — makes the supply chain legible
  const carry=new THREE.Mesh(new THREE.BoxGeometry(0.34,0.34,0.34),MAT(0x6b5a40)); carry.visible=false; carry.position.set(0,1.05,0.32); obj.add(carry);
  scene.add(obj);
  const v={obj,mixer,act,proc,staticGLB,caste,carryMesh:carry,
    name:villagerName(), job:"idle",
    speed:(caste==="stump"?rr(1.2,1.7):caste==="reaper"?rr(2.8,3.4):rr(2.4,3.0)), phase:rr(0,9),
    state:"wander", tx:x,tz:z, restock:0, resolve:rr(0.55,0.9), warmth:rr(0.5,0.9)};
  villagers.push(v); pickWanderTarget(v); return v;
}
const NAMES=["Mott","Bryl","Hesk","Ulla","Crane","Pell","Vire","Dolm","Sythe","Gree","Lurn","Ottic","Bram","Wisp","Coll","Tace"];
function villagerName(){ return pick(NAMES)+"-"+(100+rint(900)); }
function pickWanderTarget(v){
  const r=rr(4,16), a=rr(0,6.28);
  v.tx=clamp(v.obj.position.x+Math.cos(a)*r,-HALF+3,HALF-3);
  v.tz=clamp(v.obj.position.z+Math.sin(a)*r,-HALF+3,HALF-3);
}
function stepVillagers(dt){
  for(const v of villagers){
    const o=v.obj;
    const dx=v.tx-o.position.x, dz=v.tz-o.position.z; const d=Math.hypot(dx,dz);
    const moving=d>0.4;
    if(moving){
      const nx=dx/d, nz=dz/d, step=v.speed*dt;
      o.position.x+=nx*step; o.position.z+=nz*step;
      o.position.y=terrainHeight(o.position.x,o.position.z);
      const targetRot=Math.atan2(nx,nz);
      o.rotation.y=lerpAngle(o.rotation.y,targetRot,0.18);
      if(v.act) v.act.timeScale=1;
      if(v.proc){ const ud=o.userData; const rate=(v.caste==="stump")?5:9; v.phase+=dt*rate;
        const sw=Math.sin(v.phase)*0.5;
        if(ud.legs[0]) ud.legs[0].rotation.x=sw; if(ud.legs[1]) ud.legs[1].rotation.x=-sw;
        if(ud.arms[0]) ud.arms[0].rotation.x=-sw*0.6; if(ud.arms[1]) ud.arms[1].rotation.x=sw*0.6;
        if(v.caste==="stump"){ o.rotation.z=Math.sin(v.phase)*0.16; o.position.y+=Math.abs(Math.sin(v.phase))*0.02; }
        else o.position.y+=Math.abs(Math.sin(v.phase))*0.05; }
    } else {
      if(v.act) v.act.timeScale=0;
      v.restock-=dt; if(v.restock<=0){ v.restock=rr(1.5,5); pickWanderTarget(v); }
      if(v.proc){ // gentle idle sway
        v.obj.rotation.z=Math.sin((performance.now()/700)+v.phase)*0.03; }
    }
  }
}
function lerpAngle(a,b,t){ let d=((b-a+Math.PI)%(Math.PI*2))-Math.PI; if(d<-Math.PI)d+=Math.PI*2; return a+d*t; }

/* central hearth: fire light + ember points (a warm anchor in the dead valley) */
let hearthLight=null;
function buildHearth(){
  const hx=0,hz=0,hy=terrainHeight(0,0);
  const ring=new THREE.Mesh(new THREE.TorusGeometry(1.1,0.22,6,12),
    new THREE.MeshStandardMaterial({color:0x1a1714,flatShading:true,roughness:1}));
  ring.rotation.x=Math.PI/2; ring.position.set(hx,hy+0.15,hz); scene.add(ring);
  const flame=new THREE.Mesh(new THREE.ConeGeometry(0.5,1.1,6),
    new THREE.MeshBasicMaterial({color:0xd9772a})); flame.position.set(hx,hy+0.7,hz); scene.add(flame);
  hearthLight=new THREE.PointLight(0xff8a3a,2.4,26,2); hearthLight.position.set(hx,hy+1.4,hz); scene.add(hearthLight);
  flame.userData.base=hy+0.7; scene.userData.flame=flame;
}

/* =====================================================================
   === INPUT: orbit drag / wheel zoom / pan / touch / pick ===
   ===================================================================== */
const ptrs=new Map(); let dragMode=null, dStart=null, pinch0=0, distSt=0;
const keys=new Set();
function updateInput(dt){
  const sp=22*dt*(Cam.dist/40);
  const f=new THREE.Vector3(Math.sin(Cam.az),0,Math.cos(Cam.az)); // toward camera
  const rgt=new THREE.Vector3(f.z,0,-f.x);
  if(keys.has('KeyW')||keys.has('ArrowUp')) { Cam.target.addScaledVector(f,-sp); }
  if(keys.has('KeyS')||keys.has('ArrowDown')){ Cam.target.addScaledVector(f, sp); }
  if(keys.has('KeyA')||keys.has('ArrowLeft')){ Cam.target.addScaledVector(rgt, sp); }
  if(keys.has('KeyD')||keys.has('ArrowRight')){Cam.target.addScaledVector(rgt,-sp); }
  if(keys.has('KeyQ')) Cam.az-=dt*1.2; if(keys.has('KeyE')) Cam.az+=dt*1.2;
  clampTarget();
}
function clampTarget(){ Cam.target.x=clamp(Cam.target.x,-HALF,HALF); Cam.target.z=clamp(Cam.target.z,-HALF,HALF);
  Cam.target.y=terrainHeight(Cam.target.x,Cam.target.z); }
canvas.addEventListener('pointerdown',e=>{ SND.resume(); canvas.setPointerCapture(e.pointerId); ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(ptrs.size===2){ const a=[...ptrs.values()]; distSt=Math.hypot(a[0].x-a[1].x,a[0].y-a[1].y); pinch0=Cam.dist; dragMode='pinch'; }
  else { dragMode=(e.button===2||e.shiftKey)?'pan':'orbit'; dStart={x:e.clientX,y:e.clientY,az:Cam.az,el:Cam.el,t:Cam.target.clone(),moved:false}; }
});
canvas.addEventListener('pointermove',e=>{ if(ptrs.has(e.pointerId)) ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(dragMode==='pinch'&&ptrs.size>=2){ const a=[...ptrs.values()]; const d=Math.hypot(a[0].x-a[1].x,a[0].y-a[1].y);
    if(distSt>0) Cam.dist=clamp(pinch0*(distSt/d),Cam.minD,Cam.maxD); return; }
  if(!dStart) return; const dx=e.clientX-dStart.x, dy=e.clientY-dStart.y;
  if(Math.abs(dx)+Math.abs(dy)>5) dStart.moved=true;
  if(placeKind && BLD[placeKind] && BLD[placeKind].kind==='path'){ const p=groundPoint(e.clientX,e.clientY); if(p){ if(addPath(p.x,p.z)) renderLedger(); } return; }
  if(dragMode==='orbit'){ Cam.az=dStart.az - dx*0.005; Cam.el=clamp(dStart.el + dy*0.005,0.5,1.4); }
  else { const k=Cam.dist*0.0016; const f=new THREE.Vector3(Math.sin(Cam.az),0,Math.cos(Cam.az)); const rg=new THREE.Vector3(f.z,0,-f.x);
    Cam.target.copy(dStart.t).addScaledVector(rg,-dx*k).addScaledVector(f,-dy*k); clampTarget(); }
});
function endPtr(e){ const wasDrag=dStart&&dStart.moved; ptrs.delete(e.pointerId);
  if(ptrs.size<2&&dragMode==='pinch')dragMode=null;
  if(dStart&&!wasDrag&&dragMode!=='pinch'){ pickAt(e.clientX,e.clientY); }
  if(ptrs.size===0){ dragMode=null; dStart=null; } }
canvas.addEventListener('pointerup',endPtr); canvas.addEventListener('pointercancel',endPtr);
canvas.addEventListener('contextmenu',e=>{ e.preventDefault(); if(placeKind){placeKind=null;setHint('');buildDock();} });
canvas.addEventListener('wheel',e=>{ e.preventDefault(); Cam.dist=clamp(Cam.dist*(e.deltaY<0?0.9:1.11),Cam.minD,Cam.maxD); },{passive:false});
addEventListener('keydown',e=>{ SND.resume(); keys.add(e.code);
  if(e.code==='Space'){e.preventDefault(); paused=!paused; if(typeof buildRail==='function')buildRail();}
  else if(e.code==='Escape'){ if(placeKind){placeKind=null;setHint('');buildDock();} else if(typeof clearInspect==='function')clearInspect(); }
  else if(e.code==='Digit1'){simSpeed=1;paused=false;buildRail&&buildRail();}
  else if(e.code==='Digit2'){simSpeed=2;paused=false;buildRail&&buildRail();}
  else if(e.code==='Digit3'){simSpeed=3;paused=false;buildRail&&buildRail();} });
addEventListener('keyup',e=>keys.delete(e.code));
const ray=new THREE.Raycaster(), ndc=new THREE.Vector2();
function groundPoint(sx,sy){ ndc.x=(sx/innerWidth)*2-1; ndc.y=-(sy/innerHeight)*2+1; ray.setFromCamera(ndc,camera);
  const g=TERRAIN?ray.intersectObject(TERRAIN,false):[]; return g.length?g[0].point:null; }
function pickAt(sx,sy){
  ndc.x=(sx/innerWidth)*2-1; ndc.y=-(sy/innerHeight)*2+1; ray.setFromCamera(ndc,camera);
  if(placeKind){ const p=groundPoint(sx,sy); if(!p) return;
    if(BLD[placeKind].kind==='path'){ addPath(p.x,p.z); renderLedger(); return; }
    const b=placeBuilding(placeKind,p.x,p.z);
    if(b){ SND.sfx('place'); renderLedger(); buildDock(); toast(BLD[placeKind].name+" raised."); if(!canAfford(BLD[placeKind].cost)){ placeKind=null; setHint(''); buildDock(); } }
    else { SND.sfx('deny'); toast("Can't build there — too close to something, or off the valley.","bad"); }
    return; }
  const vh=ray.intersectObjects(villagers.filter(v=>!v.dead).map(v=>v.obj),true);
  if(vh.length){ let r=vh[0].object; while(r.parent&&!villagers.find(v=>v.obj===r)) r=r.parent;
    const v=villagers.find(x=>x.obj===r); if(v){ selectVillager(v); return; } }
  const bh=ray.intersectObjects(buildings.map(b=>b.mesh),true);
  if(bh.length){ let r=bh[0].object; while(r.parent&&!buildings.find(b=>b.mesh===r)) r=r.parent;
    const b=buildings.find(x=>x.mesh===r); if(b){ selectBuilding(b); return; } }
  clearInspect();
}

/* =====================================================================
   === UI (early): ledger, villager inspector, rail ===
   ===================================================================== */
const $=id=>document.getElementById(id);
let selected=null, selBld=null, placeKind=null, curTab="dwell";
const cap1=s=>s[0].toUpperCase()+s.slice(1);

function renderLedger(){
  const pop=villagers.filter(v=>!v.dead).length;
  const chip=(v,l,c)=>`<div class="stat"><span><span class="v" style="${c?'color:'+c:''}">${v}</span> <span class="lbl">${l}</span></span></div>`;
  let h=chip(pop+"/"+G.popCap,"Husks", pop<2?'#9e3b2c':'')+chip(Math.floor(G.writ),"Writ",'#e8c24a')
    +chip(Math.round(G.warmthRatio*100)+"%","Warmth", G.warmthRatio<0.7?'#9e3b2c':'#d98a3a')
    +chip(Math.round(G.dread)+"%","Dread", G.dread>55?'#9e3b2c':'#7d8a5a');
  for(const r of RES_ORDER){ const n=Math.floor(G.stock[r]||0); if(n<=0 && ["glass","wafer","core","compute","relic"].indexOf(r)>=0 && r!=="compute") continue;
    h+=`<div class="stat" title="${RES[r].name}"><span><span class="v" style="color:#${RES[r].col.toString(16).padStart(6,'0')}">${n}</span> <span class="lbl">${RES[r].name}</span></span></div>`; }
  $('ledger').innerHTML=h;
}
function renderQuota(){
  const q=G.quota, t=Math.max(0,Math.ceil(q.t));
  const dpct=Math.round(G.dread);
  $('quota').innerHTML=`<b>QUOTA · Tithe ${q.level}/${WIN_LEVEL}</b> &nbsp; deliver <b>${q.need}</b> Compute &nbsp;·&nbsp; have ${Math.floor(G.stock.compute||0)} &nbsp;·&nbsp; <span style="color:${t<25?'#9e3b2c':'var(--ink)'}">${t}s</span>`;
}
function buildRail(){
  $('rail').innerHTML='';
  const mk=(t,on,fn,tt)=>{ const b=document.createElement('div'); b.className='rbtn'+(on?' on':''); b.textContent=t; b.title=tt||''; b.onclick=fn; return b; };
  $('rail').appendChild(mk('❚❚',paused,()=>{paused=!paused;buildRail();},'Pause (Space)'));
  $('rail').appendChild(mk('▶',!paused&&simSpeed===1,()=>{paused=false;simSpeed=1;buildRail();},'1×'));
  $('rail').appendChild(mk('»',!paused&&simSpeed===3,()=>{paused=false;simSpeed=3;buildRail();},'3×'));
  $('rail').appendChild(mk('?',false,()=>showHelp(),'How to play'));
  $('rail').appendChild(mk('♪',!SND.muted,()=>{ SND.resume(); SND.toggleMute(); buildRail(); }, SND.muted?'Sound is off — click for sound':'Mute sound'));
  $('rail').appendChild(mk('⚙',false,()=>showOptions(),'Options'));
}

/* build menu */
function buildDock(){
  const tabs=$('docktabs'); tabs.innerHTML='';
  for(const [k,label] of TABS){ const d=document.createElement('div'); d.className='tab'+(curTab===k?' on':''); d.textContent=label; d.onclick=()=>{curTab=k;buildDock();}; tabs.appendChild(d); }
  const row=$('dockrow'); row.innerHTML='';
  for(const k of BLD_ORDER){ const def=BLD[k]; if(bldTab(k)!==curTab) continue;
    const card=document.createElement('div'); card.className='card'+(placeKind===k?' sel':'')+(canAfford(def.cost)?'':' locked');
    const costStr=Object.keys(def.cost).length? Object.entries(def.cost).map(([r,n])=>n+" "+RES[r].name.split(' ')[0]).join(', ') : 'free';
    const thumb=BLD_IMG[k]?`background:#0c0d11 center/cover no-repeat url('${BLD_IMG[k]}')`
      :`background:#${def.kind==='refine'||def.kind==='datacenter'?'2a2d33':def.kind==='gather'?'2b2519':'33312c'}`;
    card.innerHTML=`<div class="th" style="${thumb}"></div>
      <div class="nm">${def.name}</div><div class="ct">${costStr}</div>`;
    card.onclick=()=>{ SND.resume(); if(!canAfford(def.cost)){ SND.sfx('deny'); toast("Not enough materials for "+def.name,"bad"); return; } SND.sfx('click'); placeKind=(placeKind===k?null:k); buildDock(); setHint(placeKind?("Click the ground to raise "+def.name+" · Esc cancels"):""); };
    row.appendChild(card); }
}
function setHint(t){ const h=$('hint'); if(t){h.textContent=t;h.style.display='block';} else h.style.display='none'; }

/* inspectors */
function idleHusks(){ return villagers.filter(v=>!v.dead&&!v.assigned); }
function selectVillager(v){ selBld=null; selected=v; Cam.dist=Math.min(Cam.dist,22); refreshInspect(); }
function selectBuilding(b){ selected=null; selBld=b; Cam.target.set(b.x,terrainHeight(b.x,b.z)+1,b.z); refreshInspect(); }
function clearInspect(){ selected=null; selBld=null; $('inspect').classList.remove('show'); }
function refreshInspect(){
  const ins=$('inspect');
  if(selected&&!selected.dead){ const v=selected;
    const where=v.assigned?v.assigned.def.name:"unassigned";
    ins.classList.add('show');
    ins.innerHTML=`<div class="hd"><h3>${v.name}</h3><span class="x" onclick="clearInspect()">✕</span></div>
     <div class="bd"><div><span class="tag">${cap1(v.caste)}</span><span class="tag">${where}</span><span class="tag">${v.job||'idle'}</span></div>
     <div style="color:var(--ink-dim);margin:6px 0;font-size:11.5px">A husk of the extinct, bound by the engine. ${v.caste==='stump'?'Hauls heavy loads, but slow.':v.caste==='reaper'?'Frail, but unbowed by dread.':'A common labourer.'}</div>
     <div class="barwrap"><div class="t">Resolve</div><div class="pbar"><i style="width:${(v.resolve*100)|0}%;background:linear-gradient(90deg,#6f7a55,#b8884e)"></i></div></div>
     <div class="row"><span>Speed</span><b>${v.speed.toFixed(1)}</b></div>
     <div class="row"><span>Carry cap</span><b>${CARRY[v.caste]||7}${v.carryAmt?(' ('+Math.floor(v.carryAmt)+' '+(v.carryRes?RES[v.carryRes].name:'')+')'):''}</b></div>
     ${v.assigned?`<div style="margin-top:8px"><span class="btn" onclick="unassignSel()">Recall to idle</span></div>`:`<div style="margin-top:8px;color:var(--ink-dim);font-size:11px">Idle. Select a workplace to assign husks.</div>`}
     </div>`;
  } else if(selBld){ const b=selBld, d=b.def;
    ins.classList.add('show');
    let body=`<div style="color:var(--ink-dim);margin:4px 0 8px;font-size:11.5px">${d.desc}</div>`;
    if(d.workers>0){ body+=`<div class="row"><span>Workers</span><b>${b.workers.length} / ${d.workers}</b></div>
      <div style="margin:6px 0"><span class="btn" onclick="addWorker()">+ assign</span> <span class="btn" onclick="remWorker()">− recall</span> <span style="color:var(--ink-dim);font-size:11px">${idleHusks().length} idle</span></div>`; }
    if(d.kind==="gather") body+=`<div class="row"><span>Harvests</span><b>${RES[d.res].name}</b></div>`;
    if(d.recipe){ const ins2=Object.entries(d.recipe.in).map(([r,n])=>n+"× "+RES[r].name).join(' + ');
      const outs=Object.entries(d.recipe.out).map(([r,n])=>n+"× "+RES[r].name).join(' + ');
      body+=`<div class="row"><span>Recipe</span><b style="font-size:11px">${ins2} → ${outs}</b></div>
      <div class="barwrap"><div class="t">${b.active?'working':'idle'}</div><div class="pbar"><i style="width:${Math.round((b.prog/d.recipe.time)*100)}%;background:linear-gradient(90deg,#6f7a55,#e8c24a)"></i></div></div>
      <div class="row"><span>Produced</span><b>${b.cyc||0}</b></div>`; }
    if(d.kind==="hearth") body+=`<div class="row"><span>Status</span><b>${b.active?'burning wood':'cold — no wood'}</b></div>`;
    if(d.kind==="market") body+=`<div style="margin-top:6px">`+["wood","pith","relic","glass"].map(r=>`<span class="btn" style="font-size:11px;padding:4px 7px" onclick="sellRes('${r}')">sell ${RES[r].name.split(' ')[0]}</span>`).join(' ')+`</div><div style="color:var(--ink-dim);font-size:11px;margin-top:4px">+2 writ per unit</div>`;
    body+=`<div style="margin-top:10px"><span class="btn bad" onclick="demolishSel()">Demolish</span></div>`;
    ins.innerHTML=`<div class="hd"><h3>${d.name}</h3><span class="x" onclick="clearInspect()">✕</span></div><div class="bd">${body}</div>`;
  } else ins.classList.remove('show');
}
function unassignSel(){ if(selected){ assignHusk(selected,null); selected.job="idle"; refreshInspect(); } }
function addWorker(){ if(!selBld)return; const idle=idleHusks(); if(!idle.length){ toast("No idle husks. Recall some, or wait for more to rise.","bad"); return; }
  idle.sort((a,b)=>Math.hypot(a.obj.position.x-selBld.x,a.obj.position.z-selBld.z)-Math.hypot(b.obj.position.x-selBld.x,b.obj.position.z-selBld.z));
  if(selBld.workers.length<selBld.def.workers){ assignHusk(idle[0],selBld); refreshInspect(); } }
function remWorker(){ if(!selBld||!selBld.workers.length)return; assignHusk(selBld.workers[selBld.workers.length-1],null); refreshInspect(); }
function demolishSel(){ if(!selBld)return; const b=selBld; b.workers.slice().forEach(w=>assignHusk(w,null));
  for(const r in b.def.cost) addStock(r,Math.floor(b.def.cost[r]*0.5)); scene.remove(b.mesh); const i=buildings.indexOf(b); if(i>=0)buildings.splice(i,1); clearInspect(); renderLedger(); buildDock(); toast("Structure dismantled (half materials reclaimed)."); }
function sellRes(r){ if((G.stock[r]||0)>=1){ G.stock[r]-=1; G.writ+=2; renderLedger(); } }

/* film-grain / VHS intensity (persisted) — the owner wants this subtle */

/* staged tutorial: quiet objectives that advance as the player learns the loop */
const TUT=[
  {t:"Tap the ground by a glowing field, then raise a gathering post from the dock below.", d:()=>buildings.some(b=>b.def.kind==="gather")},
  {t:"Keep the husks alive: gather Rot-Pith for food, and keep the Pyre burning Deadwood.", d:()=>(G.stock.pith>5)&&G.warmthRatio>=0.7},
  {t:"Raise a Soul Furnace, then tap it and press + assign to staff it from idle husks.", d:()=>buildings.some(b=>b.kind==="furnace"&&b.workers.length>0)},
  {t:"Forge the whole chain — Mill, Assembly, Datacenter — and render your first Compute.", d:()=>(G.stock.compute||0)>0||G.quota.level>1},
  {t:"Deliver the Quota of Compute before the timer runs out, or Dread surges.", d:()=>G.quota.level>1},
];
let tutIdx=0, tutDone=false;
function loadTut(){ try{ tutDone=localStorage.getItem('sf_tut')==='done'; }catch(e){} }
function updateTutorial(){ const g=$('goals'); if(!g) return;
  if(tutDone){ g.style.display='none'; return; }
  while(tutIdx<TUT.length && TUT[tutIdx].d()) tutIdx++;
  if(tutIdx>=TUT.length){ tutDone=true; try{localStorage.setItem('sf_tut','done');}catch(e){} g.style.display='none'; if(typeof toast==="function")toast("The foundry stands on its own now.","good"); return; }
  g.style.display='block';
  g.innerHTML=`<div class="gh">The engine whispers</div><div class="gt">${TUT[tutIdx].t}</div><div class="gp">${tutIdx} / ${TUT.length} rites learned</div>`;
}

/* =====================================================================
   === SIM STEP (early): villagers + hearth flicker ===
   ===================================================================== */
let _ledgerT=0;
function simStep(dt){
  stepEconomy(dt); stepHusks(dt);
  G.autosaveT=(G.autosaveT==null?25:G.autosaveT)-dt; if(G.autosaveT<=0){ G.autosaveT=25; saveGame(); }
  // weather: a slow drift between clear air and ashfall — atmosphere, and a little tension
  G.wx=(G.wx||0)+dt*0.015; const af=clamp((Math.sin(G.wx)+Math.sin(G.wx*0.37)-0.55)/1.1,0,1);
  if(scene.fog) scene.fog.density=0.0072+af*0.0075;
  if(ash&&ash.material) ash.material.opacity=0.42+af*0.46;
  const heavy=af>0.62; if(heavy&&!G._ashOn){ G._ashOn=true; if(typeof toast==="function")toast("Ashfall sweeps down over the valley.","bad"); } else if(!heavy){ G._ashOn=false; }
  if(selected&&!selected.dead&&selected.obj){ Cam.target.lerp(new THREE.Vector3(selected.obj.position.x,selected.obj.position.y+0.6,selected.obj.position.z),0.05); }
  for(const b of buildings){ const ud=b.mesh.userData;
    if(b.kind==="hearth"&&ud.light){ const t=performance.now();
      ud.light.intensity=(b.active?2.8:0.5)+Math.sin(t/110)*0.5+Math.sin(t/53)*0.3;
      if(ud.flame){ ud.flame.scale.set(1+Math.sin(t/120)*0.08,1+Math.sin(t/80)*0.18,1+Math.cos(t/100)*0.08); ud.flame.rotation.y=Math.sin(t/200)*0.25; }
      if(ud.tongues){ ud.tongues[0].scale.y=1+Math.sin(t/70)*0.2; ud.tongues[2].scale.y=1+Math.sin(t/45)*0.35; } }
    if(ud.glow){ ud.glow.material.emissiveIntensity=(b.active?0.9:0.35)+Math.sin(performance.now()/200+b.x)*0.2; } }
  _ledgerT-=dt; if(_ledgerT<=0){ _ledgerT=0.35; renderLedger(); renderQuota(); SND.setTension(G.dread/100); if(typeof updateTutorial==="function")updateTutorial(); if((selected&&!selected.dead)||selBld) refreshInspect(); }
}

function placeBuildingFree(k,x,z){ const def=BLD[k]; ensureBuildingGLB(k); const mesh=makeBuildingMesh(k,def); mesh.position.set(x,terrainHeight(x,z),z);
  scene.add(mesh); const b={kind:k,def,x,z,mesh,workers:[],prog:0,active:false,cyc:0}; buildings.push(b); groundBuilding(b); return b; }
function seedSettlement(){
  G.stock.wood=70; G.stock.relic=30; G.stock.pith=42; G.stock.silica=8;
  placeBuildingFree("hearth",0,0);
  placeBuildingFree("den",7,4); placeBuildingFree("den",-7,4);
  placeBuildingFree("stockpile",0,-7);   // a central yard so your stores are visible from the first moment
  // starter gathering op at the nearest grove so the valley is working the moment you arrive
  const grove=nodes.filter(n=>n.type==='grove').sort((a,b)=>Math.hypot(a.x,a.z)-Math.hypot(b.x,b.z))[0];
  let wc=null,pp=null;
  if(grove){ wc=placeBuildingFree("woodcutter",grove.x+2.6,grove.z); pp=placeBuildingFree("pithpost",grove.x-2.6,grove.z); }
  for(let i=0;i<6;i++){ const a=rr(0,6.28), r=rr(3,8); spawnVillager(Math.cos(a)*r, Math.sin(a)*r, pick(["worker","worker","stump","reaper"])); }
  const free=villagers.filter(v=>!v.assigned);
  if(wc) for(let i=0;i<3&&free.length;i++) assignHusk(free.shift(),wc);
  if(pp) for(let i=0;i<2&&free.length;i++) assignHusk(free.shift(),pp);
  renderLedger(); buildRail(); buildDock(); renderQuota();
}

/* =====================================================================
   === SAVE / LOAD: the foundry persists itself to localStorage ===
   ===================================================================== */
function serializeState(){
  return { v:1, seed:WORLD_SEED,
    G:{ stock:Object.assign({},G.stock), writ:G.writ, dread:G.dread, popCap:G.popCap, grow:G.grow, time:G.time||0,
        quota:{need:G.quota.need,period:G.quota.period,t:G.quota.t,level:G.quota.level} },
    paths:[...PATHS],
    buildings: buildings.map(b=>({k:b.kind,x:b.x,z:b.z,prog:b.prog||0,cyc:b.cyc||0})),
    nodes: nodes.map(n=>({t:n.type,x:n.x,z:n.z,a:n.amount,max:n.max})),
    villagers: villagers.filter(v=>!v.dead).map(v=>({c:v.caste,x:v.obj.position.x,z:v.obj.position.z,r:v.resolve,
        b:v.assigned?buildings.indexOf(v.assigned):-1, cr:v.carryRes||null, ca:v.carryAmt||0, job:v.job||"idle"})) };
}
function restorePath(rx,rz){ const k=pathKey(rx,rz); if(PATHS.has(k))return; PATHS.add(k);
  if(!pathGroup){ pathGroup=new THREE.Group(); scene.add(pathGroup); }
  const q=new THREE.Mesh(new THREE.BoxGeometry(1.15,0.14,1.15),MAT(0x3a342a)); q.position.set(rx,terrainHeight(rx,rz)+0.07,rz); pathGroup.add(q); }
function clearDynamic(){
  for(const b of buildings) scene.remove(b.mesh); buildings.length=0;
  for(const v of villagers) scene.remove(v.obj); villagers.length=0;
  for(const n of nodes) scene.remove(n.mesh); nodes.length=0;
  PATHS.clear(); if(pathGroup){ scene.remove(pathGroup); pathGroup=null; }
}
function applySave(s){
  if(!s||!s.G) return false;
  clearDynamic();
  Object.assign(G.stock,s.G.stock); G.writ=s.G.writ; G.dread=s.G.dread; G.popCap=s.G.popCap; G.grow=s.G.grow; G.time=s.G.time||0; G.over=null; G.breach=0;
  G.quota={need:s.G.quota.need,period:s.G.quota.period,t:s.G.quota.t,level:s.G.quota.level};
  for(const n of (s.nodes||[])){ const nn=placeNode(n.t,n.x,n.z); nn.amount=n.a; nn.max=n.max; if(nn.amount<=0) depleteNode(nn); }
  for(const b of (s.buildings||[])){ const bb=placeBuildingFree(b.k,b.x,b.z); bb.prog=b.prog||0; bb.cyc=b.cyc||0; }
  for(const k of (s.paths||[])){ const rz=(k%4096)-1024, rx=Math.floor(k/4096)-1024; restorePath(rx,rz); }
  for(const vd of (s.villagers||[])){ const v=spawnVillager(vd.x,vd.z,vd.c); v.resolve=vd.r; v.carryRes=vd.cr||null; v.carryAmt=vd.ca||0; v.job=vd.job||"idle";
    if(vd.b>=0 && buildings[vd.b]) assignHusk(v,buildings[vd.b]); }
  if(typeof renderLedger==="function"){ renderLedger(); renderQuota(); buildRail(); buildDock(); }
  return true;
}
function saveGame(){ try{ localStorage.setItem('sf_save',JSON.stringify(serializeState())); return true; }catch(e){ return false; } }
function readSave(){ try{ const s=localStorage.getItem('sf_save'); return s?JSON.parse(s):null; }catch(e){ return null; } }
function loadGame(){ const s=readSave(); if(!s||!s.buildings||!s.buildings.length) return false;
  try{ applySave(s); if(typeof toast==="function") toast("The foundry stirs from where you left it."); return true; }
  catch(e){ if(console&&console.warn)console.warn("load failed",e); return false; } }

function start(){
  setGrain(getGrain()); loadTut();
  const save=readSave();
  loadVillager(ok=>{
    bootWorld(save?save.seed:null);
    if(!(save&&loadGame())){ seedSettlement(); setTimeout(()=>{ try{ showHelp(); }catch(e){} }, 700); }
  });
}
addEventListener('beforeunload',()=>{ try{ if(!G.over) saveGame(); }catch(e){} });
function toast(msg,type){ const t=document.createElement('div'); t.className='toast'+(type?' '+type:''); t.textContent=msg;
  $('toasts').appendChild(t); setTimeout(()=>{t.style.transition='opacity .5s';t.style.opacity=0;setTimeout(()=>t.remove(),500);},3200); }
start();

/* =====================================================================
   === WORLD FEATURES: rich varied props + harvestable resource nodes ===

const nodes=[]; // {type,def,mesh,x,z,amount,max}
const MAT=(c,o)=>new THREE.MeshStandardMaterial(Object.assign({color:c,flatShading:true,roughness:1},o||{}));
function emis(c){ return new THREE.MeshStandardMaterial({color:c,emissive:c,emissiveIntensity:0.9,flatShading:true,roughness:1}); }

function makeDeadTree2(scale){
  const g=new THREE.Group(); const th=rr(3,6)*scale, bark=pick([0x16140f,0x1b1813,0x121511]);
  const m=MAT(bark);
  const trunk=new THREE.Mesh(new THREE.CylinderGeometry(0.14*scale,0.3*scale,th,5),m); trunk.position.y=th/2; trunk.rotation.z=rr(-0.1,0.1); g.add(trunk);
  for(let i=0;i<3+rint(5);i++){ const bl=rr(0.8,2.2)*scale;
    const b=new THREE.Mesh(new THREE.CylinderGeometry(0.04*scale,0.1*scale,bl,4),m);
    b.position.y=th*rr(0.5,0.98); b.rotation.z=rr(-1.4,1.4); b.rotation.x=rr(-1.2,1.2); g.add(b); }
  return g;
}
function makeBonePile(){ const g=new THREE.Group(); const m=MAT(0x5a564a);
  for(let i=0;i<4+rint(5);i++){ const b=new THREE.Mesh(new THREE.CylinderGeometry(0.06,0.06,rr(0.4,1.1),4),m);
    b.position.set(rr(-0.5,0.5),rr(0.1,0.4),rr(-0.5,0.5)); b.rotation.set(rr(0,3),rr(0,3),rr(0,3)); g.add(b);} return g; }
function makeWreck(){ const g=new THREE.Group(); const m=MAT(0x1d2024,{metalness:0.4});
  for(let i=0;i<3+rint(3);i++){ const b=new THREE.Mesh(new THREE.BoxGeometry(rr(0.6,2.4),rr(0.4,1.4),rr(0.5,1.8)),m);
    b.position.set(rr(-1,1),rr(0.2,1),rr(-1,1)); b.rotation.set(rr(-0.4,0.4),rr(0,6),rr(-0.4,0.4)); g.add(b);}
  if(rnd()<0.6){ const seam=new THREE.Mesh(new THREE.BoxGeometry(0.08,rr(0.6,1.4),0.08),new THREE.MeshBasicMaterial({color:0x2f6f78}));
    seam.position.set(rr(-0.6,0.6),rr(0.6,1.2),rr(-0.6,0.6)); g.add(seam);} return g; }
function makeAshMound(){ const m=MAT(0x2a2722); const s=rr(0.8,2.0);
  const mound=new THREE.Mesh(new THREE.SphereGeometry(s,7,5,0,6.283,0,1.3),m); mound.scale.y=0.5; return mound; }

function makeNode(type){
  const def=NODE[type]; const g=new THREE.Group(); g.userData.depleted=false;
  if(type==="grove"){ for(let i=0;i<4+rint(3);i++){ const t=makeDeadTree2(rr(0.8,1.3)); t.position.set(rr(-2.2,2.2),0,rr(-2.2,2.2)); g.add(t);}
    for(let i=0;i<5;i++){ const f=new THREE.Mesh(new THREE.IcosahedronGeometry(rr(0.12,0.26),0),emis(0x6f8a4a)); f.material.emissiveIntensity=0.5;
      f.position.set(rr(-2,2),0.12,rr(-2,2)); g.add(f);} }
  else if(type==="dune"){ const mound=new THREE.Mesh(new THREE.SphereGeometry(2.4,8,6,0,6.283,0,1.4),MAT(0x9a9080)); mound.scale.y=0.45; mound.position.y=0.1; g.add(mound);
    for(let i=0;i<7;i++){ const sh=new THREE.Mesh(new THREE.ConeGeometry(rr(0.2,0.5),rr(0.8,2.0),4),MAT(0xc8c2b4)); sh.position.set(rr(-2,2),rr(0.3,0.8),rr(-2,2)); sh.rotation.set(rr(-0.5,0.5),rr(0,6),rr(-0.5,0.5)); g.add(sh);} }
  else if(type==="vent"){ const lip=new THREE.Mesh(new THREE.TorusGeometry(1.6,0.5,6,12),MAT(0x1a1814)); lip.rotation.x=Math.PI/2; lip.position.y=0.2; g.add(lip);
    const core=new THREE.Mesh(new THREE.CircleGeometry(1.3,12),emis(0xc9772a)); core.material.emissiveIntensity=0.6; core.rotation.x=-Math.PI/2; core.position.y=0.05; g.add(core);
    const gl=new THREE.PointLight(0xc9772a,0.8,12,2); gl.position.y=0.6; g.add(gl); }
  else if(type==="well"){ const ring=new THREE.Mesh(new THREE.CylinderGeometry(1.4,1.5,1.0,10,1,true),MAT(0x3a3a40)); ring.position.y=0.5; g.add(ring);
    const water=new THREE.Mesh(new THREE.CircleGeometry(1.2,12),MAT(0x12303a,{metalness:0.4,roughness:0.3})); water.rotation.x=-Math.PI/2; water.position.y=0.7; g.add(water); }
  else { for(let i=0;i<4+rint(4);i++){ const b=new THREE.Mesh(new THREE.BoxGeometry(rr(1,3),rr(1,4),rr(1,2.5)),MAT(0x202327,{metalness:0.3}));
      b.position.set(rr(-2,2),rr(0.5,2),rr(-2,2)); b.rotation.set(rr(-0.3,0.3),rr(0,6),rr(-0.3,0.3)); g.add(b);}
    const seam=new THREE.Mesh(new THREE.BoxGeometry(0.1,rr(1.5,3),0.1),new THREE.MeshBasicMaterial({color:0x2f6f78})); seam.position.set(rr(-1,1),rr(1,2),rr(-1,1)); g.add(seam); }
  const amt=def.amount[0]*rr(0.8,1.2);
  return {type,def,mesh:g,amount:amt,max:amt};
}
function placeNode(type,x,z){ const n=makeNode(type); n.x=x; n.z=z; n.mesh.position.set(x,terrainHeight(x,z),z); n.mesh.rotation.y=rr(0,6); scene.add(n.mesh); nodes.push(n); return n; }

function makeShard(){ const g=new THREE.Group(); for(let i=0;i<2+rint(3);i++){ const s=new THREE.Mesh(new THREE.ConeGeometry(rr(0.2,0.5),rr(0.9,2.2),4),MAT(0xc8c2b4));

function sigilMat(){ const m=emis(0xeae6da); m.emissiveIntensity=0.55; m.fog=true; return m; }
function makeSigilCross(){ const g=new THREE.Group(), m=sigilMat(); const hpost=rr(1.5,2.6);

function makeServerTower(){ const g=new THREE.Group(); const h=rr(2.6,5.0), w=rr(0.85,1.35);
  const cab=new THREE.Mesh(new THREE.BoxGeometry(w,h,w*0.7),MAT(0x14161a,{metalness:0.4})); cab.position.y=h/2; g.add(cab);

    const sp=new THREE.Mesh(new THREE.BoxGeometry(0.09,0.05,0.02), lit?emis(rnd()<0.5?0x2f8f9a:0xe89a3a):MAT(0x0a0b0d));

  const scr=new THREE.Mesh(new THREE.BoxGeometry(w*0.55,0.45,0.03), emis(0x1c3a40)); scr.material.emissiveIntensity=0.35; scr.position.set(0,h*0.72,w*0.36); g.add(scr);
  for(let i=0;i<2;i++){ const cbl=new THREE.Mesh(new THREE.CylinderGeometry(0.04,0.04,rr(0.8,1.6),4),MAT(0x0c0d10)); cbl.position.set(rr(-0.3,0.3),h*rr(0.5,0.9),w*0.4); cbl.rotation.x=rr(0.6,1.4); g.add(cbl); }

function scatterWorld(){
  // each region becomes a readable FIELD: clustered resource nodes + dense matching props
  for(const g of REGIONS){
    const rg=mulberry32(g.seed);
    const inReg=(spread)=>{ const a=rg()*6.28, d=rg()*g.rad*(spread||0.92);
      return [clamp(g.x+Math.cos(a)*d,-HALF+3,HALF-3), clamp(g.z+Math.sin(a)*d,-HALF+3,HALF-3)]; };
    const nNodes=2+(rg()*2|0);
    const addNodes=(type,n)=>{ for(let k=0;k<n;k++){ const [x,z]=inReg(0.7); if(terrainHeight(x,z)<-3.2)continue; placeNode(type,x,z); } };
    const addProps=(maker,n,rot)=>{ for(let k=0;k<n;k++){ const [x,z]=inReg(1.0); if(terrainHeight(x,z)<-3.2)continue; dropProp(maker(),x,z,rot); } };
    if(g.type==='forest'){ addNodes('grove',nNodes+1); addProps(()=>makeDeadTree2(rr(0.7,1.5)),20,true); addProps(()=>makeBonePile(),3); }
    else if(g.type==='silica'){ addNodes('dune',3); addProps(()=>makeShard(),16,true); addProps(()=>makeRock(),5); }
    else if(g.type==='ash'){ addNodes('vent',3); addProps(()=>makeAshMound(),16); addProps(()=>makeDeadTree2(rr(0.6,1.0)),4,true); }
    else if(g.type==='ruins'){ addNodes('ruin',2); addProps(()=>makeWreck(),8,true); addProps(()=>makeMonolith(),3); addProps(()=>makeServerTower(),6,true); }
    else if(g.type==='graves'){ addNodes('well',2); addProps(()=>makeBonePile(),16); addProps(()=>makeRock(),4); }
    else { addNodes('grove',2); addProps(()=>makeAshMound(),9); addProps(()=>makeDeadTree2(rr(0.6,1.1)),9,true); }
  }
  // ambient props across the open land (denser, closer to centre — leave only a small build clearing)
  for(let i=0;i<340;i++){ const x=rr(-HALF+3,HALF-3), z=rr(-HALF+3,HALF-3);
    if(Math.hypot(x,z)<9) continue; if(terrainHeight(x,z)<-3.2) continue; if(regionAt(x,z)) continue;
    const r=rnd(); dropProp(r<0.45?makeDeadTree2(rr(0.6,1.2)):r<0.7?makeRock():r<0.86?makeBonePile():makeAshMound(), x,z, r<0.45);
  }
  // Haunted Mound: stark white crosses + sigils staked across the dark land
  for(let i=0;i<52;i++){ const x=rr(-HALF+4,HALF-4), z=rr(-HALF+4,HALF-4);
    if(Math.hypot(x,z)<11) continue; if(terrainHeight(x,z)<-3.2) continue;
    dropProp(rnd()<0.74?makeSigilCross():makeSigilRing(), x,z, false);
  }
  // dead server-towers carry the datacenter/machine motif across the desolation
  for(let i=0;i<26;i++){ const a=rr(0,6.28), r=rr(13,HALF-5); const x=Math.cos(a)*r, z=Math.sin(a)*r;
    if(terrainHeight(x,z)<-3.2||regionAt(x,z)) continue; dropProp(makeServerTower(),x,z,true); }
  scatterGroundDetail();
}
// thousands of tiny props via instancing (one draw call each) for a dense desolate floor
function scatterGroundDetail(){
  const M=new THREE.Matrix4();
  const mk=(geo,mat,count,yfn,sfn,minH)=>{ const im=new THREE.InstancedMesh(geo,mat,count); let n=0;
    for(let i=0;i<count;i++){ const x=rr(-HALF,HALF), z=rr(-HALF,HALF); const h=terrainHeight(x,z); if(h<(minH||-3.4))continue;
      const s=sfn(); M.makeScale(s.x,s.y,s.z); M.setPosition(x,h+yfn(s),z); im.setMatrixAt(n++,M); }
    im.count=n; im.instanceMatrix.needsUpdate=true; im.frustumCulled=false; scene.add(im); return im; };
  mk(new THREE.DodecahedronGeometry(0.4,0), MAT(0x2b2d2f), 2000, s=>0.1, ()=>{const a=rr(0.25,1.1);return{x:a,y:a*rr(0.5,1),z:a};});
  mk(new THREE.ConeGeometry(0.1,0.7,4), MAT(0x2e2b20), 2600, s=>s.y*0.35, ()=>{const a=rr(0.6,1.6);return{x:1,y:a,z:1};});
  mk(new THREE.IcosahedronGeometry(0.18,0), MAT(0x23252a), 1400, s=>0.08, ()=>{const a=rr(0.4,1.0);return{x:a,y:a*0.6,z:a};});
}
function nearestNode(type,x,z){ let best=null,bd=1e9; for(const n of nodes){ if(n.type!==type||n.amount<=0)continue;
  const d=(n.x-x)*(n.x-x)+(n.z-z)*(n.z-z); if(d<bd){bd=d;best=n;} } return best?{node:best,dist:Math.sqrt(bd)}:null; }

const PATHS=new Set(); let pathGroup=null;
function pathKey(x,z){ return (Math.round(x)+1024)*4096+(Math.round(z)+1024); }
function onPath(x,z){ return PATHS.has(pathKey(x,z)); }
function addPath(x,z){ const rx=Math.round(x),rz=Math.round(z),k=pathKey(rx,rz);
  if(PATHS.has(k)||Math.hypot(rx,rz)>HALF-1||terrainHeight(rx,rz)<-3.4) return false;
  if((G.stock.wood||0)<BLD.path.cost.wood) return false; G.stock.wood-=BLD.path.cost.wood; PATHS.add(k);
  if(!pathGroup){ pathGroup=new THREE.Group(); scene.add(pathGroup); }
  const q=new THREE.Mesh(new THREE.BoxGeometry(1.15,0.14,1.15),MAT(0x3a342a)); q.position.set(rx,terrainHeight(rx,rz)+0.07,rz); pathGroup.add(q); return true; }

function canAfford(cost){ for(const r in cost) if((G.stock[r]||0)<cost[r]) return false; return true; }
function payCost(cost){ for(const r in cost) G.stock[r]-=cost[r]; }
// storage capacity is dynamic: a base, plus every Reliquary Yard (stockpile) you raise
function storageCap(r){ let cap=STORE; for(const b of buildings){ if(b.kind==="stockpile") cap+=b.def.store||0; } return cap; }
function addStock(r,n){ G.stock[r]=clamp((G.stock[r]||0)+n,0,storageCap(r)); }
function storeRoom(r){ return (G.stock[r]||0)<storageCap(r); }
function pileFill(r){ return clamp((G.stock[r]||0)/storageCap(r),0,1); }   // 0..1 of a resource's bin — drives the visible material piles

/* ---- material stockpiles: a yard whose piles physically rise & fall with your stores (the #1 'sauce') ---- */
const PILE_RES=["wood","pith","silica","ash","water","relic","glass","core"];
function pileGeo(res){ switch(res){
  case "silica": return {g:new THREE.ConeGeometry(0.46,1.0,5), h:1.0};         // pale sand heap
  case "ash":    return {g:new THREE.ConeGeometry(0.52,0.8,6), h:0.8};         // soul-ash mound
  case "pith":   return {g:new THREE.SphereGeometry(0.42,6,5), h:0.84};        // rot-pith sacks
  case "water":  return {g:new THREE.CylinderGeometry(0.4,0.42,1.0,8), h:1.0}; // grave-water cistern
  case "wood":   return {g:new THREE.BoxGeometry(0.8,1.0,0.54), h:1.0};        // split-log stack
  case "relic":  return {g:new THREE.BoxGeometry(0.66,1.0,0.66), h:1.0};       // salvage crates
  case "glass":  return {g:new THREE.IcosahedronGeometry(0.48,0), h:0.96};     // cinderglass shards
  default:       return {g:new THREE.IcosahedronGeometry(0.4,0), h:0.8};       // reliquary cores
}}
function makeStockpile(def){
  const g=new THREE.Group();
  const timber=MAT(0x2b251c), plank=MAT(0x37322b);
  const W=3.8, D=2.2;
  const plat=new THREE.Mesh(new THREE.BoxGeometry(W,0.18,D),plank); plat.position.y=0.1; g.add(plat);
  for(const sx of [-1,1]) for(const sz of [-1,1]){ const post=new THREE.Mesh(new THREE.BoxGeometry(0.16,1.6,0.16),timber);
    post.position.set(sx*(W/2-0.16),0.9,sz*(D/2-0.16)); g.add(post); }
  const beam=new THREE.Mesh(new THREE.BoxGeometry(W,0.14,0.14),timber); beam.position.set(0,1.62,-(D/2-0.16)); g.add(beam);
  const beam2=beam.clone(); beam2.position.z=(D/2-0.16); g.add(beam2);
  const tarp=new THREE.Mesh(new THREE.BoxGeometry(W*0.95,0.05,D*0.52),MAT(0x221f19)); tarp.position.set(0,1.56,-(D*0.2)); tarp.rotation.x=-0.13; g.add(tarp);
  const sig=new THREE.Mesh(new THREE.BoxGeometry(0.05,0.52,0.05),sigilMat()); sig.position.set(-(W/2-0.16),1.05,(D/2-0.16)); g.add(sig);
  const bar=new THREE.Mesh(new THREE.BoxGeometry(0.3,0.05,0.05),sigilMat()); bar.position.set(-(W/2-0.16),1.16,(D/2-0.16)); g.add(bar);
  const piles=[]; const cols=4, cellX=W/cols, cellZ=D/2, top=0.2;
  PILE_RES.forEach((res,i)=>{ const cx=-(W/2)+cellX*((i%cols)+0.5), cz=-(D/2)+cellZ*(((i/cols)|0)+0.5);
    const bin=new THREE.Mesh(new THREE.BoxGeometry(cellX*0.82,0.12,cellZ*0.8),MAT(0x1e1b15)); bin.position.set(cx,top,cz); g.add(bin);
    const pg=pileGeo(res); try{ pg.g.translate(0,pg.h/2,0); }catch(e){}   // anchor at base so it grows upward
    const opt=(res==="water")?{metalness:0.3,roughness:0.35}:null;
    const pile=new THREE.Mesh(pg.g, MAT(RES[res].col,opt)); pile.position.set(cx,top+0.06,cz); pile.scale.y=0.02; pile.visible=false;
    g.add(pile); piles.push({res,node:pile}); });
  g.userData.piles=piles; g.userData.isStockpile=true;
  return g;
}

      const cap=new THREE.Mesh(new THREE.IcosahedronGeometry(0.3,0),emis(0xe8d24a)); cap.position.set(0,3.5,0); g.add(cap); g.userData.glow=cap; } g.userData.win=true; }
  else if(kind==="ward"){ const ob=new THREE.Mesh(new THREE.CylinderGeometry(0.3,0.6,3.2,5),MAT(0x3a3d44)); ob.position.y=1.6; g.add(ob);
    const top=new THREE.Mesh(new THREE.IcosahedronGeometry(0.4,0),emis(0xb89a5a)); top.material.emissiveIntensity=0.5; top.position.y=3.4; g.add(top); g.userData.glow=top; }
  else { const stall=new THREE.Mesh(new THREE.BoxGeometry(f,0.9,f*0.7),timber); stall.position.y=0.45; g.add(stall);
    const awn=new THREE.Mesh(new THREE.BoxGeometry(f*1.1,0.1,f*0.5),MAT(0x3a2e22)); awn.position.set(0,1.3,f*0.2); awn.rotation.x=-0.3; g.add(awn);
    const coin=new THREE.Mesh(new THREE.IcosahedronGeometry(0.16,0),emis(0xe8c24a)); coin.material.emissiveIntensity=0.6; coin.position.set(0,1.0,f*0.3); g.add(coin); }
  return g;
}
/* settle a placed building into the world: face the Pyre, sink a foundation skirt, scatter matching debris */
function groundBuilding(b){
  const def=b.def, m=b.mesh; if(def.kind==="path") return;
  if(b.kind!=="hearth") m.rotation.y = Math.atan2(-b.x,-b.z) + rr(-0.28,0.28);   // turn to face the settlement centre
  const fr=(def.foot||1.6)*0.92;
  if(b.kind!=="hearth" && b.kind!=="stockpile"){   // these carry their own stone base
    const skirt=new THREE.Mesh(new THREE.CylinderGeometry(fr*0.96,fr*1.16,0.55,8),MAT(0x191712)); skirt.position.y=-0.18; m.add(skirt);
    for(let i=0;i<5;i++){ const a=rr(0,6.28); const st=new THREE.Mesh(new THREE.DodecahedronGeometry(rr(0.16,0.32),0),MAT(0x23252b));
      st.position.set(Math.cos(a)*fr,rr(-0.05,0.12),Math.sin(a)*fr); st.rotation.set(rr(0,3),rr(0,3),rr(0,3)); m.add(st); } }
  scatterAround(b,fr);
}
function scatterAround(b,fr){
  const def=b.def; const R=fr+0.7, n=2+rint(3);
  for(let i=0;i<n;i++){ const a=rr(0,6.28), d=R+rr(0,1.1), x=b.x+Math.cos(a)*d, z=b.z+Math.sin(a)*d; if(terrainHeight(x,z)<-3.2) continue;
    const r=rnd(); let o;
    if(def.kind==="gather") o=(r<0.5)?makeBonePile():makeShard();
    else if(def.kind==="refine"||def.kind==="datacenter") o=(r<0.45)?makeWreck():(r<0.75?makeServerTower():makeBonePile());
    else o=(r<0.5)?makeBonePile():makeRock();
    dropProp(o,x,z,true); }
  if(rnd()<0.7){ const a=rr(0,6.28), d=R+0.3; dropProp(rnd()<0.6?makeSigilCross():makeSigilRing(), b.x+Math.cos(a)*d, b.z+Math.sin(a)*d, false); }
}
function buildingFits(x,z,foot){
  if(Math.hypot(x,z)>HALF-foot) return false;
  if(terrainHeight(x,z)<-15) return false;          // only the very deepest ash-river channels are unbuildable
  for(const b of buildings){ if(Math.hypot(b.x-x,b.z-z) < (b.def.foot+foot)*0.5) return false; }
  for(const n of nodes){ if(Math.hypot(n.x-x,n.z-z) < 2.0+foot*0.4) return false; }
  return true;
}
function placeBuilding(kind,x,z){
  const def=BLD[kind]; if(!buildingFits(x,z,def.foot)) return null; if(!canAfford(def.cost)) return null;
  payCost(def.cost); ensureBuildingGLB(kind);
  const mesh=makeBuildingMesh(kind,def); mesh.position.set(x,terrainHeight(x,z),z); scene.add(mesh);
  const b={kind,def,x,z,mesh,workers:[],prog:0,active:false,cyc:0};
  buildings.push(b); groundBuilding(b); return b;
}
function buildingWorkSpot(b,i){ const ang=(i/Math.max(1,b.def.workers))*6.28; const r=b.def.foot*0.8+0.6;
  return {x:b.x+Math.cos(ang)*r, z:b.z+Math.sin(ang)*r}; }
function assignHusk(v,b){ if(v.assigned){ const a=v.assigned.workers; const k=a.indexOf(v); if(k>=0)a.splice(k,1); }
  v.assigned=b; v.job="toJob"; v.carryRes=null; v.carryAmt=0; if(b){ b.workers.push(v); } }
function buildingNeedsWorkers(b){ return b.workers.length<b.def.workers && (b.def.kind==="gather"||b.def.kind==="refine"||b.def.kind==="datacenter"||b.def.kind==="market"); }

/* ---- collision: circular obstacles (buildings) + husk movement/animation ---- */
let OBS=[];
function rebuildObstacles(){ OBS=buildings.map(b=>({x:b.x,z:b.z,r:b.def.foot*0.6+0.45})); }
const HUSK_R=0.5;
function moveHusk(v,tx,tz,dt,stop){
  stop=stop||0.6; const o=v.obj;
  const dx=tx-o.position.x, dz=tz-o.position.z, d=Math.hypot(dx,dz);
  if(d<stop){ if(v.act)v.act.timeScale=0; return true; }
  const sp=v.speed*(onPath(o.position.x,o.position.z)?1.35:1)*dt;
  let nx=o.position.x+(dx/d)*sp, nz=o.position.z+(dz/d)*sp;
  for(const ob of OBS){ const ex=nx-ob.x, ez=nz-ob.z, ed=Math.hypot(ex,ez), R=ob.r+HUSK_R;
    if(ed<R){ if(ed<0.001){ nx=ob.x+R; } else { nx=ob.x+ex/ed*R; nz=ob.z+ez/ed*R; } } }
  o.position.x=nx; o.position.z=nz; o.position.y=terrainHeight(nx,nz);
  o.rotation.y=lerpAngle(o.rotation.y,Math.atan2(dx,dz),0.22);
  if(v.act)v.act.timeScale=1.1;
  if(v.proc){ const ud=o.userData,rate=(v.caste==="stump")?5:9; v.phase+=dt*rate; const sw=Math.sin(v.phase)*0.5;
    if(ud.legs[0])ud.legs[0].rotation.x=sw; if(ud.legs[1])ud.legs[1].rotation.x=-sw;
    if(ud.arms[0])ud.arms[0].rotation.x=-sw*0.6; if(ud.arms[1])ud.arms[1].rotation.x=sw*0.6;
    if(v.caste==="stump"){ o.rotation.z=Math.sin(v.phase)*0.2; o.rotation.x=Math.sin(v.phase*0.5)*0.07; o.position.y+=Math.abs(Math.sin(v.phase))*0.09; } // bespoke log heave/tilt
    else o.position.y+=Math.abs(Math.sin(v.phase))*0.05; }
  if(v.staticGLB){ v.phase+=dt*5; o.position.y+=Math.abs(Math.sin(v.phase))*0.05; o.rotation.z=Math.sin(v.phase*0.5)*0.05; } // cloaked Reaper glide
  return false;
}
function separateHusks(){
  const A=villagers; for(let i=0;i<A.length;i++){ const a=A[i]; if(a.dead)continue; const ap=a.obj.position;
    for(let j=i+1;j<A.length;j++){ const b=A[j]; if(b.dead)continue; const bp=b.obj.position;
      let dx=bp.x-ap.x, dz=bp.z-ap.z, d=dx*dx+dz*dz;
      if(d<1.0 && d>0.0001){ d=Math.sqrt(d); const push=(1.0-d)*0.5, ux=dx/d, uz=dz/d;
        ap.x-=ux*push; ap.z-=uz*push; bp.x+=ux*push; bp.z+=uz*push; } } }
}

/* ---- husk job state machine (replaces idle wander) ---- */
function stepHusks(dt){
  rebuildObstacles();
  for(const v of villagers){
    if(v.dead) continue;
    if(v.carryMesh){ const carrying=v.carryAmt>0.1; v.carryMesh.visible=carrying;
      if(carrying){ const col=(v.carryRes&&RES[v.carryRes])?RES[v.carryRes].col:0x6b5a40;
        if(v.carryMesh.material&&v.carryMesh.material.color&&v.carryMesh.material.color.setHex)v.carryMesh.material.color.setHex(col);
        const s=0.5+Math.min(1,v.carryAmt/12)*0.85; v.carryMesh.scale.set(s,s,s); } }
    const b=v.assigned;
    if(!b){ // idle: mostly stand; occasionally shuffle a short way near the pyre
      v.restock-=dt;
      if(v.restock<=0){ v.restock=rr(8,17);
        if(rnd()<0.4){ const hb=buildings.find(x=>x.kind==="hearth"); const cx=hb?hb.x:0,cz=hb?hb.z:0; v.tx=cx+rr(-7,7); v.tz=cz+rr(-7,7); }
        else { v.tx=v.obj.position.x; v.tz=v.obj.position.z; } }
      moveHusk(v,v.tx,v.tz,dt,0.9); continue;
    }
    if(b.def.kind==="gather"){
      if(v.job==="toJob"||v.job==="toNode"){
        const nn=nearestNode(b.def.nodeType,b.x,b.z);
        if(!nn){ const ws=buildingWorkSpot(b,b.workers.indexOf(v)); moveHusk(v,ws.x,ws.z,dt,0.7); v.job="toNode"; continue; }
        v.tnode=nn.node;
        if(moveHusk(v,nn.node.x,nn.node.z,dt,2.0)) v.job="harvest";
      } else if(v.job==="harvest"){
        const n=v.tnode;
        if(!n||n.amount<=0){ v.job="toNode"; continue; }
        const rate=GRATE[v.caste]||5; const take=Math.min(rate*dt, n.amount, (CARRY[v.caste]||7)-v.carryAmt);
        n.amount-=take; v.carryAmt+=take; v.carryRes=b.def.res;
        if(n.amount<=0) depleteNode(n);
        if(v.carryAmt>=(CARRY[v.caste]||7)-0.01 || (n.amount<=0)) v.job="toDrop";
      } else if(v.job==="toDrop"){
        if(moveHusk(v,b.x,b.z,dt,b.def.foot*0.6+1.3)){ addStock(v.carryRes,v.carryAmt); v.carryAmt=0; v.carryRes=null; v.job="toNode"; if(typeof onDeposit==="function")onDeposit(b); }
      }
    } else { // refine / datacenter / market: stand at a work spot beside the building
      const i=Math.max(0,b.workers.indexOf(v)); const ws=buildingWorkSpot(b,i);
      v.atWork=moveHusk(v,ws.x,ws.z,dt,0.7);
      if(v.atWork){ v.obj.rotation.y=lerpAngle(v.obj.rotation.y,Math.atan2(b.x-v.obj.position.x,b.z-v.obj.position.z),0.1); }
    }
  }
  separateHusks();
}
function depleteNode(n){ if(n.def.renew) return; n.amount=0; if(!n.mesh.userData.depleted){ n.mesh.userData.depleted=true;
  n.mesh.traverse(o=>{ if(o.isMesh&&o.material){ o.material=o.material.clone(); o.material.color&&o.material.color.multiplyScalar(0.5); o.material.emissiveIntensity&&(o.material.emissiveIntensity=0);} });
  n.mesh.scale.y*=0.6; } }

/* ---- random events: the dead world intrudes ---- */
const EVENTS=[
  {n:"A wanderer drags salvage in from the dead cities.", bad:false, f:()=>addStock('relic',rr(16,32))},
  {n:"A buried cache of silica is unearthed beneath the ash.", bad:false, f:()=>addStock('silica',rr(22,44))},
  {n:"Grave-water seeps up cold through the cracks.", bad:false, f:()=>addStock('water',rr(16,30))},
  {n:"A dead grove is found still standing — deadwood for the taking.", bad:false, f:()=>addStock('wood',rr(20,40))},
  {n:"The backlog of the unprocessed dead presses in. Dread rises.", bad:true, f:()=>{ G.dread=clamp(G.dread+11,0,100); }},
  {n:"A cold wind scatters the Pyre's warmth.", bad:true, f:()=>{ G.stock.wood=Math.max(0,G.stock.wood-rr(6,14)); }},
  {n:"A lone husk wanders out of the waste to join the foundry.", bad:false, f:()=>{ const a=villagers.filter(v=>!v.dead); if(a.length<G.popCap){ const hb=buildings.find(b=>b.kind==="hearth"); spawnVillager((hb?hb.x:0)+rr(-4,4),(hb?hb.z:0)+rr(-4,4),pick(["worker","stump","reaper"])); SND.sfx('rise'); } }},
];
function fireEvent(){ const e=pick(EVENTS); e.f(); if(typeof toast==="function")toast(e.n, e.bad?"bad":"good"); if(e.bad)SND.sfx('haunt'); }

/* ---- the economy tick ---- */
function stepEconomy(dt){
  if(G.over) return;
  const pop=villagers.filter(v=>!v.dead).length;
  // renewable nodes (groves/wells) slowly regrow so food + water are sustainable; finite ones push expansion
  for(const n of nodes){ if(n.def.renew && n.amount<n.max){ n.amount=Math.min(n.max,n.amount+n.def.renew*dt);
    if(n.mesh.userData.depleted && n.amount>n.max*0.2){ n.mesh.userData.depleted=false; n.mesh.scale.y/=0.6; } } }
  // warmth: hearths burn wood
  let warmSupply=0;
  for(const b of buildings){ if(b.kind==="hearth"){ if(G.stock.wood>0){ G.stock.wood=Math.max(0,G.stock.wood-b.def.burn.wood*dt); warmSupply+=b.def.warmth; b.active=true; } else b.active=false; } }
  G.warmthRatio=clamp(warmSupply/Math.max(1,pop),0,1.5);
  // food
  G.stock.pith=Math.max(0,G.stock.pith-pop*0.05*dt); const foodOk=G.stock.pith>0.01;
  // production (refine/datacenter)
  let activeDread=0;
  for(const b of buildings){
    if(b.def.kind!=="refine"&&b.def.kind!=="datacenter") continue;
    const present=b.workers.filter(w=>w.atWork&&!w.dead).length;
    const rec=b.def.recipe; const inOk=Object.keys(rec.in).every(r=>(G.stock[r]||0)>=rec.in[r]);
    const outOk=Object.keys(rec.out).every(r=>storeRoom(r));
    if(present>0&&inOk&&outOk){ b.active=true; b.prog+=dt*(present/b.def.workers); activeDread+=b.def.dread;
      if(b.prog>=rec.time){ b.prog-=rec.time; for(const r in rec.in)G.stock[r]-=rec.in[r]; for(const r in rec.out)addStock(r,rec.out[r]); b.cyc++; } }
    else { b.active=false; }
  }
  // dread: industry + backlog vs ward suppression
  let wards=0; for(const b of buildings) if(b.kind==="ward") wards+=1;
  const decay=0.25+wards*0.6;
  G.dread=clamp(G.dread+(activeDread*0.6 - decay)*dt,0,100);
  // hauntings
  if(G.dread>55 && rnd()<0.03*dt*(G.dread/100)){ const cand=villagers.filter(v=>!v.dead&&v.assigned); if(cand.length){ const v=pick(cand); v.resolve=Math.max(0,v.resolve-0.25); SND.sfx('haunt'); if(typeof toast==="function")toast(v.name+" is gripped by a haunting.","bad"); } }
  // resolve per husk
  for(const v of villagers){ if(v.dead) continue;
    const good=foodOk&&G.warmthRatio>=0.7;
    v.resolve=clamp(v.resolve+(good?0.02:-0.045)*dt,0,1);
    if(v.resolve<=0){ crumble(v); }
  }
  // population growth
  G.grow-=dt; if(G.grow<=0){ G.grow=24;
    const alive=villagers.filter(v=>!v.dead); const avg=alive.reduce((a,v)=>a+v.resolve,0)/Math.max(1,alive.length);
    const cap=6+buildings.filter(b=>b.kind==="den").reduce((a,b)=>a+b.def.houses,0); G.popCap=cap;
    if(avg>0.65 && alive.length<cap && G.stock.pith>8){ const hb=buildings.find(b=>b.kind==="hearth"); const cx=hb?hb.x:0,cz=hb?hb.z:0;
      spawnVillager(cx+rr(-4,4),cz+rr(-4,4),pick(["worker","worker","stump","reaper"])); SND.sfx('rise'); toast("A husk rises to join the foundry.","good"); } }
  // quota
  G.quota.t-=dt;
  if(G.quota.t<=0){ const need=G.quota.need;
    if((G.stock.compute||0)>=need){ G.stock.compute-=need; G.writ+=need*8; G.dread=Math.max(0,G.dread-12); G.quota.level++;
      G.quota.need=Math.ceil(need*1.4); SND.sfx('bell'); toast("Quota met. The engine endures. (Tithe paid: "+(need*8)+" writ)","good");
      if(G.quota.level>WIN_LEVEL) endGame(true); }
    else { G.dread=clamp(G.dread+26,0,100); SND.sfx('deny'); toast("Quota missed — the backlog of the dead swells. Dread surges.","bad"); }
    G.quota.t=G.quota.period;
  }
  // random events
  G.eventT=(G.eventT==null?60:G.eventT)-dt; if(G.eventT<=0 && G.time>15){ G.eventT=rr(55,95); fireEvent(); }
  // lose conditions
  if(villagers.filter(v=>!v.dead).length===0 && G.time>20) endGame(false,"extinct");
  if(G.dread>=100){ G.breach=(G.breach||0)+dt; if(G.breach>=15) endGame(false,"breach"); } else G.breach=0;
  G.time=(G.time||0)+dt;
}
function crumble(v){ v.dead=true; SND.sfx('crumble'); scene.remove(v.obj); if(v.assigned){ const a=v.assigned.workers,k=a.indexOf(v); if(k>=0)a.splice(k,1);}
  const idx=villagers.indexOf(v); if(idx>=0)villagers.splice(idx,1); if(selected===v)clearInspect();
  toast("A husk crumbles back to ash.","bad"); }
function endGame(win,why){ if(G.over)return; G.over=win?"win":"lose"; paused=true; SND.sfx(win?'win':'lose');
  if(typeof showEnd==="function") showEnd(win,why); }

/* === SECTION:CORE_END === */
</script>
